body:
  text: 三寶萬靈法懺下元道士王守上閱列星誥志心皈命禮先天盤古周御國王靈光映慈惠之容滿月現眞空之相北府延生而解阨南宫削罪以綿齡明明主算於東躔朗朗記名於西極輝煌四闕燦爛中垣二十八宿之經天萬二千餘之隱度大悲大願大聖大慈先天斗父斗姥五斗列耀星君慈光普救妙應天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懺列星卷七下第十四策偈曰欲希大聖問天心天心還問自心明天道自心無二理天人一德證修因學聖觀天第四十分道言上聖與天同道人聖與天同理惟至公無私可以服羣而無異言人之口人之心是傳其巳之功修而莫殊也若已之功修有一未致則不悅於人心則自不快於人口是人之心與口驗已之修功致與未致可以自暴而莫爽矣不在毁譽之間而在我之勤怠間矣當年聖人之作用惟終惟始克持一心至於後之證修有遲有速皆無問焉我登高山人必仰之我行達道人不知之惟涉厯其艱辛者自嘗備悉天鑒默契兩相冥感當叩厥衷天心具焉人念存焉天人在中誰堪顯覺孔氏嘆其莫我知也端木子猶不能測孔氏之心惟聖下學上達知我其天之解而端木始得之况眾羣乎孟氏曰君子所爲眾人不識此中隱寓天道之義天道惟何其誠乎其普乎其視物一體乎我能以身爲羣眾身爲天下羣眾身爲千萬世羣眾身則非巳一人之身實是天身實是天心何以分别天與人也我若心有差等不合於羣是我之自私自礙自遠於人卽遠於天何以得道何以稱道身稱天身天之道弘人自小之天之量廣人自隘之天之德厚人自薄之天之體高人自卑之不知凡聖同類能修則聖不修則凡聖體明哲人能察物卽明卽哲聖用廣大人能施之卽廣卽大中庸曰致廣大而盡精微大學曰豁然貫通表裏精粗無不到全體大用無不明是言人也卽言天也世何以不明而漫云道不可入天不可學聖不可幾歟古聖曰與天爲徒是其類矣今人悟之初識自家面目未别乎天何不問已性而自迷厥種而淪於幽幽也時覲諸天明心悟性往往若斯非獨朝尊一頃之際過此忽荒仍昏其志謹對羣聖念念如斯刻刻如斯不敢違忘志心懺運大悲先天盤古周御國王天尊大悲中天斗姥大聖元明道姥天尊大悲北斗解阨延生天尊大悲南斗六司延夀天尊大悲東斗主算天尊大悲西斗紀名天尊大悲中斗大魁保命天尊大悲二十八宿週輪天尊大悲周天眾星合算應福天尊大悲天人一體天尊大悲聖天一德天尊大悲凡修永證天尊大悲哲修天尊大悲𥈠修天尊大悲廣修哲慧天尊大悲弘持𥈠體天尊大悲星哲天尊大悲斗修運志朝天運德大持光明心性如水運心運性協星普慧天尊大悲功大合斗天尊大悲斗慧符體天尊大悲德哲合星天尊大悲智篤星禮天尊大悲部屬斗垣天尊大悲部屬禮星證夀天尊大悲部屬禮星福化天尊大悲部屬禮星證祿天尊大悲部屬禮星證㝠貴天尊大悲部屬禮星證道天尊大悲天道合修天尊大悲天道合禮運合斗宫天尊大悲天道合大聖天尊大悲天道合大哲天尊大悲天道合大慧天尊大悲星道合性道天尊大悲天道星道合文章德性道齊明功化天尊大悲神靈在性天尊大悲文章著體天尊大悲風化由星天尊大悲雅化從星天尊大悲合斗天尊大悲眾星來體天尊大悲星合自神天尊大悲普功天尊大悲大普聖功天尊大悲石庭注勳天尊大悲量體至洪天尊大悲精德天尊大悲致微能察天尊大悲察微不覺天尊大悲化覺天尊大悲能覺能化天尊大悲雨苗天尊大悲雨寶苗天尊大悲雨時天尊大悲雨不時化能時潤體神普潤物大化大神天尊大悲風合體神天尊大悲谷口輪體天尊大悲風谷來身天尊大悲谷神天尊大悲徹天在性天尊大悲性聖天尊大悲性通天神天尊大悲神通天體天尊大悲愛化天尊大悲慈愛化羣天尊大悲愛廣斗慈天尊大悲慈和天道天尊大悲天慈天尊大悲聖和天尊大悲處世出眾天尊大悲超世住羣天尊大悲夀嶽天尊大悲大夀固嶽天尊大悲泰根天尊大悲山地廣容天尊大悲忘神上遊天尊大悲虛空超滅天尊大悲凌空境天尊大悲升空界天尊大悲懸虛若斗固體若山空飛來去自如不礙天尊大悲空飛自樂天尊大悲世世虛住天尊大悲超遷落魄天尊大悲明登天尊大悲顯超天尊大悲顯破幽迷天尊大悲破礙天尊大悲破慾天尊大悲破幽關天尊大悲破色境天尊大悲破迷慾界天尊大悲破空界天尊大悲破虛空界天尊大悲破滯昧天尊大悲破大迷昧天尊大悲破羣迷界天尊大悲破人慾界天尊大悲破鬼慾界天尊大悲破天魔慾界天尊大悲破地魔慾界天尊大悲破大千世慾界天尊弟子某等欽仰高尊運心勤禮得大悟根悔大愆咎望我諸天拔我虛界有如幽迷一時頓破有如障礙一時打破有如虛空一時登破有如積滯一時悟破開心朗性現出原來地獄羣罪得破以超鐵圍重重得破以出神聖光明得破以見刧罪世愆得破以解寃因破以伸孽因破以去化化神神無往不透永樂優游長沾大惠得恬自性共證丹庭偈曰問天問聖問吾心聖合天心我亦神莫道天神非我體原來一脉共相生讚曰天眞非邈與我同情原初本面共其根止怕礙凡塵打破𡨚因現出此眞人聖神無種惟在殷勤詳參個裏妙消音不異古初新傳授禪門豈別眾羣心諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天眞宰度災濟刧萬眞無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護巳身處處䝉恩人人佩澤大悲大願大聖大慈玉經啟教金闕萬福護身眞人流衍萬眞妙寶神功顯號應化天尊偈曰身丹妙寶斗居先顆顆明明透大田能保吾精無漏洩何憂足下少雲端神騐如響第四十一分道言天無日月何以光明日月無星何以次道故三光配德而濟天也陰陽寒暑以分春夏秋冬以序水火木金土以立東南西北中以位皆星辰之所列以各定之以渾合之以體用之以化生之悉是以成至於人之體神之靈亦是以變何所非星辰而出治也人但知禮斗之文不解拜星辰之妙玉樞曰運心北極卽有冥感夫運者何所謂運己之心神上契天心之脉緒揣合高明之德體思光朗之精次舍何分宮躔何序奚以爲遲速奚以爲伏留奚以爲進退奚以爲順逆了了於心默默以叩北斗靈章曰如覩星辰之象如見天尊之容是也欽天者熟諳天文不復知冥感之意不過依次推測依式遡追尙多舛誤况能默契矣乎是以訓世之叩斗者宜知樞紐之關當明轉旋之用諸天眾星其神有九乃眾辰之所繫一星動則萬星皆移一星止則萬星皆停所以北辰居而眾星拱之者此也所云神之有九者卽貪巨祿文廉武破謂之七大皇也尊帝二星卽天皇紫微合七辰而爲九皇也方以此區日月陰陽之道以此而經經乃日月所厯之道井井然不紊朗朗然以白初成法界大示規模而人身血氣賴以通流旣血氣賴以通流人心神安得不默爲契合所云冥感不論而明其感必應其應必效其效必神神騐之理在於身中此章之義表發斗星之微最爲靈妙因以是心上叩諸天如運吾斗不敢怠荒敬恭拜禮大悲先天盤古周御國王天尊大悲中天斗姥大聖元明道姥天尊大悲北斗解阨延生天尊大悲南斗六司延夀天尊大悲東斗主算天尊大悲西斗紀名天尊大悲中斗大魁保命天尊大悲二十八宿週輪天尊大悲周天眾星合算應福天尊大悲慈惠廣布天尊大悲仁施普德天尊大悲發輝覺映天尊大悲聲明天尊大悲色隱天尊大悲欽辰上證霛曜弘著大朗九元天尊大悲恒貞八覺天尊大悲敷元達智天尊大悲朗敷天尊大悲金木會局天尊大悲金月覺化九星復神來體成慧井曜沉朗天尊大悲布宣大星天尊大悲皇辰普明天尊大悲皇圖照神覺運大度天尊大悲明分野合星度正意天尊大悲昭經明緯天尊大悲照示黃赤天尊大悲黑道開朗天尊大悲黑道通黃天尊大悲赤道通黑天尊大悲五光透天尊大悲五色覺天尊大悲五色化天尊大悲五光達天尊大悲五光五色咸達天尊大悲感應無移天尊大悲應妙神通天尊大悲應化至聖天尊大悲應化遠神天尊大悲至遠通神在性合光孚聖天尊大悲符文通應天尊大悲符神天尊大悲符契在心天尊大悲星心兩應天尊大悲體虛星合天尊大悲身符斗天尊大悲斗來體天尊大悲血斗天尊大悲氣斗天尊大悲神斗天尊大悲三辰聚皇天尊大悲皇星復元天尊大悲大運樞天尊大悲大轉旋天尊大悲至靈至感妙應在元無區渾合天尊大悲恩溥神會天尊大悲仁通大曜天尊大悲洪恩至溥天尊大悲功流滿布修心得果天尊大悲推詳陰陽明决星曜仁功大溥天尊大悲樓臺彩耀五光德大天尊大悲靈光正照身田斗彩天尊大悲鼎宣文德天尊大悲丹出海鼎天尊大悲霞耀斗罡萬靈威伏天尊大悲羣妖膽落魁威天尊大悲丕振斗柄天尊大悲輝臨四壁天尊大悲伏威天尊大悲雄鎭天尊大悲大雄輔績赫濯天尊大悲政輔洪康天尊大悲恬康萬樂天尊大悲慶善天尊大悲兆成大慶福國天尊大悲集成天美天尊大悲細德成山修梁作果廣證福田天尊大悲聚星五内光彩外昭天尊大悲斗福益修天尊大悲沙門衍福天尊大悲大集法樂天尊大悲法部龍神昭惠降身天尊大悲神庥大惠天尊大悲部禳水阨天尊大悲部禳土阨天尊大悲部禳金阨天尊大悲部禳火阨天尊大悲部禳國阨天尊大悲部禳家阨天尊大悲部禳身阨天尊大悲部禳男阨天尊大悲部禳女阨天尊大悲部禳小兒阨天尊大悲部禳刀兵阨天尊大悲部禳蟲蝗阨天尊大悲部禳虎狼阨天尊大悲部禳一切阨天尊大悲部禳五方五帝八域八神十洲三島諸邪諸祟降流洪阨天尊如是諸聖對越澟然依科修奉正意恭䖍洗心懺悔望鑒凡誠垂矜愚昧凡我弟子某等所犯罪愆久瀆星辰常慢天文對三光而唾溺向東西而簡或詈或瞋指星嬉笑無量無邊若多過咎不知我能覩其星辰星辰亦能明覩於我我見星象星見我心旣能相視罪何以逃罪旣難逃災何以免今對諸天一一懺雪懇祈赦宥開以新途往遷存樂普惠天人偈曰至德流傳法界週三辰垂象普通流人心妙感天神格應驗谷虛響若投讚曰應當迅疾默默無聲渾然一體在虛霛寸地可通神此念如誠萬聖豈浮情空中懸象實透羣心彰彰布列對吾形頂禮不沾塵㝠契相因未止見垂文諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天眞宰度災濟刧萬眞無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護已身處處䝉恩人人佩澤大悲大願大聖大慈玉經啟教金闕萬福護身眞人流衍萬眞妙寶神功顯號應化天尊偈曰莫道虛空是象形誠心一格自功成許多古聖誰知悉盡屬眞忱運斗人運斗證功第四十二分道言斗列天空空含斗象人見其光莫明其理所云人與斗合斗與人應者何自按厥身實有妙理且勿論其百骸諸絡一身血氣週通者盡關斗辰卽其所巨者而約言之心爲身主心聽乎