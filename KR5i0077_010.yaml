body:
  text: 三寶萬靈法懺下元道士王守上閲四元誥志心皈命禮高明峻極博厚無疆汪洋浩渺潤羣生朗耀輝煌臨衆品紫微淸虛而洞陰熒𤉨皆屬命於司曹賜福赦罪而解厄延生總慈悲之大德運行於二十四氣道冠於萬億千天大悲大願大聖大慈天地水火四元四品四官大帝大上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懺四元卷五下第十策偈曰無分凡聖總需身一滅今軀莫再尋寶在現前當自惜休將百體比塵輕無喪身寶第二十八分道言功不可以妄著力不可以虛加全賴一身以為宰也勿曰我身是輕我身即稱大寶神聖由此而立佛祖需此而成非身無濟非身莫升升者升此身成者成此身利人濟物先用於已宣聖謂不可以從井何歟誠者自誠而道自道所以萬物皆備反身大樂均此之賴不言而明人體上戴於天而天借之下履於地而地托之天地難言而我彰之凡經綸其大經立大本達大化統大功誰耶無謂聖不可學宣聖不廢力行顏云我亦丈夫孟氏曰堯舜同人皆此謂也身具四端充之即聖身含萬靈化之即佛故釋家云人人本有個個不無皆無外乎身也循命則正越理則敗巖牆不立桎梏不來是重身也內藏明珠珠不可摹外彰朗日日不可扳未象未形其用冥冥若此一身可捐則古之大聖大賢何以保體如珍臨深履薄戰戰兢兢可不必矣釋之迷愚棄五體而不用廢五官而不修或喪或焚百苦自殘非也除是大了大悟內外交通涅槃而逝坐脫立亡心與身融身隨心化亦悉先用乎身以作證功之本如昏昏自墮棄捐本真體滅如灰性滅如燈風散我性氣盡體亡草木冬稿猶復春生人身苦朽一失莫再斗經曰人身難得此也昔賢云一失人身萬劫難亦類此也所以教人惜身惜身必先惜性惜性必先養心皆不可缺今對道前一一悉悟安敢忽輕特向諸天叩心禮運大悲上元九氣賜福天尊大悲中元七氣赦罪天尊大悲下元五氣解厄天尊大悲乾元三氣延夀天尊大悲理元無礙天尊大悲貫理悟真天尊大悲得悟即忘天尊大悲徹理天尊大悲瓊心天尊大悲寶山王天尊大悲重大月天尊大悲圓滿月天尊大悲心理天尊大悲同一理貫天尊大悲體備玲瓏天尊大悲光神遍徹一神萬通天尊大悲在天悟世天尊大悲在世達天天尊大悲贊和天尊大悲輔位天尊大悲充珍具天尊大悲塔旋天尊大悲齊天政天尊大悲養天和天尊大悲備萬物天尊大悲存天化道養體全神贊物育品百備福利天尊大悲得經入哲天尊大悲明保大體天尊大悲克潛天尊大悲敷飛天尊大悲化類天尊大悲四序育和天尊大悲位居渺漠天尊大悲漢流達溟天尊大悲足寶天尊大悲身佩重寶天尊大悲琳琅鏘韻天尊大悲利珮天尊大悲庶品成珍芝草綿體萬祉悉萃川源派寶天尊大悲神敷萬彩天尊大悲根靈天尊大悲元聖通天尊大悲本元光燦天尊大悲灼目天尊大悲冥灼目天尊大悲慧體聖心天地自復陰陽盡運天尊大悲輪達天尊大悲腹貝天尊大悲繡芝體天尊大悲錦心珍體天尊大悲香運正元天尊大悲元朔和景天尊大悲高森天尊大悲廣肅天尊大悲雍怡天尊大悲車鳴鸞悅天尊大悲鶴羽素飛雪沉翎白映體浮輕天尊大悲翔鳴天尊大悲太素內完天尊大悲匠心治運天尊大悲天魁大治天尊大悲煞治天尊大悲南延天尊大悲東延天尊大悲苦延天尊大悲夀元萬寶天尊大悲流治邪風天尊大悲存流大教天尊大悲法修體存天尊大悲攻外邪化內祟天尊大悲照自性明羣心千具萬備不滯元通天尊大悲爐篆飛羽天尊大悲丹爐運身天尊大悲爐在庭臺備頂崑上崙下首足一羽天尊大悲脫息天尊大悲不需一息天尊大悲頓了猛通天尊大悲法力法運天尊大悲風聲訖遍天尊大悲化珍天尊大悲度迷孩濟天尊大悲達變化天尊大悲統權通天尊大悲赤運天尊大悲富充海田貴榮河芝蓮寶大川秀發天尊大悲丹芝在頂天尊大悲履翠天尊大悲忘脫天尊大悲玉顏變妙天尊大悲妙不可量天尊大悲道原大變天尊大悲化羽生神天尊大悲工度天尊大悲百絡貫元天尊大悲雪飛成道天尊大悲瓊寶飛雪天尊大悲凝元化元天尊大悲保身元天尊大悲透羣理天尊大悲品貝天尊大悲洗雪體備天尊大悲內名淨滅天尊大悲朗照元體天尊大悲印天無二天尊大悲印體合天大本一意天尊大悲印心太素天尊大悲心與元合天尊大悲印性天尊大悲元明空潔天尊大悲曩照今覺天尊大悲古明昔慧一體天尊大悲九正天尊大悲七一天尊大悲五正三合天尊大悲空一天尊大悲至一天尊大悲至虛無滯天尊大悲習虛天尊大悲太一習空天尊大悲習性合天無二天尊大悲真空合我我合天空至一天尊大悲神靈空印天尊大悲神至人符天尊大悲神人一性天尊大悲神輕體虛天尊大悲神易身廣天尊大悲人體合天元性天尊大悲上下一體同德天尊大悲道德印心天尊大悲遠心近合天尊大悲兩宜正直天尊大悲坐坦天尊大悲坐常平易天尊大悲卧體天尊大悲坐與臥符天尊大悲行坐一常天尊大悲行居常在天尊大悲行坐體虛真常不離渾合天尊大悲坎德見天一合天尊大悲離德徵空太和天尊大悲大道全卧天尊大悲至德全空葆體天尊如是諸天聖號今得拜稱真宜大慶未可忽輕奈我弟子某等素不寶身原多芥體飛塵再再而不知掃積障重重而不知揭滿面昏䝉渾心迷昧成五脆之凡驅作萬魔之聚類何以能謝終不可驅恐我弟子某等靈光卒難摹捉珠碎玉灰竟莫得惜徒嘆虛傷奚以善後望我諸天盡行赦宥倘𢹂高登想恩普錫四元聖衆俯隆生巾高聰偈曰寶相原從不相來靈身莫作一塵灰丹居全賴軀為主養得完圓證聖胎讚曰靈臺有主來去存身放之彌宇斂之心頃爾化無停總聽乎神性命兩相成一珠休碎美玉莫塵虧玷無光色缺溫皆緣自已傾剛才失郤萬劫總難尋諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天真宰度災濟劫萬真無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護已身處處䝉恩人人佩澤大悲大願大聖大慈玉經啓教金闕萬福護身真人流衍萬真妙寶神功顯號應化天尊偈曰意念從心不可馳一馳邪祟便從之人身那有魔干擾猿馬牢牢緊縛持息念伏魔第二十九分道言身畏災纒災不著於至人之體心從邪亂邪不入於君子之衷一念正則萬邪不來一念萌則千思俱集信乎有何魔也信乎魔可斷也天上有魔魔在天而人招之故佛書云心本虛湛萬事成擾不得靜故不復得覺故又云寂滅其心因寂滅其意魔亦隨而寂滅之是誠然也玉典曰持是經人名淸淨身是諸惡孽不能侵故持是經人名威德身天魔外道不能攝故功德在人心大道亦在人心非功德足以遠魔惟人心足以消魔然止一心何以消之觀古之大人成祖登仙不始從鐵人面壁不能證覺一坐如石一行如石行住坐卧莫不如石屹屹然寂寂然蟲之蟄歟虬之蟠歟禽之抱歟草之藴歟有若種種不能一升則何物亂我而使搖搖成患攘攘成災體之不寧皆由於已鬼本無形體象面目自我而生鬼本無聲音響哭笑自我而作昔人有過東山者遙覩其樹厥枝長茂昏月之下有若人形首體肢腹邈邈肖之其人以為鬼厲驚而幾死及黎亮卧地起觀樹也乃解其疾嗚呼非疾解是疑解非疑解是心解天下何事不從疑生何疑不從心生何心不生疾何疾不成災是心不明則思慮重重事故叠叠以至多魔弗能淸淨是有三妄為害一過去一未來一現在是三種妄心人皆識之既皆識之何不明之既皆明之何不了之能了則化化則忘忘則滅滅則何魔從入也是皆吾心作機以致之故曰斂心是道用心亦是道用正斯正用邪斯邪如拙守而不知用則稿稿灰灰夫復何貴於人靈乎又何貴於神靈乎故今向道場之前演此法文教示羣生運用妙心勿將邪亂亦勿將枯滅特奉尊科默禮天顏有如親炙恭敬叩瞻諸魔咸伏大悲上元九氣賜福天尊大悲中元七氣赦罪天尊大悲下元五氣解厄天尊大悲乾元三氣延夀天尊大悲正心冥道天尊大悲意禪俱寂天尊大悲我念空寂天尊大悲正身克私無為恭默大冥聖禪天尊大悲恭思神智天尊大悲深了天尊大悲明證天尊大悲空禪天尊大悲穆穆肅潔天尊大悲恩弘除滅天尊大悲神思大運天尊大悲深明覺寶天尊大悲保思無擾天尊大悲真明廣慧正恭升神餘意悠神大覺用升天尊大悲敬竭寂念無為天尊大悲仁思和葆身心滅淨廣德正天惠慶平息天尊大悲甲寂萌淨無覺天尊大悲林深除市天尊大悲桂淸竹結絶意坐深天尊大悲安敦山神天尊大悲山固不思天尊大悲坐涅了無天尊大悲絶思天尊大悲位和天尊大悲峯翠天尊大悲秀餐天尊大悲香松天尊大悲雪蘂餐實天尊大悲鳳竹天尊大悲大厄化氷天尊大悲罪厄頓消天尊大悲宥消宿咎天尊大悲過條悉滅慶祉全增皇躬克命恢弘大道廣福天尊大悲鍚恩無量天尊大悲賜祉無跡天尊大悲冥福百致天尊大悲大祥來慶天尊大悲政齊天尊大悲明潔大悟天尊大悲宿根善積天尊大悲旬周頓德天尊大悲遠肅天尊大悲大源萬滙天尊大悲揚德深明天尊大悲功固天尊大悲地潔思普天尊大悲斂功天尊大悲率土咸依普天偕頌高渺歸一大公覆物天尊大悲菩德天尊大悲慈功天尊大悲慈利羣物天尊大悲正物入德天尊大悲九物普世天尊大悲三生利羣天尊大悲活物保殘天尊大悲炎濟寒品天尊大悲冰炎利物天尊大悲正天法地天尊大悲梁利天尊大悲道路平濟天尊大悲聖炎天尊大悲神智遠運天尊大悲天開覺達濟世普救天尊大悲慈光深照慈潤法施大惠利人頌功勒永天尊大悲日聖大徹天尊大悲淵冥天尊大悲遙光天尊大悲輝文天尊大悲赤朗映心天尊大悲廣赤耀天尊大悲深照虛天尊大悲孚神德天尊大悲利凡愚開聖哲洪利允心天尊大悲厯肇廣淸天尊大悲滌宿垢錫今祉自開大慧異敏奇禪人天普德天尊大悲解悟非凡天尊大悲浮華頓除天尊大悲門啓納禪天尊大悲立氷宿化天尊大悲心華大開天尊大悲轉悟立覺了明天尊大悲天華墜玉天尊大悲立消惡孽天尊大悲滅祟天尊大悲除思不祟天尊大悲掃魔正思天尊大悲不念萬滅天尊大悲捐位天尊大悲捐意天尊大悲意不爵思不嗣了身了衆天尊大悲花啓悟天尊大悲酒啓悟天尊大悲死啓悟天尊大悲生啓悟天尊大悲永生天尊大悲永生不悟本覺從始自來自去雲坦浮空天尊大悲長大百尺變化屈伸自得天尊大悲風狂顚柳克雅神致天尊大悲虛流正空天尊大悲灰寂天尊大悲邪渺難捕一心頓化天尊大悲萬歸大道天尊大悲百祿來從天尊大悲福災并判天尊大悲恍惚神會天尊大悲靜魁大衆天尊大悲前業淨今功積五劫開明天尊大悲八世超凡天尊大悲帝修天尊大悲廣劫多修天尊大悲月功歲德綿綿不息劫利廣大天尊大悲柳竹悟道天尊大悲素名天尊大悲聖風大訓天尊大悲金玉身神天尊大悲液液天尊大悲符符天尊大悲上升天果天尊大悲闕丹上詔天尊大悲寶爐記字天尊大悲永大夀天尊大悲延多劫天尊大悲綿人夀天尊大悲紀息天尊大悲養玉苗天尊大悲教大化天尊大悲訓神利天尊大悲風物範俗天尊大悲道樹天尊大悲拔孽樹天尊大悲存蛇利天尊大悲