中庭端明恭思篤已無馳古訓丹訣云火燥丹飛火滅丹絕火之爲用所最𦂳也先勿問水之濟與不濟火候能調水自來交所云火者非烮非焚卽吾氣也氣有假眞邪正之分外謂之假内謂之眞紛謂之邪一謂之正能守其一而全其内則汞與水符水不待取而自涌涌以潮諸火不必驅而自淨淨以熄更宜循乎所用凡飲食服取之間行居坐臥之際語默出處之中皆有其節如時之有四炁之有二十四候之有七十二非順則乖乖則逆逆則傷傷則疾何不明也何自敗也丹在乎中而無丹之象丹在乎淸而無丹之色經曰丹在身中非白非靑奚有謬歟出納之妙第一當知存存之要亦宜自悟着相着色萬邪皆至仙典曰若視之以眼目是境染於魔精能若斯以守之則守得矣若斯以温之則温得矣譬之苗在田三時應序何所不收邪思害氣邪莠害苖一也今我弟子䝉大法利益當加省悟勿失源流先滌過愆隨如妙法未見高尊若存天聖况叩神庭敢生逸豫因斯運禮恭敬儀容大悲上元九炁賜福天尊大悲中元七炁赦罪天尊大悲下元五炁解阨天尊大悲乾元三炁延夀天尊大悲無儀無畏天尊大悲混眞大會天尊大悲俯伸得序天尊大悲四時應炁天尊大悲大法演道天尊大悲眞寶流運大炁通天㤗身泰國八升六降天尊大悲上流序天尊大悲下通天天尊大悲中貫神天尊大悲神絡部天尊大悲氣絡部體天尊大悲寶形天尊大悲上際聖天尊大悲上下隨聖天尊大悲六馬在轡天尊大悲音炁達神天尊大悲紅聖靑碧天尊大悲白聖赤流天尊大悲異道齊一無派列分天尊大悲渾偕天尊大悲百千赤馬天尊大悲獨馭一身天尊大悲護炁天尊大悲魔洗福至天尊大悲火氣靑天尊大悲水氣交天尊大悲淨弘邪天尊大悲自魁天尊大悲自居仙品天尊大悲口耳盡除天尊大悲大說法王天尊大悲大立訓王天尊大悲釋惡本天尊大悲齊諸法天尊大悲接通天品天尊大悲乾元輔濟天尊大悲上乾得道天尊大悲上體能開𥈠明自葆素素納用天尊大悲衞衞天尊大悲扶身得正天尊大悲闢力天尊大悲志立天尊大悲道志廣修天尊大悲知五立達五用明神德透神法樂通天尊大悲布羣丁素通天寶天尊大悲玉温天尊大悲順守天尊大悲應節候統元流天尊大悲分混天尊大悲合炁週廣天尊大悲火息水息功力虛化天尊大悲依振塵微天尊大悲書帝號持帝名時格時應天尊大悲皇居常定天尊大悲眞人自正天尊大悲眞人扶炁天尊大悲眞人濟難天尊大悲瘞即寶濟天尊大悲佩玉若忘天尊大悲得理序天尊大悲雷威啟孝天尊大悲明眞達德天尊大悲嬰孝天尊大悲翁孝天尊大悲正已感德天尊大悲忘體飡蟲天尊大悲食藜自素天尊大悲奉典克欽天尊大悲神目天尊大悲神耳天尊大悲心神懷天念典化渾致召百慶天尊大悲水功天尊大悲利益羣水天尊大悲通羣梁天尊大悲達大典天尊大悲無貪珍天尊大悲氣寶保榮天尊大悲貴德充道天尊大悲能混天尊大悲駕彩龍天尊大悲來羣鸞致九龍刻應天尊大悲拔土木天尊大悲洪彌天尊大悲大慈利天尊大悲廣納神元天尊大悲卜充素足天尊大悲數應禪丹天尊大悲無丹飛神天尊大悲胎息臥靜天尊大悲夜如晝光如月珠心玉神天尊大悲德齊均治天尊大悲邪逐自若天尊大悲敗異魔天尊大悲殺神祟食虎豺威威上志天尊大悲力重天尊大悲服惡蟲天尊大悲鍚息天尊大悲錫爵息天尊大悲滅暴風天尊大悲飈音標滅魔精天尊大悲電逐天尊大悲風王輔正天尊大悲雨王大利天尊大悲雷王派流天尊大悲忠德天尊大悲開膽天尊大悲伏檻苦國天尊大悲破體衞王天尊大悲存主天尊大悲保王身天尊大悲榮裔天尊大悲爵山天尊大悲恩廣羣庶天尊大悲德利天尊大悲聖國上存天尊大悲福年百增天尊諸聖高高羣眞羅列如此森嚴下皆竦懼特舒寸愫仰達尊庭無何眾志難淸多生紛雜本有昭明之路而故入阱中原著科訓之條而竟迷俗内人心不一羣念皆昏存養不遵於道温習未久於行視若罔聞何曾諳想棄身如芥輕性爲塵一失其根萬千誰贖謹對尊前一心愧雪敢希神宥悉賜寛原得仗洪慈證盟良果盟卽盟字偈曰性中自具一明珠止爲身軀障未除智劍誰能親斬祟光輝一鑑半塵無讚曰四元一本萬聖同根人能體會豈殊分個個不凡身寶劍光新斬滅祟無形高尊赫赫羣聖森森鼎中香氣起祥雲何必向天庭就此神明皆可驗人心太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懺四元卷五上第九策畢諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天眞宰度災濟刧萬眞無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護已身處處䝉恩人人佩澤大悲大願大聖大慈玉經啟教金闕萬福護身眞人流衍萬眞妙寶神功顯號應化天尊
