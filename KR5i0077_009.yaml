body:
  text: 三寶萬靈法懺下元道士王守上閱四元誥志心皈命禮高明峻極博厚無疆汪洋浩渺潤羣生朗耀輝煌臨眾品紫微淸虛而洞陰熒𤉨皆屬命於司曹賜福赦罪而解阨延生總慈悲之大德運行於二十四炁道冠於萬億千天大悲大願大聖大慈天地水火四元四品四官大帝總讚元炁分區四光來共一陽無分汝我總在樞綱天覆蔭地開光發生萬品至精詳水火身中妙非專道福殃能調能運豈成傷今對聖叩神堂儼然陛闕任趨蹌這等光鋩安可較尋常太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懺四元巻五上第九策偈曰此神何養是我眞元精本可造天嬰胎從聖體生來有止愁塵垢礙霛人生神不朽第二十五分道言身中有物物乃至靈身中有所所無定居在於虛來亦從虛往往來恬恬不滯不着從己所養無失厥時息息常存存無乎存神乃何物在於氣充氣與精依則神自豐神似日光無隙不透神存於虛氣精悉捐遊於空湛之中淡乎無爲之際先培其精旋生其氣氣不竭而大神出焉人不知妙徒空存思但察往來之内反求夢寐之間淸心淨慮獨守其中我曰有爲人求何爲實爲而未爲也我曰存物人乃學存實存而莫存也雖云幻空實出眞境雖云眞確果復空虛精與氣合相有跡存精與氣化靈乃現光太陽在天復輪於地不淪不錯四時如常俾其有作必至無恒所以春秋寒暑毫不差失是也光發於虛妙存於旋旋者惟何卽潑潑地體内有陽同於日體體非血肉神光具焉慧者生也昏者死也陽竭於身厥思昏昏久昏必濁濁重必死人身難以自舉皆因重濁古有云人有千鈞之力而不能自舉其身我云體有一毛之重若舉則一毛不着詩曰毛猶有倫神乃不聞不見去則無跡來復奚踪正以此也不可墜墮有何窺聽然則養者養此物也保者保此物也恒養恒保在乎存存心印經云若亡若存綿綿不絶其味湥長一息之中然不可斷斷續自如與天爲合我去天來天來我接微乎易得旨哉易形至於能形又非大道孰無所有實自傷虧從何以傷嗜慾所害淡然冥居欲無從起孟語云無爲不爲無欲不欲卽此類也人神重寶寶不能擬人神如天天或可學寶貴不越萬金金猶足得神貴非物可貪須澹乃收澹忘冥化豈容貪思我具神物我忘神物及用其物神斯來應隨往隨行隨收隨住如聲響然擊考洪鐘聲鳴應手手住響息安知聲奚來去神明不測人人俱得不知所培自絶自滅鳴乎痛歟宜速靜覺勿待其敗如燈盡復燃光非舊照何不思之反自損之如我所示尊文所揭尊號假借兹言兹字爲度身之津梁作升神之路徑寍有害耶實自宜矣懷忱盡敬人各運禮大悲上元九炁賜福天尊大悲中元七炁赦罪天尊大悲下元五炁解阨天尊大悲乾元三炁延夀天尊大悲統攝大元天尊大悲部領綱維天尊大悲權總神界天尊大悲大千分部天尊大悲天中往去天尊大悲六合週遊天尊大悲雲臺山運道天尊大悲正明天尊大悲大欽元道天尊大悲敬敷元教天尊大悲經密理天尊大悲溥宣天尊大悲宣大惠天尊大悲濟扶人天尊大悲應難天尊大悲智本湥厚天尊大悲隨聲赴急無伺間然天尊大悲光明一灼疾趨往來天尊大悲身元普人體中自然感應天尊大悲元炁應時天尊大悲修自然天尊大悲完元天尊大悲灼然朗天尊大悲不損元天尊大悲大廣修天尊大悲神在虛空天尊大悲琉璃體天尊大悲遍身光照天尊大悲徹明天尊大悲廣厚天尊大悲大潤物天尊大悲普徹天尊大悲昭朗天尊大悲温和自養能温人物不居實所天尊大悲修道忘道天尊大悲道眼端具天尊大悲法朗藏天尊大悲大男子天尊大悲英卓天尊大悲英異敏天尊大悲廣開教道法無窮盡天尊大悲法不具天尊大悲空然天尊大悲林空風入天尊大悲施不是施是大施天尊大悲何所思議天尊大悲知定天尊大悲止在天尊大悲莫所止天尊大悲安天地運水火無所侵傷天尊大悲火災悉除天尊大悲重絶火天尊大悲絶大阨天尊大悲釋羅網脫桎梏天尊大悲生死除滅天尊大悲宥人愆目天尊大悲大寛世網天尊大悲反覆就人天尊大悲度人無盡賜人無盡度福廣大天尊大悲月光照天尊大悲燦心天尊大悲飲元天尊大悲吞魔内化天尊大悲淵徹岸天尊大悲岸坦度天尊大悲度在手天尊大悲活靈天尊大悲鼓舞自神天尊大悲神動人天尊大悲生人敬天尊大悲齋明潔内外不干紛天尊大悲崇除天尊大悲遠退魔崇天尊大悲殺誅惡鬼天尊大悲遯形天尊大悲化形遯天尊大悲跡存跡亡天尊大悲無定天尊大悲無定有定禎慶天尊大悲寶鼎温洪天尊大悲不着色物天尊大悲不着大物天尊大悲恢漠學德玉體温潤天尊大悲水恬徹物天尊大悲遍空天尊大悲空自如天尊大悲誠性智繁天尊大悲傾心仰玉天尊大悲帝詔升天尊大悲起飛大羅天尊大悲太淸御座天尊大悲坐向寶林天尊大悲寶具十珍天尊大悲不凡超聖天尊大悲大越羣天尊大悲普救天尊大悲普濟一切苦天尊大悲垂念危窮天尊大悲六道光天尊大悲四生度天尊大悲八難除天尊大悲九幽徹天尊大悲大空徹天尊大悲螢渾忘存天尊大悲綿綿息天尊大悲息在一身身週八遠天尊大悲方方救人不忍捨天尊大悲常應物不竭物自然自在天尊大悲求道得丹天尊大悲道存道亡天尊大悲運心形天尊大悲三界通天尊大悲運行星象天尊大悲復元無始天尊大悲始無所始太元一來不存不去天尊大悲皇樞廣大天尊大悲樞合天尊大悲剛和天尊大悲天形不住天尊大悲地形不墮天尊大悲流行不息天尊大悲長照不滅天尊大悲采光生充天尊大悲華精化化天尊大悲風雲在體天尊大悲龍起住天尊大悲虎縱斂天尊大悲獸猛烈天尊大悲威容奕奕天尊大悲濯潤天尊大悲大温容