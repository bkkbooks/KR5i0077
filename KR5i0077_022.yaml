body:
  text: 三寶萬靈法懴下元道士王守上閲三仙誥志心皈命禮派原一脈道重三仙長生衍閬苑之春聖夀赴蟠桃之會羣修統領東華立極於丹門後學宗依老祖收緣於末劫始於口口相傳而不記文字繼以方方顯化而大願圓成至慈至仁至靈至聖瑤池聖母東華大道帝君純陽演正真人三仙合濟天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴三仙卷十一下第二十二策偈曰世間不顧命何因止為錢財不用人豈論黃金多與少貪求寧把命來傾喪命貪多第六十四分道言修身之道以命為根修性之理以命為要非命則身不固非命則性無來是以中庸言天為始言教盡人言命曰性而道在其中此命不可以末視而忽之也命不立則修身亦虛而無托性亦空談而無濟所以借假成真者體也借有歸無者實是此命在關為鍵何以擲去而不用乎大聖至賢皆以此命之一字為生平通塞之樞作一世行藏之本莫非命也奈何人偏以為輕而不自惜不知有命初有物有物賴命以相守呵呵呵人間失守奈若何止將穀帛為人用不把身軀作寶柯一顆明珠懸妙樹晝夜光輝少障魔賓旅經營無歇息更兼盜寇與風波文武朝門甲胄候執圭秉簡佩鳴珂凡是巧工能技藝何等謀為度日過只此錢資經作濟風霜餐宿受兵磨不問臭翁俗翁論誰識養生衛生歌若肯從斯調燮理性全大用受華麼世間若把榮情少滿前秀麗有山河始見苗滋為體寶豈似錢資反害他從斯運禮諸天聖回心向道覔真窠大悲西池聖母元君太后天尊大悲東華立極大道統宗天尊大悲老祖純陽演正孚佑真人妙通天尊大悲阿羅問道得聖回引天尊大悲太平學道得上高林天尊大悲聖功顯著得緒天尊大悲覆載功高天尊大悲福祿廣厚天尊大悲昭明曩數天尊大悲龍德秀武天尊大悲貉心大照扶聖天尊大悲兔懷陽德中輔天尊大悲恩福天尊大悲德載洪主衍功天尊大悲惠普大德天尊大悲神主萬存天尊大悲祀主存後神在天尊大悲湥恩德素女聖天尊大悲龎淳天尊大悲高素神隱天尊大悲沒存一體天尊大悲在前瞻道共日同月天尊大悲馬健天尊大悲獬麟體異中輔天尊大悲狐孤同體孑異輔秀天尊大悲大德流光天尊大悲洪箕天尊大悲演派天尊大悲香潔大花天尊大悲健體坤重牛象輔就中德光正天尊大悲祉寧天尊大悲福傳千世不老天尊大悲度世萬傳天尊大悲卓冠天尊大悲風流得道古心天尊大悲慵情大道天尊大悲忘心天尊大悲注念大道非禪大禪天尊大悲弘恩德著天尊大悲公道同天天尊大悲道情忘巳神功廣溉天尊大悲扶恩天尊大悲輔中日德鼠廣聖大天尊大悲奉真天尊大悲奉神無厭天尊大悲資廣天尊大悲資利博施天尊大悲流功萬載天尊大悲輔中月德燕聖天尊大悲補元天尊大悲補元廣麗神隱天尊大悲寓居乾戶豚火中聖大輔天尊大悲弘土大正天尊大悲身留鎮主天尊大悲體谷百空道應天尊大悲虛主上升天尊大悲界中天尊大悲流光普映天尊大悲烏德陰照剛中輔聖秀光天尊大悲靈爽昭揭存光天尊大悲府主受靈固土保民直中剛毅福德天尊大悲亷平治衆天尊大悲功浮大神天尊大悲神功丕應廣德天尊大悲績存天尊大悲儉德天尊大悲勳昭存集天尊大悲德高春葉天尊大悲狼狠仁波大雄中輔秀光福應天尊大悲功在百兆天尊大悲虛中受實天尊大悲空存石體天尊大悲金德木成天尊大悲土流浮木修治天尊大悲春秋化衆先近家治天尊大悲勛德存世天尊大悲懷果思親嬰朴天尊大悲大恩成德天尊大悲寡身德光成節天尊大悲貞體郤惠成聖天尊大悲享用萬秋天尊大悲草功濟世天尊大悲草功大濟活人無量天尊大悲功普羣靈天尊大悲大犬剛中純功中輔光聖得濟天尊大悲副功同中天尊大悲得道受勳雉文秀美天尊大悲洪功參地中輔大得利濟天尊大悲微隱施功後出羊德鬼神一道中秀光輔天尊大悲獐舞風勳洪德光輔天尊大悲存軫萬功民安光秀輔德天尊大悲螣擾龍身中光得業天尊大悲電麗天尊大悲春光映道天尊大悲芳草驗丹大悟天尊大悲春秋得永天尊大悲永春應篆天尊大悲符修天尊大悲大修功德不一福應天尊大悲身貴天尊大悲體重金浮大永天尊大悲饜道天尊大悲丹成飽德天尊大悲流風賤物聖體天尊大悲充飲長生天尊大悲福功貴德天尊大悲為人榮蔭天尊大悲丹職天尊大悲葆秩天尊大悲存而不久長思寶物天尊大悲思寶應永得濟天尊大悲洪流不息權隱天尊大悲收縱不一得權在身受福天尊大悲保囊濟體天尊大悲允應大恩天尊大悲祿應天尊大悲爵功上謝天尊大悲穹蒼保體天尊大悲同德上妙天尊大悲一修百全德立無挂天尊大悲雲影何空孤立同上天尊大悲子標皇體忠愛寶寡同保光明民主均諒無患終全天尊大悲洪事懷謨致主大勳遺內捐貧賢輔天尊大悲中恩神武天尊大悲豐德裕全天尊大悲淸行大化天尊天尊大聖彰著人間莫不稱揚歡喜同聲讚歎弟子某等今生有幸得覩慈顔奈其身微德薄寡行微功勝會蒙加利心自蔽萬萬縈心千千絆體無一日之光明有諸雲之合暗虎豺當道燕雀安堂噬嚼不懼其狼餐焚延幾愁於暑熱忘夫酷害竟自輕身望我諸天求我上聖普賜赦寬大開諒宥得見芝容之慈厚多全柏體之堅貞保其餘光普沾洪惠偈曰大恩廣赦下民愆一旦雲收見日顔出我迷途光自見任他暗路幾曾艱由人在處遊皆坦不懼身著體牽天道何嘗虧至性修躬得法有神丹讚曰功夫在巳總不由人丹法無傳遠世塵樊籠絆我身得出飛騰一粒便成真錢穀多少精氣千金一朝魄散化無形怎不自留存此劫難尋資財值幾文諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天真宰度災濟劫萬真無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護巳身處處蒙恩人人佩澤大悲大願大聖大慈玉經啓教金闕萬福護身真人流衍萬真妙寶神功顯號應化天尊偈曰功在全周德在人不虛今世賦天形莫道已身為寡用德能廣播久成真損德慳與第六十五分道言心之所受本天之所與為德以元亨利貞之理賦為仁義禮智之性廣用以德大德以施何為殷殷於保巳不知懇懇以為人人多不足我獨有餘安忍坐瞻其窮苦而自處於裕饒之境欲奚用乎又見路之寡修橋梁道里之崩頽神容佛體之敗毁及貧鰥孤孑之無立衣食服用之不充一布一粟未肯慨然一勺一文不思樂與至於氣絶目關何不先行施給藏之烏用捐則有需備儲積於當塗應飢渴於自取寧不處於優優之先而自免於倉皇之際後來受享猶虛當前濟惠為實蓄金者盈其囊積書者滿其笥厚穀者充其倉養牲者多其圈何不待夫窘乏以餘遺於人之資索者乎譬之積帛藏錦自不著身寧甘寒凍自積多倉寧受飢餒不知何所貯歟其道一也操縱在人猶可去存由巳為權至此曲喻多方胡不自家旁引𨶒君殿上不容情一語當前怎應聲問我有金多與否如何回道是無能有而曰無是欺人也不可以欺天也無而強有是誑世也反可以悅神也此為積德者言難為積金者解今領疊訓重篇敢不兢兢受愧特對高尊至誠叩運大悲西池聖母元君太后天尊大悲東華立極大道統宗天尊大悲老祖純陽演正孚佑真入妙通天尊大悲仙真豫德天尊大悲求丹豫備天尊大悲仙門求布豫辭神愧終祿天尊大悲豫作大惠天尊大悲豫立寶岸天尊大悲得道在豫然後獲酬嬰孩得夀保福天尊大悲洪恩受體天尊大悲惠生千世劫劫受濟天尊大悲存因竹發得永天尊大悲松雲大隱天尊大悲松雪護身天尊大悲留體堅剛不壞天尊大悲金體永固太白一共天尊大悲輔金星君得道天尊大悲因緣偶合松應天尊大悲孤德萬全天尊大悲木神久住天尊大悲長生無朽亨世天尊大悲悔生神惠天尊大悲慧來照體不遠神住天尊大悲祿全天尊大悲夀綿古世天尊大悲絃咏歌成道證化天尊大悲桐絶歌雅化聖全大慧天尊大悲功存神咏天尊大悲寡和得聖天尊大悲存樹弗空天尊大悲鶴存真化楮飛天尊大悲功流百世大智天尊大悲德存虛迹碑永天尊大悲實存天尊大悲大德成形復生天尊大悲履杖均化天尊大悲木身得化天尊大悲草化大身天尊大悲寫書成形天尊大悲宮祠婦惠貞忠代主綿衍世皇大德天尊大悲懇篤捐婦割恩忠義萬全國血天尊大悲成身大烈天尊大悲功顯天尊大悲勳存高永天尊大悲顯績天尊大悲舍取大功天尊大悲藏功不著保身天尊大悲成身全義施布天尊大悲受福能完圓滿天尊大悲月光大映天尊大悲月德施照天尊大悲大月功天尊大悲大星照天尊大悲大榮映天尊大悲大辰星天尊大悲大鎮輔天尊大悲大鎮輔終護民保齡夀完弘節捐身國運天尊大悲輔全小臣終為大節慧生豫名天尊大悲完節武部天尊大悲可信忠德大福天尊大悲全身無名得夀天尊大悲部全家領合忠合節升天受福天尊大悲功全大聖天尊大悲明司受報天尊大悲幽闕上升天尊大悲功存天尊大悲領功天尊大悲綱修大惠天尊大悲升公天尊大悲㩦升大業天尊大悲廣阜喜施天尊大悲貧施天尊大悲弘身九丈天尊大悲身廣天尊大悲心樂廣體天尊大悲洪海濟人天尊大悲殺寇救人天尊大悲殺邪救世天尊大悲道流殺邪濟世天尊大悲道法雨濟天尊大悲雨施困通天尊大悲久旱濟世成功天尊大悲風聲悟道天尊大悲雷隱天尊大悲聞雷生樂大猛天尊大悲厲名天尊大悲厲聲天尊大悲聞聲得悟天尊大悲廣修學道聖門大智天尊大悲成冥報德天尊大悲鈍悟成冥天尊大悲隱名不悟頓智天尊大悲慧劫天尊大悲成身自斃聖修天尊大悲殺體成功天尊大悲殺人救人成果天尊大悲大殺濟世天尊大悲醫人無利大享天尊大悲福利在世自困亨通天尊大悲利德天尊大悲利忘大全日體天尊大悲日光覆體天尊大悲武功天尊大悲武功還殺惠主天尊大悲武雄絶婦成身天尊大悲武雄滅邪受福天尊大悲文臣德武天尊大悲文功報國大部殺身成名無朽天尊大悲功高德厚洪福天尊大悲備力成國文士大功天尊大悲廣修文業法古殺身大濟天尊大悲殺體就忠廣學天尊大悲文德全廣洪備學弘殺身成福天尊大悲才資全世天尊大悲洪能德備天尊大悲邪去修身天尊大悲功禪林隱天尊大悲山居積德大修天尊大悲丹存儒訓天尊大悲修丹完學天尊大悲仙聖普明飛身天尊大悲雀酬世德纍隱天尊大悲功存飛蟲報世天尊大悲修功存穴天尊大悲瘞已存人天尊大悲報世存地天尊大悲布功全穴天尊大悲捐囊就穴普濟天尊大悲均功天尊大悲均濟普人天尊大悲弗思報德隱升天尊大悲上通天界能飛上界天尊大悲三界升聞天尊大悲名高神部天尊大悲名飛體上天尊大悲斧揚鬼怖修德天尊大悲體殘光隱天尊大悲身短功長天尊大悲能開書部大智天尊大悲聖朋修獨德可舒藏車顯行品天尊大悲聖門仙道天尊大悲殺丹得丹天尊大悲禪林大慧普訓天尊如是天尊名號下示人間普聞妙法得步先天弟子某等愧居蛙井慚處管光未瞻聖殿之容惟覩施閨之麗且難捐其金沙之布地况獨守其奴穀之蓄倉近於神顔湥乎俗德一朝猛省千古稀逢望宥凡蒙大開詔