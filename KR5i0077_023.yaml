body:
  text: 三寶萬靈法懺下元道士王守上閲虛皇道姥誥志心皈命禮道從性理靈透天根胎成九九之丹願度千千之劫至尊三寶誰知始自於虛皇皆重羣神莫察先原於道姥索圖書之奇耦窮河洛之陰陽無量度人萬真化號大悲大願大聖大慈混元道姥無上虛皇大帝福顯利幽保生治世天尊總讚光明誠慤運轉陽輝潤滋霖雨混元飛度上紫虛微知達休窺大道隱機推仁寬恭恕襲守禪衣修明實理保前基莫復自頽危密授深批字字豈昏迷聞言可學參取能施十方德濟己身宜空中未負伊次等均提同沾聖母慈山高仰止岸泮迥棲賢人無盡最誰齊惟得輔神依除郤塵思快愈帝心機太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懺虛皇卷十二上第二十三策偈曰振作為人有甚私一心正大自無欺况懷忿恨成凶毒嫉害賢能是禍基懷恨嫉妒第六十七分道言坤之為量無所不容豈有棄穢厭汚而必吐之弗納則坤之為名亦甚屑屑而不尊矣易曰坤之為道大矣哉君子以容萬物乃利貞是以君臣夫婦天地亦然乾道健行坤道順承人之為事非順不可逆拂非宜相時應機皆從順理有何懷定其私而必先遂己欲乎况懷其所恨而自肆其嫉妒乎是皆婦人女子之所為而非大人丈夫之所行也即賢婦女子猶寬廣仁慈傾懷容納滋生多類龍種鳳鷟繼國禪家綿宗承祀不相匱絶矧於大丈夫行事光明磊落以成國體以立家訓以善民風者歟尚容私恨於衷小則喪人宗族大則敗人天下以致賢人隱君子遁天不開地不暢萬物不育諸務失理皆從嫉妒所起而成大否大塞之景象乎是不可以不戒之也今從此懷一化上運高天開民愚昧至誠恭禮安敢焉大悲混元道姥無極運化天尊大悲弘慈應道天尊大悲神風鼓物天尊大悲聖哲應道靈體天尊大悲𥈠聖利物養和天尊大悲成仁訓子扶正遠邪剛烈成規女聖大節天尊大悲神功妙理成烈天尊大悲風聖雨女大聖天尊大悲來節天尊大悲成烈天尊大悲成大節就大法理大孝成大霖聖功神教天尊大悲功能大德天尊大悲聖功力勸無厲武德天尊大悲洪功殺邪福女天尊大悲正殺羣厲福德天尊大悲弘利貞德成烈天尊大悲天德聖福天尊大悲哲明知邪訓人避厲救羣廣惠聖智天尊大悲德惠明哲天尊大悲淑𥈠天尊大悲奏聖大哲天尊大悲廣修外內一體天尊大悲弘能訓世天尊大悲內烈天尊大悲外成圓訓天尊大悲慧福大衍天尊大悲能淑天尊大悲正行光烈天尊大悲伯叔成正天尊大悲三倫天尊大悲羣倫大修天尊大悲雷中三和天尊大悲正經倫順天尊大悲惠靈天尊大悲神利天尊大悲淑慧天尊大悲奉經成聖天尊大悲仁孝義倫大全母慈福聖天尊大悲聖門大節天尊大悲普仁猛聖天尊大悲惠淑羣功天尊大悲聖福貞天尊大悲聖惠貞天尊大悲聖德貞天尊大悲聖幽貞天尊大悲神靈德勸天尊大悲神功淑普天尊大悲先就法成孝道倫惠天成天尊大悲次就法化弟道成聖弘福天尊大悲懷心大願天尊大悲虛得果天尊大悲懷天成實天尊大悲願力大就圓滿成力天尊大悲洪念孝親德就天尊大悲列派仙果天尊大悲八列成願天尊大悲十二列功天尊大悲十九大列天尊大悲二十四列圓行天尊大悲二十七列成聖大智天尊大悲三十二列大德願力天尊大悲三十三列成聖登果天尊大悲化神木類證列天尊大悲化形禽品大飛天尊大悲化形山品大神天尊大悲化形歌道天尊大悲化形詩訓大果天尊大悲化形天訓廣教天尊大悲化身入木天尊大悲化形隱寓壺類天尊大悲成德普濟天尊大悲入壺化證時出現跡成果天尊大悲飛身列滿天尊大悲化證鳥鳴飛接天尊大悲正訓了悟天尊大悲知教成道悟朗天尊大悲成佛歸果證悟天尊大悲谷師天尊大悲明覺證身天尊大悲曩修大化天尊大悲明經知務天尊大悲聖心莫白苦孝存國天尊大悲成國德明自力天尊大悲神靈歸术天尊大悲河流得聖天尊大悲泣哀得戚驗義天尊大悲泣痛驗貞動天朗與天尊大悲正悟得化天尊大悲訓烈天尊大悲教化羣宮內示天尊大悲德政立宮天尊大悲廣嗣化成聖理天尊大悲能育遺𠻸大報邪賊成祚天尊大悲方便善果成福天尊大悲成神大訓天尊大悲果聖天尊大悲女善成化天尊大悲香辱天尊大悲飛身受玷證果大山天尊大悲證飛大洞天尊大悲證善大巖天尊大悲至聖大巖善女天尊大悲廣行婦功太和成福天尊大悲聖婦飛巖太和天尊大悲廣行善行入聖天尊弟子某等善行不如坤道强梁過於乾天中行有損懷念實愆一有未符輒萌忿恨稍致莫投即加貶剌甚於婦女浮若宮人見美色而生妒惡覩情思而起𢷤斥有敗國才有傷宗祀大良之木斧便折之聖美之士口即訕之心事之私甚於利刃懷念之凶過於蹊谷險夫刻婦天理人情自揣自思莫容莫赦望天寬宥俾令釋寬得覩淸平便於修治大丹可得聖道當明偈曰心懷狼毒自不仁恨在吾思天理明大造洪開日月照緣何渺末大虧真元神一點多傷損障礙私衷蔽彼能將人害拆還來我利己無情敗在人誰知一一昭彰報當念幽冥有聖靈從斯悔過忙忙徙掃去浮遮見果成讚曰大公無我有甚私情止因一點障其靈便起此無明掃去渣塵好去自修行人物一體自忖良心賢愚與我莫紛爭家國共和平宗祀昌興綿衍瓞瓜生諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天真宰度災濟劫萬真無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思