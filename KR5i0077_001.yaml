body:
  text: 三寶萬靈法懴下元道士王守上閱開懴香文臣某領弟子某等誠惶誠恐稽首頓首俯拜恭惟虛皇上帝三淸三境三寶天尊白玉京中四皇上帝神霄玉府九宸上帝五梵五帝天君三元三品三官大帝乾元赤皇大帝十方靈寶列聖高眞斗府斗聖周御國王天尊斗姥巨光天后七矅五斗列宿星眞五天五嶽聖帝四聖四弼天眞三都三省眞君諸天帝釋金仙菩薩南北五祖七眞仙聖蓬萊閬府得道眞仙諸天一切聖眾擁護一切天兵城隍司命土地眞官社令功曹廟祠神宰凡在所啟諸列神眞普望降臨鑒觀懴禱恭聞先無形而設象始有志以求眞欽聖洪慈宣天巨德何人無咎須攺省以滌衷誰念能淸務至誠而體道本乎前刧累以湥功發未洩之弘音出不聞之奥理今承高𣺌始驗神明千眞萬聖在身心九地三天藏意慮一經懷動輒遍諸靈望列帝之注目前默眾尊之同座左洋洋在此濯濯非遥有咎過之當蠲隨心悉淨但功猷之可立就懴立新大願皆成丕懷克遂仰眞俯叩盡賴神觀運禮諸天圓周回懴讚曰大章洪韻一動咸聞高天邈地悉通靈意緒盡開淸萬機皆息五藴無分胸懷霎爾遍淸甯恍惚見金庭何來鸞唱誰地龍吟欣然鼓舞奏歌聲異香散馥薰滿座神眞空虛五色新靄靄黃芽注我根烹老鼎撥嫩莖點點是神晶海湧紅輪處處見光明眾心宜肅淨掃污氛至誠懇篤普同欽此典匪常倫章言纔洩幽顥兩霑恩三寶誥志心皈命禮虛皇一炁無極分眞列三境之瑤宮侍四皇之寶座說經飛篆開大道於煉烹執卷拈花洩眞詮於淸靜作天地人之宗祖爲聖佛仙之本根有相無聞何空非色大悲大願大聖大慈無上虛皇至眞妙道三淸三境三寶天尊開懴總讚天高地厚人處中央一原合始豈難詳三寶是其常禀受無疆成就體精强五雲來湊聚兩儀偶成雙修道應驗在虛皇功程莫可量一段眞光處處現金剛太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴三淸卷一上第一策偈曰志心恪禮諸天分從始圓終不敢輕凡有希求皆遂願明心證性步三淸諸天普會第一分爾時虛皇天尊在香林苑内會三寶高眞與玉皇上帝及三皇大帝九聖五老十極眞人四元五嶽七矅五德星眞五斗列矅星君三省四聖三仙五祖嶽府諸司一切列聖同詣法筵見下方諸男子及諸女人造爲不善罪大孽極以致𡨚魔不了上帝垂憐錫以巨章叠叠成牘弗知追省仍同往古昭垂諸眞名號視若尋恒徒知口誦未實心行迺頒至法賜以心訣令其解悟印心體道後學不誣欲獲方梯務先神訓於是徧閱諸天功滿果圓應數運合當著厥績使世間欽禮攺悔夙愆如有傾誠男子好善女人合諸神懷保厥天理自然得收福果大植良緣勿自輕反墮幽途禮天尊名號如覩神尊當此法壇之前或左右上下之際恍惚依稀天樂響鳴龍盤鳳舞麟戲鸞歌天香繚繞諸奇寶花零落滿道諸眞聖眾各駕雲駢齊聚道前聽聞法語下至人間受諸香信保庇善信男女俾獲無邊福報驗徵神功無所爽忒信心運禮各懷恭敬大悲玉淸聖境元始天尊大悲上淸眞境靈寶天尊大悲太淸仙境道德天尊大悲淸靜無極天尊大悲無量元運天尊大悲至德高行天尊大悲品具惠性天尊大悲德圓四極天尊大悲恩溥八元天尊大悲福果妙明天尊大悲德開後悟性明天尊大悲風訓八方天尊大悲夙果高證天尊大悲厚植福緣大善無盡天尊大悲廣成明德不紀功績天尊大悲聖明遠被天尊大悲澄淨覺量天尊大悲功成遠達天尊大悲行蓋無涯天尊大悲盛勳非等稱越諸聖天尊大悲培元種果渡人濟阨天尊大悲奉勅行道解阨六惡三苦悉賴天尊大悲善緣保護天尊大悲慶喜高扶天尊大悲正明合德天尊大悲先天正氣凛肅天尊大悲心欽元始懷念四生天尊大悲深淵大本天尊大悲日月高朗天尊大悲風和利達天尊大悲率遠懷德類普八風正安力重天尊大悲日曜幽林天尊大悲慈林廣蔭天尊大悲六道盡起天尊大悲八難淨除恩憫天尊大悲身超五雲天尊大悲大度懷念無窮天尊大悲修躬靜覺天尊大悲須臾入聖天尊大悲性照源天天尊大悲神明住性天尊大悲燭闇照微天尊大悲香林受法頓超無上天尊大悲微行默修高凌證覺無邊功績天尊大悲深入奥密謹默上邁天尊大悲印道神正天尊大悲修明了悟天尊大悲守性化虛天尊大悲微理修明天尊大悲和元本德天尊大悲利益淵物天尊大悲力弘道大天尊大悲香光普映天尊大悲御座達旨天尊大悲致遠索奥天尊大悲中懷和物無拘遐邇天尊大悲合一無區天尊大悲列眞高仰天尊大悲包括萬品天尊大悲承聖降神慧林普識天尊大悲位居上列南宫錄善天尊大悲大證慈聖天尊大悲和明天道萬德無滯通明稱善天尊大悲至神無礙天尊大悲鎭居厚德天尊大悲身居瓊林天尊大悲廣聖溥修念苦天尊大悲慈心四曁天尊大悲夙植不壞經刧常存天尊大悲前根屢存正光修淨朗極大照天尊大悲中德無倚聖神合道風聲利度天尊大悲豁落遠洞天尊大悲不棄微下同登上丹天尊大悲論超列特天尊大悲旨修深理天尊大悲妙明無著大善永種天尊大悲妙禪深入天尊大悲後達先妙天尊大悲神靈至德天尊大悲平等無列天尊大悲宿緣不損還丹返聖天尊大悲巨光合聖天尊大悲元慶一德天尊大悲恩及細類天尊大悲細徹眾品天尊大悲善行無邊天尊大悲天德普照天尊大悲學淵性海天尊大悲朋修合聖天尊大悲樂修妙理天尊大悲藴德廣化天尊大悲推恩四苦天尊大悲惟思慈度天尊大悲護善不失急濟苦海天尊大悲波恬爲念平塗坦道天尊大悲修性印體天尊大悲體道合神天尊大悲我相悉無天尊大悲無利自體恒分肉濟天尊大悲刧刧修悟天尊大悲智根不斷天尊大悲巨德上妙天尊大悲安