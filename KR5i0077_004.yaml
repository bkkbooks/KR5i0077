body:
  text: 三寶萬靈法懴下元道士王守上閲四帝誥志心皈命禮萬道無為諸天有主放六通光於一十七種演五品法於萬二千言節制風雲電雹通南極而號天皇解除産疫刀兵令勾陳而尊上帝運七政之要樞而化凶難居三垣之上位以錫祥禎坤德厚以育羣生土量弘而容萬物大悲大願大聖大慈四皇上帝四大天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴四皇卷二下第四策偈曰人生善惡有殊分朗鑑初臨美慝形但自公然無隱曲春秋褒貶有何論無私愛惡第九分道言天無私庇庇於有德神無偏憎憎其汚行若有真誠樂善一心在天理無邪僻者是聖賢中一儔而聖賢與之同等因以與之同情與之同德即欣然好之亦天理中之好善樂賢有何容庇而限於不明如不善之人所言近乎篤實竟念慮不淸誠為邪慝所行類乎正大察其中存穢汚苟且皆小人不正之為竟外飾內浮大傷善道竊取善名君子惡之如臭復何隱匿姑容所以天地包含弘大則有之至於故外不容故滅行私則天地亦小帝王賞善罰惡有善則爵有惡則戮不戮則擯斥之不容同於並國若帝王有意於校短競長則帝王亦小人在兩間自同不肖偏憎曲愛心存黨私苟有合於已則甘如飴蜜不合於己雖高行遐舉亦視若茨荆嗟哉若人誠堪憫痛今授以諸天名號下示人間知所敬奉懴悔當以上天為心無復徇己所私有礙聖賢大道去來無挂天德高明恭對諸天志心拜禮大悲高上玉皇天尊大悲中天星主紫微天尊大悲南極勾陳天皇天尊大悲承天效法后土皇天尊大悲萬善全昭天尊大悲一心敬德天尊大悲恭昭一理不曲不私大公樂善天尊大悲至明至達天尊大悲敬美天尊大悲光體四達天尊大悲聖昭無外天尊大悲深幽遠達天尊大悲設術導賢天尊大悲宜準訓後天尊大悲公顯天尊大悲陽和天尊大悲事天無怠事親以道兩孚不二天尊大悲正達天尊大悲風示芳幽天尊大悲出越倫等天尊大悲好善喜施無惑天尊大悲大悟海岸天尊大悲明心覺岸天尊大悲拜海大智天尊大悲倫安天尊大悲寒氷拔難永濟天尊大悲火輪拔苦永救天尊大悲常淸靜天尊大悲長平溫天尊大悲應物不窮天尊大悲動存不擾天尊大悲潔舉天尊大悲携明天尊大悲柄旋天尊大悲庚甲朝天三尸不寐覺明得證天尊大悲恩海常淸天尊大悲愛河不入天尊大悲成衆菩提天尊大悲人我俱了不私一物大度萬善天尊大悲悟丹成丹天尊大悲不丹得丹天尊大悲得道合丹天尊大悲即丹即道天尊大悲心超天尊大悲念化天尊大悲正大念天尊大悲超無等天尊大悲正齊念天尊大悲心無雲礙體現月光淸覺大化天尊大悲光化天尊大悲華優天尊大悲深幽妙理天尊大悲真正訣要天尊大悲方正倫行天尊大悲容光普覺天尊大悲身虛五外天尊大悲能知均淨天尊大悲愚藏聖覺天尊大悲大聖隱天尊大悲大神藏天尊大悲精化空天尊大悲水四滿天尊大悲火不光水不瀰四周冥運天尊大悲充氣五足天尊大悲八方淸樂天尊大悲忠愛捐身保赤神遊天尊大悲身遊自樂天尊大悲普聖大智天尊大悲化空天尊大悲空住神天尊大悲方明直大天尊大悲剛正果明天尊大悲斷果天尊大悲真正光普天尊大悲濟人九幽天尊大悲救大苦天尊大悲正一普度天尊大悲一法不起天尊大悲萬法化用天尊大悲用仁法濟天尊大悲復朗大體天尊大悲虛然天尊大悲空湛然天尊大悲霜徑體天尊大悲骨仗天尊大悲豹霧中隱天尊大悲林虛天尊大悲至體骨潔明星映覺天尊大悲剛潔徑骨天尊大悲道身常在天尊大悲常存天體天尊大悲遊虛住頂彩霞飛空神映四光天尊大悲身正萬品心正一體天度地度天尊大悲天身天德五足天尊大悲國淸體揚天尊大悲貞幽天尊大悲大貞正天尊大悲操行正潔天尊大悲平愛惡天尊大悲喜和天尊大悲喜和柔天尊大悲喜慈愛天尊大悲喜平和天尊大悲吉美天尊大悲脫不礙天尊大悲歸善性天尊大悲依善果天尊大悲仙品天尊大悲仙不朽天尊大悲引仙羣天尊大悲仙斾悠揚天尊大悲靈沖天尊大悲徑達丹方天尊大悲金氣潔淸天尊大悲香繞仙方天尊大悲御香天尊大悲鶴翀香界天尊大悲寶篆翀達天尊大悲金書朗琳天尊大悲玉鳳御詔天尊大悲御鸞下駕天尊大悲寶文度世天尊大悲説玉法天尊大悲萬靈先引天尊大悲導羣聖天尊大悲引斾八飄天尊大悲羣真樂樂天尊大悲身如日月天尊大悲大星化天尊大悲至體鏻剛天尊大悲直無不利剛無不和平濟神化天尊大悲乾德中天尊大悲離德明天尊大悲坎德淸天尊大悲坤德和天尊大悲星宿體天尊大悲台星駕天尊大悲鸞羽彩耀天尊大悲鹿巖素耀天尊大悲光化正神天尊大悲鶴素天尊大悲翔飛百和天尊大悲身隱幽林天尊大悲登山度苦天尊大悲入巖赴苦天尊大悲下入巖塹尋度天尊大悲峰巔度危天尊大悲救虎狼苦天尊大悲救蛇蟲苦天尊大悲救大岸大苦天尊大悲救三大災天尊大悲救十大難天尊大悲解咒人𡨚孽天尊大悲解自咒惡孽天尊一切諸天聖衆聞我弟子見我弟子悲懇道前為求懴悔願弟子某等所作罪愆至如心私意曲不知平等但喜奉已為心不明是非公直以善為惡以媚為賢一雲一障輒礙陽光寸玷寸疵便汚美玉同於塗炭反曰高淸類於狗雞妄誇麟鳳大拂人情甚非天道如是愆尤遺禍寧小恭對諸天盡神懴雪由此以往安得從前仰干聖𥈠悉願消除偈曰天道無私日月光淸淸白白是非彰人心天體都無異不畏幽冥有暗傷讚曰天光朗鑒𥈠哲昭淸超凡入聖有何情止在一心明月照潭深到底不遮陰澄澄徹徹豈有渣塵大道人心自剖分旁論亦公平我若荆蓁定是畏神靈諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天真宰度災濟劫萬真無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護己身處處蒙恩人人佩澤大悲大願大聖大慈玉經啓教金闕萬福護身真人流演萬真妙寶神功顯號應化天尊偈曰剛很為人自少容不如和氣未傷中一心柔理含弘量但覷凶行必不終柔和無失第十分道言不偏不倚中庸之至理為人有能以中道制其行事則不過不愆如剛者過之則必招禍而不可測柔者過之則又失於隱忍而不可伸必和之一字一利於身復利於家更利於邦而且心符於丹火之溫溫性情之恬恬遇暴必化值𡨚必散逢孽必解見怨必休有如氷當陽日雪見暖燠暑遇淸涼炎當寒泉不解亦解不化亦化何容凝注而自害自傷乎如以堅御堅必致一損世間多少虧毁之徒非曰自小則曰自弱務至損身敗家甚則亡國而不已奚不自量自思天何悠悠而不與人爭言日月何綿綿而不與人爭明河海何淵淵而不與人爭淺深但觀此類可知人之在世能如此悠悠否能如此綿綿否又能如此其淵淵否必至損身敗家亡國而後已也所以先王曰和為貴其理非誣非妄天氣和萬物生家衆和人事理一身和脈絡順順則無災理則無溷生則無傷此和之道大矣哉和非音容笑貌之偽兼非類於媚諂之行脅肩為柔不足言矣柔者濟其剛和者燮其柔非和則柔無用非柔則剛有折調以濟之其義兼無所失此道非獨養我之丹心亦有全乎涉世保身之法今對諸天聖衆猶如聖賢提我之耳面命心言若高臨卑若遙聽邇安敢忽荒志誠敬禮大悲高上玉皇天尊大悲中天星主紫微天尊大悲南極勾陳天皇天尊大悲承天效法后土皇天尊大悲中平簡易天尊大悲調燮陰陽天尊大悲天成品物天尊大悲順承天道天尊大悲坤劑天尊大悲順生物體天尊大悲順濟亨天尊大悲利亨物天尊大悲貞量大成天尊大悲風行草偃柔靑無潰天尊大悲和翠天尊大悲米體粹精天尊大悲豐質圓大天尊大悲身潤美天尊大悲形符丹溫天尊大悲調大德天尊大悲理身脈天尊大悲日氣育物天尊大悲雪氣貞體天尊大悲聖體不潰天尊大悲菲身億古天尊大悲周廣類天尊大悲普天日天尊大悲大羣仰日衆邪畏日獨陽存體道量無涯天尊大悲六魔畏天尊大悲七邪伏天尊大悲九冥朗天尊大悲三幽徹天尊大悲大徹內幽天尊大悲類皆照淨天尊大悲天街萬朗天尊大悲自坐廣朗天尊大悲性沉覺天尊大悲性動徹天尊大悲應萬變不竭化萬物不窮自優餘量天尊大悲昭品天尊大悲孝德昭量天尊大悲大孝樂德天尊大悲苦行成聖天尊大悲苦行化衆天尊大悲龜息萬綿天尊大悲鶴齡聖益天尊大悲上周日輪天尊大悲推運元天尊大悲轉氣輪天尊大悲鼎地氣天尊大悲天柱長立天尊大悲浪覆崑崙熖蒸海足上下復起一光中朗保世天尊大悲威王天尊大悲威聖王天尊大悲調運道氣天尊大悲衆生得大度天尊大悲衆生有仰賴天尊大悲神靈朗衆天尊大悲江澄海覺天尊大悲溼蟲化證天尊大悲魚龍得化均仰神功普度大道天尊大悲得覺永注天尊大悲不住人間上通天闕天尊大悲領統仙儔天尊大悲為仙證虛天尊大悲證虛丹天尊大悲化赤龍天尊大悲白龍化衆天尊大悲生天救物天尊大悲詮理淨融天尊大悲翦誅二孽天尊大悲殺毒龍天尊大悲斬惡蟒戮妖禽平治萬物天尊大悲經理羣品天尊大悲風氣潔溫天尊大悲善治惡天尊大悲毒治惡天尊大悲人物苦傷神心不置殷殷常篤天尊大悲經訓明朗天尊大悲朗埀訓範天尊大悲香芬天界降引羣真下濟天尊大悲蓬萊光透天尊大悲島嶼翠浮天尊大悲空島天尊大悲高嶼懸照天尊大悲百神集島天尊大悲飛岸天尊大悲飛島天尊大悲飛身虛島天尊大悲臨𥈠天尊大悲哲明天尊大悲濬文覺天尊大悲溫文覺天尊大悲灼智天尊大悲復灼智天尊大悲柱波天尊大悲攴天不敗天尊大悲巨石攴空天尊大悲道氣溫身元脈養心上天下地空空不息天尊大悲大不息大不壞億劫永神天尊大悲永骨存天尊大悲肉慧天尊大悲氣溢天體天尊大悲寶瑩光覺天尊大悲瓊神天尊大悲花潔天尊大悲花皎皎玉溫溫澤神潤體天尊大悲彩貌瓊容天尊大悲天都自升天尊大悲瓊宴生神天尊大悲神淨氣沖天尊大悲地山承虛天尊大悲虛中山立天尊大悲劫存天尊大悲朗映體天尊大悲三垣輔體天尊大悲躔運神天尊大悲運體星天尊大悲雨注泉天尊大悲泉亘天尊大悲玉環不測天尊大悲連環鎖關金身不壞永立山峙天尊大悲登須彌寶峰飛度天尊大悲真飛實食天尊大悲丹石天尊大悲丹霞石天尊大悲烹霞石天尊大悲煉泉天尊大悲飛丹泉天尊大悲正文不礙天尊大悲文德長養天尊大悲均平六宇天尊大悲光靄五氣天尊大悲七齊九治天尊大悲滿充德天尊大悲滿照世天尊大悲足願大道天尊大悲願世長生天尊大悲古不壞天尊大悲世綿天尊大悲運固天尊大悲會元運天尊大悲敦世運天尊大悲風教大醇和天尊大悲豐和天尊大悲和長固天尊大悲固體充神天尊大悲教度羣和天尊大悲飲醇和天尊大悲淳風自化和氣迎人葆元厚世永夀天尊大悲寧心安體天尊大悲鼓動羣神天尊如此天真在御下鑒羣心莫非過剛多暴放恣如焚有同烈火不急撲滅斯至延原如用滿泉即時淨冷可養淳德可制浮情今對諸天發心淸雪不敢縱馳仰望神威大施慈福偈曰光柔濟德飲醇溫免致災殃敗自身和氣迎人春色