body:
  text: 三寶萬靈法懴下元道士王守上閲七政誥志心皈命禮二曜光天五星正位太極發宣於七政鴻圖布列於元皇日月經綸調水火木金而敦土德陰陽妙用運東西南北而鎮中央弭化洪災保持大劫大悲大願大聖大慈日宮月府五方五德統制七政天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴七政卷六下第十二策偈曰正我身心見泰寧一巳無虧處處平天地無欺成大造修功安許有紛紜務端心行第三十四分道言身為萬物之表已乃率物之標一心不邪羣功賴之一有所偏何事能立君子之用其極皇道之建厥中所以化民而成治也祟之亂心心之作祟均由我之無主我能自主何所擾之故曰萬神護我天地立我羣生依我山川鎮我事之成我體之永我德業修我大功就我歌咏集我皆從一心一行無往而不可以作則無為而不可以作凖一聖在上天下仰之匹夫行庸萬世遵之何故是風行草偃水潤物生悉由性之和平作之漸漬音胔而然功不在大由積而成患不驟來隨初而纍所以大人之心大人之行豈侔音謀細夫末輩無關世道人情日月薄蝕下民仰驚天地震疊萬類撼搖所係匪小所干者弘和氣能祥乖氣能沴音麗是以災不生於天地生於吾心吾心之災生於不端端以正其心端以正其行心端行正終躋和平致中與和育乎百物大哉端心行之為要也至哉端心行之為道也其身正不令而行其身不正雖令不從先聖之言孰云莫遵况乎修士為天下先為萬世傳此心此身甚為大表大標太陽行天樹以一的而子午從而正之未可忽視此一心一行之為藐也今內觀吾心外觀吾身細觀吾行達觀庶物事事物物均符一正然後仰觀諸天運諸天從運吾心運吾心不悖諸天一仰一俯一叩一瞻上下相符百祥乃集大哉懴典諸天監臨大悲炎光太陽日德耀輪天尊大悲素靈太隂月德華寶天尊大悲東方木德翠林天尊大悲南方火德赤霛天尊大悲西方金德皓素天尊大悲北方水德洞幽天尊大悲中央土德永鎮天尊大悲神合體思天尊大悲凖極在思天尊大悲正巳勵物天尊大悲風標灼見天尊大悲樹大正天尊大悲形先立天尊大悲作觀天尊大悲作大觀天尊大悲正皇則天尊大悲建中極天尊大悲太極廣示天尊大悲皇建天尊大悲帝身天尊大悲極正悅天尊大悲象先則天尊大悲作教作化仙標無戾萬聖從思一凖天尊大悲風徹庶應天尊大悲康啓成政天尊大悲東從風化天尊大悲火炎類和天尊大悲金皓四明天尊大悲水流體和天尊大悲日高照品天尊大悲品熙天尊大悲祥熙天尊大悲靖林天尊大悲通靖和天尊大悲達遠祉天尊大悲鳳喜天尊大悲大鸞祥吉天尊大悲卧麟天尊大悲起神馬天尊大悲集祥興祉天尊大悲仰思天任俯體民瞻痛體思不恤民染切惠庶物天尊大悲功崇大允天尊大悲神靈丕遐天尊大悲德修遠被天尊大悲煙注天尊大悲合煙采羽天尊大悲和祉慶集天尊大悲行淸福普天尊大悲功己能足天尊大悲大洽功天尊大悲大潤功天尊大悲大和德天尊大悲被德無迹天尊大悲鍚慶無名天尊大悲聖德羽舉天尊大悲翠東天尊大悲赤南天尊大悲黃中和類天尊大悲素正西林天尊大悲穆穆浩北天尊大悲五和在身天尊大悲父母受慶天尊大悲功國立人天尊大悲正則於內施功在國能繁息祉大正內德懿懿廣遐天尊大悲俯正天尊大悲內揚外德天尊大悲行大範天尊大悲行大則天尊大悲化身萬行天尊大悲苦端天尊大悲修勤端肅天尊大悲飛行光耀天尊大悲飛虛際天尊大悲升明際天尊大悲洪康天尊大悲廣正號天尊大悲素皓無虛天尊大悲鼎丹內藴天尊大悲非空非名四遠天尊大悲了通世塵隨來隨釋自透天尊大悲我體全虛天尊大悲恬熙天尊大悲豐注林寂天尊大悲丹孑天尊大悲丹五結天尊大悲丹臺大禪天尊大悲禪注天尊大悲不注禪天尊大悲在禪忘禪天尊大悲透機絶機天尊大悲弋忘天尊大悲飛鳥四通天尊大悲能道非道天尊大悲允功天尊大悲弘勉天尊大悲立修聖訓天尊大悲𥈠果天尊大悲哲修天尊大悲明建廣白天尊大悲稱功丕允天尊大悲洪景天尊大悲高天大照天尊大悲明星潔念天尊大悲高淨天尊大悲齊德能洪天尊大悲前著終寂天尊大悲不希功能惟災乃著苦行樂心寒德萬祀貞勳自立天尊大悲丕德洪行天尊大悲自深旨味天尊大悲非迹天尊大悲全迹天尊大悲交會日度天尊大悲交會月度天尊大悲五德正交天尊大悲明德正度天尊大悲光行天尊大悲光心廣大天尊大悲行體妙明天尊大悲妙合乾象天尊大悲神合乾體天尊大悲艮正天尊大悲風吉雨祥天尊大悲震祥離和天尊大悲琢玉得濟天尊大悲不琢潤德投體丕著訓主得禎自利不利弘勳大示天尊大悲風聲遠和天尊大悲先後交濟天尊大悲奉天敬心天尊大悲祭濤自矢樂天存主利利天尊大悲我體貞貞天尊大悲我心永白天尊大悲芝桂長歌樂樂天尊大悲詠空天尊大悲樂志行道天尊大悲悅鳥天尊大悲怡度天尊大悲切身利物天尊大悲政教四廣天尊大悲雨施利衆天尊大悲波驚得度天尊大悲修度度人天尊大悲煉通天尊大悲煉液丹就天尊大悲金闕上達天尊大悲玉鼎金就天尊大悲玉體成天尊大悲金身就天尊大悲寶體成功天尊大悲鼎來符體天尊大悲五鼎集花天尊大悲翠寶集蘂天尊大悲赤蘂茂天尊大悲黃華茂天尊大悲兔升天尊大悲祥林生桂天尊大悲瓊枝大秀天尊大悲苖新葉景天尊大悲丹香可餐天尊大悲充餐丹結天尊大悲無餒充泉天尊大悲丹流廣潤大神集空飛飛止止五運天尊諸天聖衆十方高真鑒我鄙衷適來歆格宥釋眚災廣鍚歲齡庶俾弟子某等得保洪年方新末德深思寸木可至高林尺土可漸巍階人乃萬靈何修不足惟恐歲月空延虛生浪沒非㩦無以能升非行何克遠底總之提倚天循率由巳望天真而啓我希衆聖以牖身身永心聰神開慧著德滿行圓功崇丹就一眚不來百祥堪集細蠅不淄全肌自潔得證道緣皆叨仙福偈曰一體能全萬事成寸雲豈礙日光明但求心緒常淸白不畏嫌疑合我爭讚曰天心朗朗德體明明雲礙空虛枉自紛我念本光淸端正無驚鬼畏與人欽惟愁意邪損已元神君子衣冠未可輕外飾令羣尊內也無塵何事惹災迍諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天真宰度災濟劫萬真無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護巳身處處蒙恩人人佩澤大悲大願大聖大慈玉經啓教金闕萬福護身真人流衍萬真妙寶神功顯號應化天尊偈曰美惡由人自擇分修心學道務功成從來入聖先行善善有三端可勉遵道先三美第三十五分道言修學之務素有千端一一不可悉詳宜從其大者而立其先先端能盡始可由斯而履其極一曰立道器二曰正道範三日廣道化此三者修道之基進道之德建道之本也器者何不能容不足以弘道也天下惟賢納愚惟聖成物聖賢以天為心以海作度以日月為明一經凌犯若渾若昏此上哲之修次則不校再次則姑受之令其天條之報而我無與於其中然有從其法者行法之中非徇已私以酬其犯也宣聖之戮少正大舜之誅四凶為天下驅惡而非自報也從法以從其天正惡以正其經皆謂之能容非隱忍而食穢納汚蓄人之惡養人之殘終以圖報也不如是無以快已思是能容校之不能容其心尤甚此器之小大公私可明辨也恐學修者藉以為容而害其本性又有力不能勝而靡靡以甘又有道不能廣而冥冥以納又有情不能制而勉勉以解皆不謂之真容故不得謂之大器大器則容之可教之可殺之可殺亦容教之亦殺之春秋是也得悟之人如日在天如風行水如雷作威如露作甘何損於體何礙於靈乎所謂範者何以為萬物之儀羣人之望正一已而正天下正一身而立萬世勿云難也孔子匹夫為天下師為萬世師非一身乎豈曰偽作取表亦非沽譽自誣若外粉衣冠作為道貌巍巍自崇徒希羡名是猶羊裝彩毛而不知早識其賤獸也有如鄙夫矯立人前內敝裳而外衣繡錦飾冕冠被龍袞端坐優戲之場而自忘其為戲局也所以範非虛飾古聖賢云動容貌出詞氣正顏色三事皆切乎範而為入道之根基斷不輕忽其儀容雖寒而赤骨有若冰骨凌風霜枝挺雪獨卓不羣如山之聳如鐵之堅如火之炎如龍之伸如麟之異不可近也不可遠也不可犯也不可瀆也所謂溫而厲威而不猛恭而安非難非易一正斯畢不正外範則內德無觀不真正外範則內德不足永觀故曰道範不可不立也三曰道化者何化以導其俗化以普其善化以養其成如修一已謂之自了漢盡一身謂之窮困夫功從心得亦從人心得又從天下衆心得化非家喻而戶曉之並非耳提而面命之一身坐於幽庭德運海隅凡在我類有血氣者莫不從而率之故一人有慶兆民賴之是位貴也若夫修士處於深谷之間坐煉神功德廣勳高普濟塵紛令其解脫日醒月提度人無量此仙化也一師在堂天下羣遵道衍泒流後世仰依無背無逆此聖化也一體自立風醇俗雅可想可思從式而則象之此賢化也至於立極在上皇凖民從羣恭衆敬政治德敷此王化也皆謂之廣化修士惟能自化乃能化人化物鵝靈石點豈非驗歟今向道前盡宣大訓則道可期其成無虛神明接引萬苦千勞誰堪上體敬布我腸特伸瞻運大悲炎光太陽日德耀輪天尊大悲素靈大隂月德華寶天尊大悲東方木德翠林天尊大悲南方火德赤靈天尊大悲西方金德皓素天尊大悲北方水德洞幽天尊大悲中央土德永鎮天尊大悲弘敷大道天尊大悲心正功遠天尊大悲能行正教天尊大悲優容廣雅天尊大悲大羣普納天尊大悲凝神定想天尊大悲湛若無為溥虛天尊大悲淸空自引天尊大悲潔淸己元普濟天尊大悲德在人心功立一已天尊大悲並天齊神天尊大悲則聖準天功唐德虞自永天尊大悲我無迹相天尊大悲大登天界天尊大悲普修神力天尊大悲修大甲天尊大悲廣天天尊大悲輔廣後天天尊大悲洪修兵律天尊大悲修正立字訓廣教示羣生能作功物訓心無怠自化天尊大悲非正實正天尊大悲非功大功天尊大悲勞德天尊大悲苦德天尊大悲大苦行天尊大悲大神勳天尊大悲威作範天尊大悲悅作範天尊大悲法令和天尊大悲法令除天尊大悲虛圄天尊大悲正令天尊大悲殺邪存正天尊大悲化邪得正天尊大悲和貌天尊大悲肅貌天尊大悲身容心容天尊大悲內悅外恬天尊大悲外肅內恭天尊大悲孚遠邇天尊大悲布政和天尊大悲修政肅天尊大悲雅意文思天尊大悲幽索得義天尊大悲鈎索先天天尊大悲探本得元天尊大悲氣修元本天尊大悲道範得度天尊大悲凖公天尊大悲率修天尊大悲度化大公天尊大悲端身化物天尊大悲天元一本天尊大悲神思淵運太元正氣行天寧物普一天尊大悲修易來光正經和訓大化扶宣天尊大悲復性養和天尊大悲先道一體天尊大悲聖德碩修天尊大悲木旺金思天尊大悲經訓功著天尊大悲豐充道化天尊大悲中立四正天尊大悲八正天尊大悲十二端象天尊大悲九則天尊大悲立內功天尊大悲立遠功天尊大悲立外功天尊大悲修碩化天尊大悲一上下定大倫功績弘正天尊大悲建化天尊大悲