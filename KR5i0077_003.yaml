body:
  text: 三寶萬靈法懴下元道士王守上閲四帝誥志心皈命禮萬道無為諸天有主放六通光於一十七種演五品法於萬二千言節制風雲電雹通南極而號天皇解除産疫刀兵令勾陳而尊上帝運七政之要樞而化凶難居三垣之上位以錫祥禎坤德厚以育羣生土量弘而容萬物大悲大願大聖大慈四皇上帝四大天尊開懴總讚帝操大柄誰可專言頒此金文表上天錫下保恩全往來濟濟去復旋旋瓊香繚繞遍虛間玉女光明照四欄瓊楯通花道瑤池近其邊透達周環朗朗映丹田太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴四皇卷二土第三策偈曰無名無象豈存心本來一物自圓明綿綿不斷真消息若是多情又少淸道本自然第六分道言至道不名至德不言至微不知至妙不測至生不始至化不終所謂天一在貞何有疑二人身合天自定無渝日月在上下以運行日月不識其所以運行寒暑在四時之往來寒暑不知其往來竝天地亦不自測其所以虛所以實也含弘萬品發榮羣物正在一元之中惟一生二生三以及生萬生億無有窮際非元氣一理焉能衍化是以元結真盤乃如是三光繼朗五行傳宣至奧微言烏容名指月懸於天光映於水一水一月萬水萬光斗經曰衆水一月衆月一光皆言道妙非指言星世人不悟獨歸斗光毫釐千里反失虛靈今向法筵當頭一擊令迷者得悟聾者得聰失者得歸散者得集元本還存仍復天理爾等在兩間之內兩間內居惟思是何乃人處三才可參天地惟廣視天地自藐人身實堪嗟憫奚以生扶不知血軀在中能裁上下可破古今至道至德惟軀足幹然道在人心心融道來道心為一此外非理古帝有言曰人心惟危道心惟微惟精惟一永執厥中妙在於中中歸何所又有言曰虛其中妙無窮能湛靜道來躬即定能靜靜能安慮而即得皆從於知止作基豈容異議總之中虛萬化無不自然稍不自然即成牽制何以長存自莫能久而我失也奚以若天地之貞固奚以若四時之永錯奚以若日月之恆明成萬物之化生而莫盡乎世人宜修自然之道廣結神丹理性敦元自歸上妙如天尊名號下示人間各印巳心復證天道還歸大德功業乃彰人當信禮衆各恭敬大悲高上玉皇天尊大悲中天星主紫微天尊大悲南極勾陳天皇天尊大悲承天效法后土皇天尊大悲無為範主天尊大悲大範立化天尊大悲文謨修明垂教天尊大悲道行高岸天尊大悲峻德明覺廣運天尊大悲克行難擬天尊大悲丰度飄逸梵正主蒼天尊大悲昊德合行天尊大悲禪心覺湛天尊大悲洪開豁表天尊大悲宿曜在心運行宇宙無量覺通天尊大悲列居端靜德冠瓊英天尊大悲飛度天界天尊大悲度達廣大天尊大悲飛天無礙天尊大悲上羽修明步虛上境遊奕昊德無量功純天尊大悲普度無方天尊大悲羣神集體自在天尊大悲寶鼎和樂天尊大悲經訓備躬天尊大悲說法立教度世天尊大悲修已率物天尊大悲敬明天德勸世廣正天尊大悲大周衆善天尊大悲喜成羣善不思利身天尊大悲冰心玉體天尊大悲丹元內映天尊大悲壺天出入不測所詣飛空泯迹天尊大悲山林假修托煉復化空虛天尊大悲誠身儒行天尊大悲有為無動天尊大悲教人作修天尊大悲中藏莫著隱丹立寶天尊大悲無盡法藏天尊大悲無滯跡化天尊大悲實功在世天尊大悲形端儀楷欽德天尊大悲明敏好德天尊大悲寬思自運天尊大悲度邁羣倫天尊大悲來根越異不凡天尊大悲達天盡性參妙天尊大悲固體無損纍劫長在天尊大悲神林卓越天尊大悲高大遠魁天尊大悲堅守丹心變化空虛天尊大悲瞻仰景行欽古得道天尊大悲漠度可遵天尊大悲香得分帝天尊大悲端朗光極天尊大悲元道中黃天尊大悲頒綸垂詔天尊大悲朔落廣漠天尊大悲性湛無滓常覺天尊大悲聰還天體天尊大悲四通六本天尊大悲明照內根天尊大悲五藴空寂上照天根不著外物天尊大悲四德俱隆天尊大悲道在有常天尊大悲分定無思惟妙希夷天尊大悲長住世形飛高自如天尊大悲老人明慧天尊大悲獨入天界天尊大悲斷除內魔天尊大悲除思恬定天尊大悲靜功遠達天尊大悲無作功相內澄外忘天尊大悲福果洪登天尊大悲籍注不朽天尊大悲執籙書德不遺人善天尊大悲大魁玉闕天尊大悲玉淸上證天尊大悲名飛三境天尊大悲端和瓊羽天尊大悲遠聲鐘應空谷發越天尊大悲空虛自隱天尊大悲棲霞遊樂天尊大悲上登無極映空四遠天尊大悲六合片頃天尊大悲壇教設度天尊大悲凌虛冲舉天尊大悲神都遊運四周天尊大悲京名闕著常升在上天尊大悲至上不等天尊大悲安恬如如天尊大悲素德懷念天尊大悲形容無著天尊大悲八極逍遙天尊大悲九老上輔天尊大悲星辰運內川嶽寧體無渝天尊大悲遷行無度天尊大悲數不窮竭天尊大悲川源遠達天尊大悲海浪靜息救人天尊大悲五土遊飛任已來去天尊大悲沙龍飛度天尊大悲淨天穩地不壞天尊大悲安常處和天尊大悲在天不擾自度完軀天尊大悲無傷一切天尊大悲人羣超度凡流莫測天尊大悲水流不滯天尊大悲還歸本體天尊大悲和通四度天尊大悲凡羣感應天尊大悲感一切類天尊大悲聖類不煩天尊大悲鳳羽騰升天尊大悲泰岱任遊五虛六空不拘不礙自爽快樂天尊大悲三神七聖往來心體天尊大悲妙通何識天尊大悲至道誰窮天尊大悲三光映體天尊大悲光明至洞天尊大悲開悟後人天尊大悲接引羣迷天尊大悲惠流無盡天尊大悲遠通後異天尊大悲垂名聖籍天尊大悲我自忘體不留枯迹天尊大悲燭徹四隅天尊大悲光朗無私天尊大悲悉化孽𡨚天尊大悲化惡歸善天尊大悲書紀微勳天尊大悲不住凡形天尊大悲三台覆頂五花內茂天尊