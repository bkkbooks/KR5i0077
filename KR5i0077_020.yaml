body:
  text: 三寶萬靈法懺下元道士王守上閲三省誥志心皈命禮位都三省威伏羣魔司雷雨之權衡提瘟癀之部屬九天遊奕即飛駕於龜蛇六合高明初煉神於龍虎統文章而專星曜判貴爵以掌兒嗣大惠大慈至仁至孝天都妙省合濟大運天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懺三省卷十下第二十策偈曰一事不修事事虧為人自問莫相違生平好處蒼天覺只待功夫定有收修以成行第五十八分道言功未全而力不就事有虧而心不樂理也大約反身宜誠叩已當決若生疑二自念懷欺影衾夢寐之間多覺愧慚而怏怏悒鬱反安意以豫吾之神明對天自叩何以徵已之修修者非禪門之獨行凡學士之造詣人生之行徑無不需之大學所云切磋琢磨以驗自修之義豈盡言丹家乎儒通於道道通於釋理非二致可以全統而天人交合無多殊迹分其缺略反成末流而不得自臻上理皆由於一行之苟則行行皆虧若修亦難言身如木之曲直引繩削墨以就方圓語之不法口不修也視聽非禮耳目不修也作事非義舉動不修也至於禮貌不正容儀不修乃動容之節亦關行止况乎發政施事係於大綱弘規風俗振頽之所屬歟君子一履一動非猶尋常戔戔大人舉止自是巍巍所以書言書事在乎左右不惟因左右書記而乃謹毖嘗有十手十目以存凛凜之心修至於此尚敢有缺行乎暫久無分常變不渝一轍始終天人同德是成修也今以真修上達高聖運此天懷至誠頂禮大悲至強蕩魔玉虛師相金闕天尊大悲至明降魔六合無窮高明天尊大悲至孝驅魔寶光大道鸞化天尊大悲貞恆省約天尊大悲率躬正道天尊大悲風範一規天尊大悲閣庭樹秀苗根果透天尊大悲達理貞固天尊大悲麟閣八風天尊大悲五道通正無邪侵干一心固聖天尊大悲聖天靈達天尊大悲神文神武外蕩中寧渾名馴內上正朝儀蕃胤昌福頷點徵齡天尊大悲正文功達天尊大悲考鳴內績天尊大悲孝徹天尊大悲孝正天尊大悲遺名覓天規文正己天尊大悲電照五靈天尊大悲諍干聖國遙遷地廣忘體天尊大悲忠干遠神天尊大悲忠遷遙天眷心主聖天尊大悲忠播神器存祚綿禋天尊大悲風尚流雅天尊大悲風都逸韻安存國福天尊大悲無儀成聖天尊大悲無偏成體天尊大悲公神大直天尊大悲規秀天尊大悲成天訓後名榜孑女高存香古神節天尊大悲名秀天尊大悲範正風淳兩潔天尊大悲弘儀大正天尊大悲顯懿天尊大悲徵道見功百貞一德天尊大悲洪真天道績赫名顯天尊大悲通照光普天尊大悲無曲存功終達天王道聖天尊大悲無私正心聖道傳古一風貞俗天尊大悲無私左右前屈復伸龍化天尊大悲渾功天尊大悲通務練德天尊大悲審道證德一靈無昧天尊大悲敬淑大貞哀殊晨昏存禮正身懿惠天尊大悲風聲大赫天尊大悲廣惠遺德訓功天尊大悲貞聖處蕩璧遺無容範厲侮羣正儀無忒天尊大悲色正體直聖神通白天尊大悲公秉天日天尊大悲天明星潔天尊大悲守直弘規勞體正行運力治世天尊大悲風率五行天尊大悲教入淵微天尊大悲著朗功行明輝蕩平天尊大悲平世治身天尊大悲躬羣同治天尊大悲正民空利天尊大悲忘身訓物廣惠天尊大悲洪正達聖天尊大悲直口成期保帝利國天尊大悲弘明朗照電光入體天尊大悲雷聲廣普徹體天尊大悲孝昧天德自忘天尊大悲忘德知親天尊大悲孝通節徑天尊大悲孝血滋尊榮胤天尊大悲下汚神體保淸活翁天尊大悲祕經若廢哀興格物天尊大悲孝明天道天尊大悲孝護塜生天尊大悲孝誠公覺天尊大悲儒聖超天尊大悲儒聖覺天尊大悲儒聖朗天尊大悲儒聖功普天尊大悲儒聖功續天尊大悲儒聖達川天尊大悲儒聖韻雅天尊大悲儒聖花燦天尊大悲明花透柳樂天天尊大悲功佐賞罰正刑明爵儒覺天尊大悲禮輝儀朗儒正大覺天尊大悲禮燦體貞儒覺次儀天尊大悲光輝四臨五典克著天尊大悲大朗𡽪範天尊大悲帥明仁義屈伸得道利民惠著勇謨天尊大悲恢蕩外氛天尊大悲掃妖平治天尊大悲遠謨恢懷天度天尊大悲治軍如神平康大道天尊大悲渾天復性平遠正大化融天尊大悲通道治徑津梁補功天尊大悲高朗弘仁天尊大悲漆潔直行忠貞訓邪率世功真天尊大悲苦忠天尊大悲天懷厲羣大範天尊大悲弘忠保國帝利天尊大悲魁聖福民天尊大悲德厚三生福流百世廣利天尊大悲天德天道功滿天尊大悲揆正天尊大悲大揆利鼎天尊大悲大揆正官洪福存國天尊大悲大揆貞明陰陽均福伏邪正羣天尊大悲相國神正天尊大悲神威均濟天尊大悲聖德居揆輔國濟民天公大惠天尊大悲利上全下公惠天尊大悲神功大濟鬼厲殺邪正身東郡存國護聖天尊大悲西陵正位利物天尊大悲奉詔升雲赤靈天尊大悲朱陵佐威赤炎天尊大悲赤靈部帥流惠天尊大悲遠遷諍直衍爻神廣忠國天尊大悲流愛布仁成國天尊大悲至明至愛仁政利物天尊大悲定民利身均福天尊大悲錢塵福水大流遠蕩天尊大悲懷略勝算弘仁普利天尊大悲聖道興古著昭典訓大釋全書福世天尊大悲振儒天尊大悲大振末俗利扶生民天尊大悲修訓撮約明聖天尊大悲收緣利世結善天尊大悲水道平通天尊大悲土正大平天尊大悲平章萬品四約天尊大悲復正天道心身和濟天尊大悲細詳星斗人身合道天尊大悲體懷約斗天尊大悲文章百潔緒淸天尊大悲小赤掌部正疾天尊大悲小赤掌疹祛惡天尊大悲小赤掌痘運正天尊大悲大疹大痘運正天尊大悲扶疾天尊大悲修章正運天尊大悲修文明天正運天尊大悲運行天德川原流惠天尊大悲聲教大著天尊大悲禧衍嗣孝天尊大悲範容木修廣孝運思天尊大悲修榻安天風訓天尊大悲振