body:
  text: 三寶萬靈法懺下元道士王守上閱五老誥志心皈命禮陰陽始祖天地根原受誥命於玉皇秉呪章於靈寶彩書錦篆吐五炁之精華赤幅丹囊發三光之晃耀嘯歌於寒靈殿内飛步於紫微宮中煉度身形鎭驅妖邪大悲大願大聖大慈五靈五老上帝度人護命天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懺五老卷四下第八策偈曰一點塵情總不沾無滓無染見先天好將内境來觀察何等淸幽何等閒淸靜爲基第二十二分道言天體原自光淸人心本來淨潔及其外務相縈多情來擾而本體搖搖莫能自主古之修士惟有一念爲定不以世雜相羈馬非靷而奔騰意非繩而曠放有意不如無意制心不如忘心所謂心不忘道道可得焉道與心忘心可存焉存忘之關自此知矣内有其心自不知有以心繫境境斯亂心外有其境不知其境境亂吾心心境相逐淸靜遠矣先欲入道道在何處宜早斷嗜慾悉捐繁華見物不遷遇事不紛矻矻不移昭昭不昧冥坐如臨神明幽獨若當指視昬昬者不覺朗朗者自知是以大道不外乎能淸大丹常存乎至靜古經曰人能常淸靜天地悉皆歸今對高尊神靈自畏於心思慮常澄於體體澄神現神不在己更何出歟對神淸靜不對神而亦淸靜神不因我淸靜而來我不淸靜而神不來則神與我遠我與神暌不知淸靜爲道道無往而非神如獨云空守無爲止可畢躬未能治眾天下能淸靜則無紛爭之患國能淸靜則寡奪篡之憂家能淸靜則無擾攘之私一身能淸靜則滅累害之虞家人順之一國調之天下定之所謂一人定國天下豐雍和以生祥到處成化非云孤坐一隅衣衲食茹養素爲高置事不理而隤家廢國之云淸靜也是言淸靜之無偏而非獨悟自了之所能耳今向諸天聖眾表彰淸靜之理發明迷蔽之由安敢不自惕自儆恭己運心至誠叩禮如覩天容大悲靑靈始老蒼帝天尊大悲丹靈眞老赤帝天尊大悲皓靈皇老白帝天尊大悲洞靈𤣥老黑帝天尊大悲上靈元老黃帝天尊大悲梵顏恆和天尊大悲梵心不注天尊大悲梵旨常垂天尊大悲梵妙不隱天尊大悲恢大法天尊大悲著天儀天尊大悲俄然飛體忽謁金庭身泰神遊常樂天尊大悲呼氣吸神來神往氣日月照海珠珠自墜天尊大悲風飄花實天尊大悲雨潤林英天尊大悲寶碩天尊大悲林錦天尊大悲運景新天尊大悲輝昌景天尊大悲正昇天尊大悲露達天尊大悲豐物果實天尊大悲縷錦天德天尊大悲赤玉天尊大悲飡赤珠天尊大悲保泰德天尊大悲光德透神上方彩詔天尊大悲道滿二儀天尊大悲和神盈天天尊大悲功合日月天尊大悲偉烈天尊大悲自畏畏天自敬敬天自靜靜天自樂樂天四眞五透天尊大悲渾和常泰天尊大悲身居大林天尊大悲暢穆天尊大悲淨永天尊大悲恆淨悅天尊大悲恆大樂天尊大悲熙和長存天尊大悲乾悅天尊大悲震恬春和天尊大悲水新光昌天尊大悲聲達普土天尊大悲靑林長茂天尊大悲南靈天尊大悲住南靈遊東靈上升五景下達九光普明天尊大悲身住八林天尊大悲長天光足天尊大悲赤體天尊大悲赤目四昭天尊大悲八目天尊大悲四目皓翁天尊大悲睂靑九紫天尊大悲鬚濶八肩天尊大悲輝炳靈天尊大悲丹丹天尊大悲皓潔天尊大悲光注上林赤神升達六備九圓天尊大悲公通天尊大悲國足光充人華廣秀天尊大悲竺祿南陵天尊大悲廣通天尊大悲亮著天尊大悲曲度天尊大悲形長足廣委委天尊大悲背紋山厚天尊大悲面皺水波天尊大悲混混大度天尊大悲高居上老天尊大悲金車玉容天尊大悲瓊臺寶塔天尊大悲月宮姿茂天尊大悲長生風殿天尊大悲容姿翁童天尊大悲長浮住世天尊大悲敬樂天尊大悲曠樂天尊大悲坐樂天尊大悲卧樂天尊大悲十方普樂天尊大悲東遊渤海廣度天尊大悲上碧天尊大悲空羅世秀天尊大悲虛中求丹天尊大悲苦丹樂道天尊大悲度國天尊大悲康樂國天尊大悲浮遊度天尊大悲羣度長生天尊大悲雷果天尊大悲佛世超竺天尊大悲出普林天尊大悲度普林天尊大悲漢出傑保赤靈酬大主敬啓後國天尊大悲封碧天尊大悲金丹護體天尊大悲寶光大普天尊大悲正名如道天尊大悲叟容正重天尊大悲翁容若飄舉止飛雲天尊大悲果登上妙化道天尊大悲功童成果天尊大悲豐顏滿注天尊大悲聖道衍仙上證天尊大悲能修補體大丹天尊大悲仙入上洞天尊大悲仙飛老人天尊大悲樂修天尊大悲樂道大行天尊大悲貧修樂志天尊大悲修行老體無苦天尊大悲骸還天尊大悲骨存天尊大悲幼體化親廾存天尊廾音羿大悲念轉大老天尊大悲顔容重實天尊大悲塵翁飛杖成雲天尊大悲浮雲大度天尊大悲虛容升天天尊大悲古禽飛筆天尊大悲舌生化蓮香秀天尊大悲香舌成道天尊大悲妙音天尊大悲妙訓得果天尊大悲長手摩地天尊大悲鬚睂證老天尊大悲長髯若聖少顔天尊大悲少容得丹天尊大悲少穎天尊大悲羣聖大修天尊大悲彈古成鋒詠詩無魚得化天尊大悲成品廣行天尊大悲大行自如容古天尊今遵淸靜之科歸投上聖諸天無邊功烈普著人間凡我下民多染凡情多貪世境多迷邪道多逐紛華竟趨地獄不知悔悟旣蒙聖訓猛省囘頭猶然適明適昧常新常垢安能入道若自不恆有辜上天望祈垂憐後當滌洗攜步神台高登聖境修丹有得大表天功偈曰觀心觀滅兩都空内外功夫盡可融丹道何曾留種子本來無物見英雄讚曰心居靜地本不沾連只因外務兩相牽安得討淸閒一點當參不費幾多言神明内覺五惹誰干法門誰許賊窺扳紀度自森嚴光透圓圓畢直上泥丸諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天眞宰度災濟刦萬眞無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護已身處處蒙恩人人佩澤大悲大願大聖大慈玉經啟教金闕萬福護身眞人流演萬眞妙寶神功顯號應化天尊偈曰事紛萬變本無拘我主常存體自虛來去何常分造化月明照透五空區應事不亂第二十三分道言渾沌之先何常有物旣無其物何常有事當上古之世結繩以治必樸𥳑而無爲恭已默思所以刑措名馳禮樂不作教化穆如君無威而大治彰民無犯而弘功理父非訓而慈子不繩而孝上雍下恬八方迺和奚效順也咸因一念無紛渾渾自忘以致國家泰甯風俗馴雅及其後禮制樂明詩興書啟人心彌蔽道立仁敦世俗愈頽民不畏法四域皆擾嗚呼事何煩難而無紀也我以一人之心而理天下之變以天下之變而聽我一人之心不亦難乎其實不難總之心爲神明千化莫測萬化莫窮品品從心心隨物物不爲物亂物由我出入我而我應之出我而我制之事爲心試試以驗心事以見神神作事主我神淸常若止水我神定常若明鏡人物一來一往固自搖搖水止鏡明本自如如其定之者心亂之者意意從事擾事擾意紛並其心亦無主况於神乎神乃心之用也心乃神之居也居之不甯人何以存人賴居身居亂身驅其居無人庭虛生塵所以萬物非外皆吾之靈明所生非靈非明萬事荒淫日往月來天地何停樞綱一立羣品流行君臣上下合理厥紛風雨順候寒暑旣均春秋乃定二至二分物暢事治庶類遂生稍有弗和奚以恬甯乾坤得永元亨利貞是以運禮由乎至誠大悲靑靈始老蒼帝天尊大悲丹靈眞老赤帝天尊大悲皓靈皇老白帝天尊大悲洞靈𤣥老黑帝天尊大悲上靈元老黃帝天尊大悲洪文訓世天尊大悲德化丕昭天尊大悲立不朽天尊大悲紀無渝天尊大悲果因長生教立大道日同心體月共神靈素永長命天尊大悲風行浪逐水定風恬一心不遷四正天尊大悲日光常凝天尊大悲動身常轉天尊大悲聖天治世天尊大悲盈和天尊大悲充神天尊大悲治身順天尊大悲訓心治天尊大悲允神治天尊大悲雲氣盈神天尊大悲來神氣天尊大悲聖廣化天尊大悲詩專和天尊大悲秋風穆如天尊大悲草結大寶天尊大悲林身天尊大悲狼恬天尊大悲樹丹結天尊大悲寶結珠林天尊大悲芝靈天尊大悲香芝結氣天尊大悲紫煙飛天天尊大悲霧丹出瓊天尊大悲障掃災淨天尊大悲大掃俗塵天尊大悲除威天尊大悲弘威悉和天尊大悲雅治世天尊大悲俗根斷天尊大悲入道出道生神化神羣物光照天尊大悲治己正物出心入神飛空納虛大洽丹法天尊大悲服炁食神天尊大悲逐羣魔驅眾紛一念歸神天尊大悲五色不生天尊大悲五味不着天尊大悲住冥波天尊大悲出北靈天尊大悲靈爽存陽天尊大悲南天長居天尊大悲盛林住生天尊大悲章道大訓天尊大悲繡樹天尊大悲騫樹天尊大悲寶羽輝煌天尊大悲上著天尊大悲明廣訓天尊大悲古道大作存治羣心天尊大悲仙風大振天尊大悲開山正教輔仙逐邪協護太平天尊大悲功孚天德治世廣佑天尊大悲深教天尊大悲虛教天尊大悲空羅天尊大悲大閻浮廣盛訓天尊大悲地貞天尊大悲山大甯天尊大悲川不溢天尊大悲教揚揚德穆穆威和竝濟天尊大悲甯天保土天尊大悲獄虛魔淨天尊大悲除獄魔天尊大悲蕩地魔天尊大悲掃人魔天尊大悲神心自治天尊大悲治人物化人物不竭常存天尊大悲妄意化虛生神廣福天尊大悲賴遂德生天尊大悲神照天尊大悲智廣慧林天尊大悲宿世寶慧天尊大悲先亡咸賴天尊大悲通人念達神心兩覺天尊大悲弭寇根天尊大悲大截寇魔天尊大悲紛治天尊大悲萬變不竭天尊大悲正祟天尊大悲大正心祟天尊大悲不空物天尊大悲存空天尊大悲空住虛存留性化心天變神甯虛虛不定天尊大悲普淸炁天尊大悲彰梵教天尊大悲超柭靈天尊大悲退祟炁天尊大悲退心魔天尊大悲分身化物天尊大悲化體化物天尊大悲出幽域體光明利濟天尊大悲情淨性甯天尊大悲十二神來合體長淸不濁天尊大悲永屹天根天尊大悲丹闕注名天尊大悲金庭紀字天尊大悲東殿主林天尊大悲祇林得證天尊大悲貝篇天尊大悲曇映貝篇天尊大悲梵證天尊大悲應梵生化天尊大悲合釋宗天尊大悲合儒禪天尊大悲坐齊臥齊天尊大悲理神性天尊大悲制忘天尊大悲羣忘天尊大悲治體化體天尊大悲獨坐入道化身現身出入飛舄天尊大悲飛神出應天尊大悲甯身心天尊大悲水心得道天尊大悲天風存耳天尊大悲消息竝忘天尊大悲泰道天尊大悲大亨道天尊大悲大貞道天尊大悲離治天尊大悲正表體天尊大悲衞上聖天尊大悲戈㦸消弭天尊大悲火融天尊大悲赤寶盈身天尊大悲寶鼎注神天尊大悲剛鼎天尊大悲寶法天尊大悲持法天尊大悲行盈四角天尊大悲符定天尊大悲文虛五炁天尊大悲大法振威天尊大悲降靈天尊大悲降大靈保大宇除羣魔化丕暴無干正炁天尊大悲肅穆天尊大悲馴擾天尊大悲五大治天尊大悲坎泰天尊大悲出坎天尊大悲明化幽彰天尊大悲合道修天尊大悲風儒天尊大悲照冥迷天尊大悲普修訓典天尊大悲齊遵大訓天尊皈依諸天上聖遵奉羣訓科儀修我弟子某等心田妙寶一身至用安敢違逆奈弟子等一念未專諸紛來集事之未至心早牽之心之未甯事更叢之有如酒尙未唇而心先醉有如色猶未染而念先馳雖在夢中初醒猶以爲眞雖然夢後何嘗謂爲幻境一生虛度幾曾不是浮花半世奔忙究竟認爲