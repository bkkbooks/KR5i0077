body:
  text: 三寶萬靈法懴下元道士王守上閱列星誥志心皈命禮先天盤古周御國王靈光映慈惠之容滿月現眞空之相北府延生而解阨南宮削罪以綿齡明明主算於東𧾷糸朗朗記名於西極輝煌四闕燦爛中垣二十八宿之經天萬二千餘之隱度大悲大願大聖大慈先天斗父斗姥五斗列曜星君慈光普度妙應天尊總讚星辰高列位人體共原由禳災集福此中求明明天上揭朗朗寸間收有斂須宣現往來處處周空懸妙象透崑丘流亮海波頭海中聚宿豈是虛籌又達人身泉湧漚斗天映下世個個有重樓星集順逆與伏留符津運默投得此環通理自證聖諸矦豐滿精修不可任虛浮太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴列星卷七上第十三策偈曰分明有個妙眞人藏住身中莫失根保得眞人身不壞自然永世遂長生保護眞人第三十七分道言身中有原來眞面眞面常存終世不枯不朽能升金闕可運天門行道之士上香行水一步其虛輒有冥感卽知身中元炁之應接也若持之以泛泛徒飾趨蹌之貌空存吐嚥之文又無足論至若修士修身道乃已之元炁炁卽道之本名道與炁一眞人從生世謂眞人爲妄不識體内之根也又曰眞人乃術實失身中之寶也術非道體道亦寶因養道養吾寶修寶修吾道道寶無他是吾炁也保而無失眞人乃立全而不壞眞人無礙玉經曰持是經人當自稱爲正一眞人正者正而不邪一者一而不紛眞者至誠而不雜人者陰陽之有合明是四者道斯在中不能悟而修之名曰正一眞人實爲魑魅魍魎豈上帝之誣以其名而妄加於其僞士乎自誦自稱甚自慚矣卽是以觀可識眞人之體可得眞人之元持此一靈勿敗勿傷一生不遂其升騰在世亦快其志願志願堅貞猶如樹蒂蒂根盤結枝茂花繁果自成結必然之理何可多疑今昔有驗賢智難悉今對諸天自叩叩眞當誠願力望謁如眞無生怠慢一心運禮當同恭敬大悲先天盤古周御國王天尊大悲中天斗姥大聖元明道姥天尊大悲北斗解阨延生天尊大悲南斗六司延夀天尊大悲東斗主算天尊大悲西斗紀名天尊大悲中斗大魁保命天尊大悲二十八宿週輪天尊大悲周天眾星合算應福天尊大悲安身延夀天尊大悲安命保身天尊大悲安元全體天尊大悲保魁天尊大悲全魁天尊大悲保命大亨天尊大悲福體大成天尊大悲亨甯天尊大悲廣亨受祉天尊大悲流運慶吉天尊大悲盛福天尊大悲多集壺芳天尊大悲煩果天尊大悲枝慶大衍果集根廣盛息不竭天尊大悲恩廣大德天尊大悲豐果天尊大悲得大福齡天尊大悲豐篤天尊大悲信深福盛大惠天尊大悲萬慶自致天尊大悲級升玉闕天尊大悲金門自升天尊大悲拜垣如如天尊大悲𧾷纒糸次長明天尊大悲舍燦明天尊大悲舍常徙天尊大悲遷吉天尊大悲悔吝遷福天尊大悲貞祉永亨天尊大悲至亨至利得惠永亨天尊大悲安川東北天尊大悲安川西南天尊大悲甯山川定分野四感五應偕福天尊大悲香願典願司慶天尊大悲嗣息延永達惠達聖天尊大悲同錫洪惠天尊大悲普救天尊大悲慈光大救天尊大悲妙感妙應天尊大悲光舍甯天尊大悲光福甯天尊大悲爛朗四闕天尊大悲照西普濟天尊大悲映東善救天尊大悲輝北大福天尊大悲朽復續天尊大悲老人喜慶天尊大悲南老天尊大悲東叟天尊大悲東北老翁天尊大悲中垣叟天尊大悲中及北垣老童咸度天尊大悲豐夀聖祿常綿永衍天尊大悲祿星在御天尊大悲馬星來扶天尊大悲貴星濟天尊大悲祿星接天尊大悲夀星衍天尊大悲紀齡大衍天尊大悲主夀大傳天尊大悲舟濟東川天尊大悲楫救東海天尊大悲救西北海川天尊大悲救中流溺災天尊大悲柱立中川四保全峙天尊大悲風濤望斗天尊大悲接濤禮斗得福天尊大悲落濤升救掌祿天尊大悲陷魄得光天尊大悲沉魄受光復升大垣天尊大悲久沉川海永滯河江得光大濟天尊大悲斗府注生延命天尊大悲斗府注死上生天尊大悲陶魂輔濟天尊大悲鑄魄上相天尊大悲陰魄生天尊大悲陽魂升天尊大悲陰陽復人天尊大悲空輔天尊大悲虛扶天尊大悲德充東次天尊大悲德傳南司天尊大悲聖曜天尊大悲神炎天尊大悲寒火天尊大悲涼温水火天尊大悲風川大息天尊大悲恬風斗和天尊大悲斗司祿天尊大悲斗司祿天尊大悲斗司童子天尊大悲斗司大翁天尊大悲斗司五翁天尊大悲斗司羣翁天尊大悲斗司羣童天尊大悲斗司壯童天尊大悲斗司嬰天尊大悲斗司赤生天尊大悲斗司落生天尊大悲斗司泣嬰天尊大悲斗司老眉叟齒浮容天尊大悲恬怡天尊大悲斗司速報應天尊大悲斗司緩報應天尊大悲斗司善報應天尊大悲斗司惡報應天尊大悲斗司善惡始終悔遷報應天尊大悲斗司世人功德天尊如是斗府尊神至靈至赫莫不森嚴人皆以爲削死上生而不知其司愆紀過東南嶽府聽其算數天曹地府從其檢名詳目一切諸條因而定案獨爲善者越乎格外而大惡可以回勘在於復自警悟天地亦無定死之心善者殷勤天愈增其福祿惡者勉戒天亦加以赦除分明不爽在人自修草之芝蘭益行培固木之茨林當勤修治未有天神敗其良材而扶蔭其惡木者也况乎各因篤之莫不因以錫以災望祈諸天聖眾保體延年削凶囘慶永享淸平吉曜高臨令升顯路得登洪果可證天班偈曰可修可勉夀能綿莫慮前功未得全止在恒心無間徙自然斗府有長年讚曰童嬰可保况爾翁年長眉斗府保羣延莫問幾囘還甲子東山各自出陽天堪能自守豈慮難全神司轉柄更綿綿春秋笑指譚期頤能歡大道有靈丹諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天眞宰度災濟刧萬眞無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護巳身處處䝉恩人人佩澤大悲大願大聖大慈玉經啟教金闕萬福護身眞人流衍萬眞妙寶神功顯號應化天尊偈曰至道由人不在天能榮能朽我能延莫因譽毁生勤怠獨自行持豈放寛道大謗生第三十八分道言亨吉在我道本吉而無凶自得優游何問人之毁譽君子惟修巳身木之屈直自有繩墨制之已心方圓平直在乎心墨神定心閒心平人體自周心屈人情可得卽人卽巳巳可類推况大聖大賢成佛成祖安必乎他不可必人尙可自必天寶吉人未惟寶吉我不吉爲天亦災我禍來不能自弭獨弭於禍之未生災不可免無妄則免水就下火炎燥雲龍風虎蓋各從其類也方圓者如川之就於盤卽行卽止心之源流信卜於我外之人來總無問焉佛氏在坐歌利解體而不自覺則魔王退於如如之心老子之過東土羣魔攻之而老子自視冥冥觀羣魔如羣兒作戲魔退天空東土得度從可識矣尼父息憩杏林羣小攻之所息之地羣小削之杏伐不爾跡削不問桓魋欲殺不能匡人欲害不敢卽東山之遠管蔡難加於姬公宜思我德我業可如宣父乎可如周公乎可如老子及牟尼乎大道高天魔及於天大道深淵魔從於淵小人卽魔君子正魔我與魔爭我與魔等魔見正人而正人不避正人見魔而魔終消石之錯玉玉乃得器詩云他山之石可以爲錯者此也惟自修能解自悟作退譽之非美名盛毁來故大人兢兢望進不希福至惟患禍生患禍寡禍禍少卽福謗從何來謗去身安古人曰水平風有動浪起念無生舟翁常把舵靜已自如行可將是語作我佳談自在從心無往不得中庸不怨不尤卽我修道之法拈而悟之須臾可得今向諸天不叩毁由惟循天理禮運心恬羣眞在目彷彿神庭欣欣來格大悲先天盤古周御國王天尊大悲中天斗母大聖元明道姥天尊大悲北斗解阨延生天尊大悲南斗六司延夀天尊大悲東斗主算天尊大悲西斗紀名天尊大悲中天大魁保命天尊大悲二十八宿週輪天尊大悲周天眾星合算應福天尊大悲神運天尊大悲神思不馳天尊大悲盛名致譽無在不怡天尊大悲長生神智天尊大悲智慧悅心圓圓翠珠無敗新美天尊大悲芽善黃生天尊大悲中天大道天尊大悲先梵從固天尊大悲盤古得炁天尊大悲古炁天尊大悲古梵天尊大悲太古派源天尊大悲太素根天尊大悲太極川天尊大悲太極本天尊大悲梵炁敷足天尊大悲梵先光天尊大悲梵正耀天尊大悲梵得祖根天尊大悲宗大梵天尊大悲宗元梵天尊大悲通梵天尊大悲透梵元得天尊大悲達元炁得梵炁光光自照天尊大悲光續光天尊大悲光通光天尊大悲月在梵天尊大悲月滿梵天尊大悲星光得達天尊大悲斗光滿透天尊大悲南離星北坎星二炁自取天尊大悲東震炁西兌炁二星來扶天尊大悲中用炁黃府自理天尊大悲黃庭丹用天尊大悲中庭丹用天尊大悲五星正照天尊大悲雨氣滋身八正合神日月在心普輝天尊大悲斗𧾷纒糸徙吉天尊大悲斗舍在體天尊大悲嶽星應身天尊大悲全天普圓天尊大悲圓大天尊大悲珠滿天尊大悲滿月分光天尊大悲月來在神月去神寂高碧兩映天尊大悲出世住世留身化身幻虛存存天尊大悲可月天尊大悲可星天尊大悲缺圓來復天尊大悲陽環天尊大悲陽玉體陰金體華華流精天尊大悲妖祟息神天尊大悲邪畏神天尊大悲邪難侵入天尊大悲君體貞寂天尊大悲皇心貞固天尊大悲斜陽寓神天尊大悲正眞東陽出神天尊大悲桑繼天尊大悲桑興陽盪天尊大悲桑盛陽明天尊大悲輔四正天尊大悲輔金闕天尊大悲輔土政天尊大悲訓中天尊大悲訓大正天尊大悲灼然卽然生生滅滅續神天尊大悲闡風雅天尊大悲足元化炁梵宮四朗天尊大悲成紀天尊大悲成大記天尊大悲奎宿中分天尊大悲魁氣威德天尊大悲罡斗森肅天尊大悲坐未指丑坐丑指未十二方中分氣流派自元自化天尊大悲罡貌同變天尊大悲變威天尊大悲佈威天尊大悲得罡天尊大悲罡煞凌祟天尊大悲祟避大罡天尊大悲指邪邪滅天尊大悲目邪邪退天尊大悲大罡能化天尊大悲風從罡日坐罡雨雷來罡得大濟惠天尊大悲羣法罡天尊大悲羣用罡天尊大悲婁星廻柄天尊大悲昴星主柄天尊大悲受角氣天尊大悲受房氣天尊大悲受畢氣天尊大悲受井氣天尊大悲受鬼氣天尊大悲精體還天寒星不滅天尊大悲害身化身星惡神吉我還元氣天尊大悲四徙天尊大悲九圓八方常升陽氣天尊大悲復大根㨗大神來往續續天尊大悲宣道訓行天尊大悲㪟道天尊大悲準斗天尊大悲準合周天天尊大悲統隱天尊大悲統寓道名天尊大悲諱星内明天尊大悲不露光長葆光性星天尊大悲斗星明海復耀崑崙示光永體天尊大悲亘星穴天尊大悲綿星明天尊大悲背星受氣天尊大悲向星領氣天尊大悲揮邪來迎指魔去復退進不一常如天尊大悲恒慶天尊大悲貞亘天尊大悲一炁在身二十四炁來合五方大宿耀灼天尊大悲風水聚星天尊大悲斗斗得用天尊大悲一斗復羣天尊大悲箕不隨運斗不用神我運我神神箕南徙天尊大悲正正輔政天尊大悲贊大週天尊大悲贊大徙天尊大悲中垣廣蔭天尊大悲林秀東星天尊大悲西冲秀達天尊大悲政治從斗天尊大悲民康從斗天尊大悲樂國從斗天尊大悲大祟斗驅天尊大悲馬走斗治天尊大悲祿永斗天尊大悲福綿斗天尊大悲夀亘斗天尊大悲老星在斗赤星在斗中垣伏叟西𧾷糸存命五舍圓身永永得度天尊若