body:
  text: 三寶萬靈法懴下元道士王守上閱七政誥志心皈命禮二曜光天五星正位太極發宣於七政鴻圖布列於元皇日月經綸調水火木金而敦土德陰陽妙用運東西南北而鎭中央弭化弘災保持大刧大悲大願大聖大慈日宮月府五方五德統制七政天尊總讚政從日月治就五行安能缺一寡通亨將開天地始未透百靈根早具陰陽一點神頭頭是道口口宗門拈來花朶卽禪音况乎丸跳往來循相生還相尅又制又相成天道虛盈總在個中分太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴七政卷六上第十一策偈曰一位眞人住上宮不須費力覩光容自然現出原來象歸我當初本面同歸眞返本第三十一分道言人當未生之先自有元神在恍惚之際來而莫覺具形出世初接先天一炁往往復復何曾有間肯將此點眞元存而無去卽是眞人本面無何百事紏萬物紛擾便將先來赤子原本嬰兒冥冥失去不知此赤嬰葆聚於身豈無其道一經嗜慾嗜慾好也一經煩怒煩怒惡也一經畏懼畏懼驚也一經喜樂喜樂縱也一經痛傷痛傷哀也此五者謂之五竇最能害性伐心能塞此竇而不令其通流則葆其眞人長住上宮虛空之所永在不離又當渾渾淪淪若亡若存有無之間圓滾於盤久暫不停何其妙歟如斯一舍在人身中身中無着在人心中心中難摹在人性中性中不定惟一意念可以見之見而不見實乃光現聞而不聞正可出神現之能斂其天自顯出之能還其神乃完此返歸之義理道之宗也旣去莫留旣來莫失本原之妙無可測而盡之凡人在世昏昏冥冥出入不知其處往來不記其庭一遘指人便向前途輒謂此吾宅也歸而返之再臨灼鑑輒曰此吾面也見而笑之久不識其家素不知其形今得其初可謂幸矣安得復迷復昧獲步高天毋得再墜於淵獲入明堂毋得更趨於谷大道一途洞洞明明大道一法井井條條莫尋異徑莫向別門當卽得也古人得手歌曰大道何常有異倫本來止有一靈明向日枉費多心力爲何別向異途門惟是初來一赤子可爲聖祖步天庭只因凡俗來紏結縛住眞身喪我根泰山搖拽難堅稳河海淵源亦涸津待後重培誰復舊何如保得本來人我今識認先初面大笑呵呵幾又停行行止止休傷損莫再將渠着斧斤忘之存之勿用意吐之納之豈留情渾渾沌沌眞元脈在我身中時時新時時新兮時時有刻刻守之刻刻生上下連環上下接通流不住萬川奔說汞說鉛都是幻談龍談虎總非眞坎離原來成譬影水火兩途乃根因大丹非着形物象妙色亦非白與青禪家須識連環義可接天庭可透身潤潤温温誠佳酒不昏不醉可長存我今明指生生術再拍吾掌笑幾聲述此古歌通運禮恍惚之中見至尊大悲炎光太陽日德耀輪天尊大悲素靈太陰月德華寶天尊大悲東方木德翠林天尊大悲南方火德赤靈天尊大悲西方金德皓素天尊大悲北方水德洞幽天尊大悲中央土德永鎭天尊大悲太眞五全天尊大悲華府明極天尊大悲聖際虛天尊大悲聖空住天尊大悲聖往復天尊大悲聖妙寶天尊大悲聖妙用天尊大悲皓空天際魂住虛翠保神太朗天尊大悲誠明華白眞谷神魄往還宇宙天尊大悲六合朗霽天尊大悲紅華至寶天尊大悲諦奥天尊大悲沉寂天尊大悲富華天尊大悲正諦天尊大悲靑輪百寶天尊大悲赤丹永流天尊大悲明上德天尊大悲新正天尊大悲止德天尊大悲善通天尊大悲定朗無爲天尊大悲分炁合天天尊大悲安魂素天尊大悲齊太光天尊大悲治體爲天潤心爲月映素浮影天尊大悲我淨羣空大林養貞天尊大悲平靈天尊大悲均炁天尊大悲合廣大爲天尊大悲自證眾升天尊大悲修本返丹天尊大悲厚體天尊大悲本無體天尊大悲克天行天尊大悲息天氣天尊大悲峻赤天尊大悲新日色還月色輪輪可運天尊大悲極泰住色不存元相空行自旋天尊大悲相輔兩圓天尊大悲轉輪伸化天尊大悲孚東曜天尊大悲轉南輪天尊大悲泰覺天尊大悲姤體天尊大悲遯色天尊大悲觀我無我天尊大悲坎輪天尊大悲節節風輪天尊大悲濟大曜天尊大悲夷道平風大化天尊大悲絕谷生谷天尊大悲鎭鎭天尊大悲觀相變洞天尊大悲變機化天尊大悲人機悉絕天尊大悲截色天尊大悲斷黑祟天尊大悲斷白妖天尊大悲斬赤邪天尊大悲殺靑鬼天尊大悲殺黃邪天尊大悲五魔杜竇天隙通神輝光往性凝凝默化天尊大悲魁隙透體天尊大悲罡鎭百爲天尊大悲煞鎭天尊大悲退惡煞扶大宿罡神東現天尊大悲寶天珍地六固天尊大悲湥洞白曜天尊大悲耀昌天尊大悲正身映日天尊大悲華明太光天尊大悲永經天尊大悲永隆天尊大悲大慶寶天尊大悲弘盛熙注天尊大悲鼎炁四通天尊大悲鼎氣升合天尊大悲降炁至鼎天尊大悲水瀰升天尊大悲陳新二合天尊大悲續朗天尊大悲黑光天尊大悲下上續元天尊大悲左右孚元天尊大悲兩接輔天尊大悲三來合天尊大悲五混色天尊大悲身在洞幽神騰明闕丹圓寶聚上下渾遊天尊大悲玩覺無礙天尊大悲遊行大林天尊大悲凡網不𦊱天尊大悲風旋天尊大悲霜解祥氣天尊大悲雪化洞煙天尊大悲翠霓化東天尊大悲西南色住天尊大悲西北和煙天尊大悲榮榮天尊大悲貴虛天尊大悲徧遊不腳天尊大悲雲虛虛天尊大悲雲虛虛月空空飛行大映朗光逼色照物自化天尊大悲普新天尊大悲紛解無跡天尊大悲田寶至翠天尊大悲田和妙齊天尊大悲盛新廣和天尊大悲承齊天尊大悲欽盛天尊大悲愛截復明天尊大悲惡根截天尊大悲罪根永絕天尊大悲愆條淨盡天尊大悲林平無棘天尊大悲樹光現珍天尊大悲翠枝出寶天尊大悲搖曳光晃天尊大悲風聲和奏天尊大悲風瑤雨蘂天尊大悲照靈風色無礙自如天尊大悲光