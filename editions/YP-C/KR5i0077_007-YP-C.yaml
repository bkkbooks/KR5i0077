body:
  text: 三寶萬靈法懺下元道士王守上閱五老誥志心皈命禮陰陽始祖天地根原受誥命於玉皇秉呪章於靈寶彩書錦篆吐五炁之精華赤幅丹囊發三光之晃耀嘯歌於寒靈殿内飛步於紫微宮中煉度身形鎭驅妖邪大悲大願大聖大慈五靈五老上帝度人護命天尊開懺總讚老人稱五炁始祖立天功德開元化掌先同後次四丹翁恬然坐喜雍雍蒼顏皓髮對純容高居玉闕重梵語空空誰參個裏出豪雄打透機鋒白首復嬰童太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴五老卷四上第七策偈曰莫道心機少用時心機止要用相宜天寬地闊非無作生物生人内有持運心得道第十九分道言上下有分陰陽旣判遠近隔而感召通所以者何謂一心爲主而冥相往來無容議擬於其間一刻動思旋然符應皆緣神靈在己正則正徵邪則邪兆正邪固殊由心所造况夫天地之大鬼神之幽何所不通何所不達總之運思之作宰也道卽於思思動於心思道道合道存乎心烏待思起而道乃來是靜中則大道不散動中則萬物不紛始驗靈虛實主往來在思思與理交正邪均不䝉於其間渾乎忘乎至哉一理經訓云可與忘我又曰忘忘並忘亦忘是何等思語曰易之思不出位皆思之得其理而物不交我能自主我仍與理忘交理忘理理忘乎我何有理物之並處歟物中有理物爲我得卽理卽物物不外理明於其際兩交奚礙月行乎天雲障四作而一輪半弦仍復存行障蔽必開何常爲礙障有作收月無增損光明之體本自潔皎比於人心大同虛朗奈何世人不悟恆自嗟言吾欲靜淨無如紛紛者何吾欲寡思無如思至者何不知求脫斯脫求雜斯雜雜非入我我脫雜化化其雜紛不存種子一掃污紛光瑩圓圓几淨窗虛室庭相映快愉人懷曠機高遠卽此曲譬可見可知是求世人識道勿昧靈心靈心無幾人禽所介守之則在散之則滅危乎危乎何不欽哉今訓昭立當前急認懺言爲小用之斯弘人當運思各心恭敬大悲靑靈始老蒼帝天尊大悲丹靈眞老赤帝天尊大悲皓靈皇老白帝天尊大悲洞靈𤣥老黑帝天尊大悲上靈元老黃帝天尊大悲五天伏魔天尊大悲除斷邪障天尊大悲淸虛入微天尊大悲虛潔明天尊大悲大無存天尊大悲忘物自在天尊大悲法除跡天尊大悲非物非我大行高覺天尊大悲深海浩浩天尊大悲芒履敝潔陽天尊大悲月圓瑩天尊大悲盤根茂枝果果綴實時飡不竭天尊大悲光滿天尊大悲體不落天尊大悲懸心鏡天尊大悲法王大度天尊大悲津梁不壞天尊大悲石光久翠天尊大悲精爽常固天尊大悲直不委承皇力天尊大悲王澤廣大天尊大悲如王澤廣大天尊大悲天德從法天尊大悲人世間大法王天尊大悲地道囘龍天尊大悲山川永靖保固天尊大悲安位乾坤天尊大悲和神恬物天尊大悲和天天尊大悲天懷長慈天尊大悲念丹不捨天尊大悲煖田度物天尊大悲恩塗天尊大悲慈寶天尊大悲光合兩丸明飡諸星天尊大悲赤天符體天尊大悲丹天居樂天尊大悲大羅任住天尊大悲風蕩雨落體逍遙天尊大悲聖神合天尊大悲前種如新天尊大悲新長潔天尊大悲不穢嬰身天尊大悲鸞鳴風亭乘起朝天天尊大悲鸞舞戲樂天仙明神羣靜天尊大悲修道德從鸞歌得證玅音天尊大悲禽靈助修天尊大悲丹明天尊大悲慧修天尊大悲大修智根天尊大悲波淨淨天尊大悲台星列體天尊大悲五色淨天尊大悲五帝御侍天尊大悲仙階升降天尊大悲天眞爲侶天尊大悲升空入石天尊大悲精朗天尊大悲威明自廣天尊大悲大威靈天尊大悲大德慈天尊大悲播廣惠天尊大悲神舉天尊大悲自羽輕飛天尊大悲石孑立天尊大悲梵王得道天尊大悲廣自在天尊大悲飛神升體天尊大悲非自在天尊大悲忘卽捐飛存存天尊大悲梵思天尊大悲空空忘天尊大悲孑孑然天尊大悲大眾覺天尊大悲號渾天尊大悲外内皆存天尊大悲靈覺無着天尊大悲不住物天尊大悲不應住天尊大悲捨身命天尊大悲尼陀羅天尊大悲普光門天尊大悲出世間天尊大悲忍行天尊大悲辱行天尊大悲喜布施天尊大悲常歡喜天尊大悲大羅永逸天尊大悲大羅永淸天尊大悲逢道敬喜天尊大悲善人世天尊大悲善和人世天尊大悲光大自如在在不失天尊大悲違俗獨處光行潔志天尊大悲懶性遊逸廣大光輝天尊大悲自居天宮安靜南部天尊大悲步天宮天尊大悲左右玉眞天尊大悲行步就帝天尊大悲山岳定天尊大悲固體天尊大悲保神體天尊大悲葆元化神天尊大悲化無窮天尊大悲相不生天尊大悲無空色天尊大悲空存世天尊大悲空不起天尊大悲捐非捐天尊大悲非有天尊大悲如如天尊大悲色色天尊大悲非色色天尊大悲禪靜天尊大悲禪了天尊大悲大了全天尊大悲大了覺天尊大悲神神天尊大悲化化天尊大悲眾化化天尊大悲神在虛天尊大悲神在實天尊大悲神不虛天尊大悲神常實天尊大悲至誠無惑天尊大悲無疑根天尊大悲破礙天尊大悲碎空天尊大悲落落天尊大悲老子門天尊大悲精精天尊大悲孤了羣了天尊大悲大願王天尊大悲大願力天尊大悲廣推仁愛天尊大悲果結實天尊大悲種種天尊大悲種丹種天尊大悲飛光明天尊大悲光明自照兼廣照羣天尊大悲映廣遠天尊大悲大福惠大福量廣慈悲廣方便天尊大悲得聖天尊大悲大睿天尊大悲時達天尊大悲光達天尊大悲法慧無邊自爲不滿常憂常歉勤勤若悔證聖天尊大悲安靜如殆天尊大悲安靜泰然天尊大悲大居坦塗天尊大悲不近汚長高明天尊大悲飛天猛疾天尊大悲神王在御天尊大悲御道左天尊大悲參丹得天尊大悲田長腴天尊大悲不溫不澡自煖自潔天尊大悲乾龍天尊大悲乾大德天尊大悲乾大道天尊大悲澤