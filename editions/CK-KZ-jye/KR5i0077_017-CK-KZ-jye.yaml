body:
  text: 三寶萬靈法懺下元道士王守上閱四聖誥志心皈命禮巍居四聖範率羣眞禁鬼錄姦從命威於九煞束妖拷邪昭猛烈於諸侯證上眞於千五百刦之先分金闕於八十二身之化至尊統帥四大門王大悲大願大聖大慈四聖四天上帝除魔濟刦天尊總讚政淸樸率質素寬容發榮震疊現威洪遠近有勛功萬古皆崇四聖共天宗秀美成雄播頌至巍隆塵埃一起邪祟來叢慧刃當前斬魔凶消遯頃無踪疫瘴刀鋒水火盡融空求男希女智睿明聰仁孝徽名得累重顯耀有文風武振時雍天下定充豐大上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懺四聖卷九上第十七策偈曰心本無爲號太元纔生一念作根盤惹來後起多端務究竟終歸幻境談心動爲意第四十九分道言空靈至妙何爲故作盤地以起後之紛紛而竟歸烏有者何歟當思本初一點洞洞虛虛從無中而設相便作千頭萬狀而東見西出左顯右遮百種怪態爲巧奸不顧其名亦忘其實如花之未生根之先結一團元炁在虛靈之地何等固結自一有萌芽後之紅紅碧碧彩絢音店爛彰果之圓與未圓先成一段虛設光景紛爭人目華飾多端在人世間景象競名趨利功業掀天子孫盈堂車駟交馳何如云爲總之一意所根以至後之作用皆雜我先天之理若能自悟自參有何妨有無自爲無胸中如顆明珠眼下似同浮翳一撥障去萬理齊出慾縱來侵吾從虛接大哉至哉太冲之道日月爲明乾坤之要往往來來虛中一竅萬物從生庶民有造命之由天數之至奥出兮入兮身中自兆吉凶禍福先知所教易在人體伏羲乃肖畫以示人龍馬以告此曰先天意從何肇易乎易乎至元至效人心合斯幻中眞妙今向高天運思以報大悲天蓬大威至道天尊大悲天猷大猛至仁天尊大悲翊聖玉淸眞王貞明大聖天尊大悲佑聖眞武仁威上帝金闕天尊大悲光明大衍天尊大悲神威聖妙天尊大悲風雲丕著天尊大悲仁慈見理深靈至著天尊大悲和靈天尊大悲神行無爲天尊大悲靈氣爽達天尊大悲鳳彩至靈明德五耀天尊大悲振耀天尊大悲威靈九野一元普達正明無極天尊大悲淸正鬼震嗣流無截統數原天名耀慈廣功著文正天尊大悲雲深隱體天尊大悲聖嗣天尊大悲鸞出彩華天尊大悲神功無涯天尊大悲正仁默理大識天尊大悲恩著上流天尊大悲威慈天尊大悲威逵天尊大悲邪怖鬼除無爲天尊大悲風達仁明天尊大悲顯思天尊大悲顯功無思正朗天尊大悲覺耀天尊大悲覺聖化思天尊大悲融光五思正爲大顯天尊大悲威明天尊大悲震思坎默五中六位天尊大悲身居大中天尊大悲體中大位天尊大悲心朗意默無覺天尊大悲覺渾思存悉著大道天尊大悲高靈天尊大悲正心格眾天尊大悲心同虛天尊大悲意本虛天尊大悲念淨渾思中默正爲五度天尊大悲五風八俗正教天尊大悲正明大德天尊大悲風爲教化天尊大悲垂訓大昭天尊大悲光靈著天尊大悲光明著天尊大悲光威著天尊大悲光德著天尊大悲魔翦天尊大悲蕩邪無思天尊大悲除邪大正天尊大悲功在無思深明天尊大悲德正思覺天尊大悲榮華默貫天尊大悲道正一心元炁乃達無爲天尊大悲正顯道符一德天尊大悲震深天尊大悲離明合德心著大丹天尊大悲赤丹在田天尊大悲鼎雲上布天尊大悲雷部鼎風天尊大悲五鼎三敬天尊大悲教思天尊大悲設思合道天尊大悲根明正覺天尊大悲洪靈天尊大悲顯威光達天尊大悲理幽正合天尊大悲鳳飛五衢天尊大悲上飛鸞著天尊大悲雲霞彩身天尊大悲彩著體天尊大悲霞覆體天尊大悲雲合體天尊大悲光著八極天尊大悲仁合大聖天尊大悲道融天尊大悲德融九極天尊大悲沙明五道天尊大悲龍明四著天尊大悲聲威天尊大悲覺慈天尊大悲化身九野天尊大悲貞著天尊大悲利幽大仁天尊大悲貞靈丕應聖功四達天尊大悲仁功天尊大悲智朗覺物天尊大悲牅靈天尊大悲合神正朗天尊大悲盡心符道一默符元天尊大悲朗然咏思天尊大悲幽爲天尊大悲愼思無覺天尊大悲博德風教愼爲大雅天尊大悲聖心道範天尊大悲爐丹四明天尊大悲鼎丹八著天尊大悲火德猛天尊大悲金德猛天尊大悲木聖威天尊大悲水聖威天尊大悲正位三天天尊大悲三聖合道天尊大悲釋摩天尊大悲摩羅利天尊大悲摩羅利釋天尊大悲羅什利達摩利天尊大悲和氣利物天尊大悲聖和天尊大悲神慈天尊大悲威仁聖德天尊大悲仁和神威天尊大悲部雷威天尊大悲部雨烈天尊大悲部風威天尊大悲部電照天尊大悲八部神王天尊大悲仁覺天尊大悲仁覺丕著天尊大悲功聖德神天尊大悲仁威慈達天尊大悲貞明部王天尊大悲旃王合部天尊大悲和蕩庶邪天尊大悲和卽大威天尊大悲和符佑聖威助佑聖成仁成義兩著天尊大悲神部𧴀貅聖和眞德北鎭武當靈顯主帥同著大德天尊大悲四德四天助聖天尊大悲五靈天尊大悲九部八帥天尊弟子某等得沾聖澤覩我天眞拜禮聖名恭思號義誠非妄錫均有理加但恐弟子未合天道惟止凡心一有所爲無非誣作慾念若草之蔓生如狐之亂起惑甚疑多謗興訕作日蔽雲遮星來霧掩安得慧風迅掃疾雷巨震令其俗礙頓開聾心卽覺一時回頭大悟入其神門合上聖之肝腸得先天之旨藴紛紜歸於至一衆雜淨以符眞俾我弟子心同潭月懷若空天大證仙階同登妙果偈曰念淨無爲理義空掃開雲障露青穹分明幻裏藏眞奧都向虛中得道宗讚曰道藏體内意在心生何妨發用表虛靈惟懼亂紛紛若肯從眞動作盡神人日光朗照萬里無雲蒼天包裹見弘深坤也在中輪大衆同情總要退紅塵諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升