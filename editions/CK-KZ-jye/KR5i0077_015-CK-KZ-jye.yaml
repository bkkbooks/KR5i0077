body:
  text: 三寶萬靈法懴下元道士王守上閱五嶽誥志心皈命禮五方聖境羣拱奇宮天臺各列於州區聖域聯經於分野上屬星辰垣宿不越乎虛昴星房下通湖海江河豈外乎東南西北魁魒總鎭中土提綱受封禪於無疆鑒巡行於亘古普恩萬物降惠羣生大悲大願大聖大慈五嶽五天聖帝同昭仁聖天尊總讚澄淸海浪鎭靜山巓峻峭嶔㠌復坦寛統繫豈相嫌至善至嚴遯艮謂山乾吾情吾性何所非占大人外貌與心連内正象儀觀共此兩間聖德羡尼宣通乎五嶽又合星瞻同神案牘更高懸甯獨聳空巒定有心禪細味意中言太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴五嶽卷八上第十五策偈曰一念仁慈萬事根心中惻隱愛當眞千神億聖皆從出何故毒狼作害門仁以存心第四十三分道言天地之大方便爲心聖神之廣慈悲作德當此刼運求綿數命求亨正修功立行之時寸有寸償尺有尺報况乎念眞意果其報償之故更有尺寸而得尋丈之理何能限也數短可續其貂功微可綿其縷安能謂力之弱而自囿之神之幻而自負之然念慮堅貞無所不入無所不精心能慈愛天必推體志能祥愷聖自諒原見人溺波而不援忍夫也聞人之焚而不救殘子也此種之惡尙可言乎在聖賢之途徑由佛祖之門牆且不動厥愷惻之衷又奚責乎他人之剝刻者觀古經言所謂慈悲觀忍辱觀愛物莫不由心起殺物莫不從意生此類善言縷縷無絕宣聖曰好仁惡不仁此何說歟孟氏曰以仁存心又何說歟仁之道大仁之理深仁之體廣仁之用微保之於身全之於物推之於世進之於古何非仁之一念以爲主樞至於能純能恒可以造聖可以入神可以化而無跡可以通而寡聞無聲無𦤀至矣盡矣何非仁之一意以作領綱豈區區慈愛而斯己乎今向諸天對越凛凛自體於衷念念無失運我神明運我意念殷勤頂禮上叩高尊大悲東嶽齊天大生仁聖天尊大悲南嶽司天大化昭聖天尊大悲西嶽經天大利順聖天尊大悲北嶽安天大貞元聖天尊大悲中嶽中天大甯崇聖天尊大悲恩全保物天尊大悲恩力重廣天尊大悲普功天尊大悲續命天尊大悲保世大亨天尊大悲保羣太和天尊大悲弘貞利物天尊大悲葆和大羣天尊大悲利眾安物德大貞天普濟弘施五方一體天尊大悲貞仁天尊大悲義深金斷天尊大悲金氣暮絶元氣夜葆畏天地懼爾我弘念大德正心遠物貞志强持天尊大悲功深來合天尊大悲正身利眾天尊大悲德施遐域天尊大悲固貞天尊大悲仁遠義達天尊大悲深深天尊大悲廣精宏體天尊大悲至仁廣純天尊大悲仁羣遠大天尊大悲仁蟲類天尊大悲仁獸物天尊大悲仁草木天尊大悲仁動覺天尊大悲仁蠢類天尊大悲仁羣靈天尊大悲仁普大天尊大悲婣仁天尊大悲慈靜天尊大悲慈利難思天尊大悲慈念莫擬天尊大悲慈志體天天尊大悲至慈提救天尊大悲大慈救天尊大悲大慈提眾天尊大悲慈物如身天尊大悲慈心慈物天尊大悲愛天愛物愛身愛眾天尊大悲普天一德天尊大悲統部嶽府大聖天尊大悲統部嶽府大卿天尊大悲統部嶽府勇功天尊大悲統部嶽府武功天尊大悲統部嶽府文德天尊大悲統部嶽府生人天尊大悲統部嶽府殺物天尊大悲統部嶽府德生天尊大悲統部嶽府功案天尊大悲統部嶽府過案天尊大悲統部嶽府續命天尊大悲統部嶽府促命天尊大悲統部嶽府轉命天尊大悲統部嶽府轉星天尊大悲統部嶽府轉案天尊大悲統部嶽府注文天尊大悲統部嶽府移文天尊大悲恩轉天尊大悲恩大案天尊大悲恩生案天尊大悲恩死案天尊大悲恩斗生斗死天尊大悲恩善星不遷天尊大悲恩惡煞速退天尊大悲恩死者囘生天尊大悲恩活大物天尊大悲恩朽骸天尊大悲恩水骨天尊大悲恩幽魄天尊大悲恩久幽魄天尊大悲恩道滯天尊大悲恩僧尸解天尊大悲恩僧道尼師尸解天尊大悲恩四邊尸解無妄喪橫天尊大悲明功暗功天尊大悲暗施無報天尊大悲顯報明報功德無移天尊大悲施香果報天尊大悲施食果報天尊大悲施粟果報天尊大悲施縷鍼大補綴和羣飽世天尊大悲行功積利天尊大悲功利存眾天尊大悲風和致祥天尊大悲日和轉生天尊大悲陽肅風勁寒中和霽天尊大悲陽和保恩天尊大悲陽轉天尊大悲陽柄遷生天尊大悲月柄在心天尊大悲月移死魄天尊大悲月和魂生天尊大悲日月大還天尊大悲星日注魄天尊大悲月斗在心天尊大悲心不越魄丹不外魂陰靈陽神合日符月兩道共一天尊大悲貞元利身天尊大悲元丹合日天尊大悲元炁來斗天尊大悲元神合東天尊大悲梵炁合嶽天尊大悲南炁在身天尊大悲南斗合嶽天尊大悲南星炁天尊大悲西星炁天尊大悲西南炁合身心四符天尊大悲北嶽合梵天尊大悲西北嶽合丹梵三符一炁天尊大悲五靈正合天尊大悲風合天尊大悲太陽合天尊大悲太陰合天尊大悲殺利大生天尊大悲生利大殺天尊大悲戒滿天尊大悲戒行大圓天尊大悲大戒圓滿天尊大悲五戒圓天尊大悲十戒圓天尊大悲大生大戒天尊大悲大戒大功天尊大悲滿十二廣戒天尊大悲通十二戒大圓天尊大悲持十二戒無忒天尊大悲十二戒得十二果天尊大悲十二戒得十二圓天尊大悲十二戒受十二功天尊大悲十二戒觀十二化天尊大悲領戒旋化天尊大悲受戒如化天尊大悲自戒天尊大悲自化戒天尊大悲自圓戒天尊大悲戒利化天尊大悲戒利物天尊大悲戒利眾羣天尊大悲紅日葆羣天尊大悲丹田化日天尊大悲丹心合日天尊大悲輕風和霽天尊大悲功厚心遠天尊大悲行功除刑天尊大悲行畏傷和天尊大悲行全刑薄天尊大悲刑寡功㴱天尊大悲草刑天尊大悲功注天嶽天尊大悲德刑普功天尊弟子某等聞嶽府尊聞