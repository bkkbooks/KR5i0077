body:
  text: 三寶萬靈法懴下元道士王守上閱三寶誥志心皈命禮虛皇一炁無極分眞列三境之瑶宫侍四皇之寶座說經飛篆開大道於煉烹執巻拈花洩眞詮於淸靜作天地人之宗祖爲聖佛仙之本根有相無聞何空非色大悲大願大聖大慈無上虛皇至眞玅道三淸三境三寶天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴三淸巻一下第二策偈曰物物相生有本源冥然不覺涌光圓流波淨映江中影誰叩天邊照大千萬物資始第三分道言至哉一德爲物之根其量莫窺藴奥弘深爲人之體爲事之因天得之健地得之甯三光乃耀五炁乃行九州乃奠八方乃淸江河以達山岳以貞由何而理從奚而分元亨太樸利牝和承柔順相濟剛堅實凝發育罔象泯絕無形展乎庶品藏乎一身葆乎百骸運乎寸心靈靈一點灼灼萬神紛然不雜䌓焉不昏自明自并若我臨庭濯光依依顯著津津不截厥緒大驗實徵匪倫於幻甚隱於坤大哉斯義萬聖咸聞諸善男子及諸女人欽誠運禮恭敬羣眞大悲玉淸聖境元始天尊大悲上淸眞境靈寶天尊大悲太淸仙境道德天尊大悲無量淸正光德天尊大悲洪音丕振天尊大悲亨乾和德天尊大悲坤隱天尊大悲元昭大道天尊大悲亨寶天尊大悲瑩利天尊大悲法象無爲大輝淨著光月天尊大悲至道無爲天尊大悲無爲無覺渾元天尊大悲甲乾福一天尊大悲庚化天尊大悲干著化耀天尊大悲吉善天尊大悲難星合德天尊大悲化眾阨災天尊大悲玉相普姿天尊大悲天容蓬證天尊大悲閬覺上奧洞中盡性無思天尊大悲羣品大利天尊大悲鳳廣化文天尊大悲聖安天尊大悲聖行天尊大悲敏誠思天尊大悲安元體天尊大悲奠川天尊大悲甯坤天尊大悲威服猛獸大獅子王天尊大悲神猛力大岳山王天尊大悲舉大岳山猛力王天尊大悲扶天地天尊大悲佐玉聖天尊大悲自優容葆元天尊大悲身元混天德無量無邊際降魔天尊大悲祟塵妖化天尊大悲祿厚體道天尊大悲川原本達天尊大悲了證無功天尊大悲色冺神寂天尊大悲香都天尊大悲梵朗月天尊大悲梵資生大彰天尊大悲龍見川天尊大悲利川天尊大悲涉川洪濟天尊大悲如容休休天尊大悲天龍八部和都利天尊大悲咄咄棒利天尊大悲普門大利天尊大悲品行微闇無神斯顯期利達都天尊大悲分派合原天尊大悲喝明天尊大悲照照天尊大悲遠遠利普天尊大悲保國弘理天尊大悲保兆天尊大悲護品天尊大悲弘護萬品不偃僕不滅息吉臨天尊大悲嘉植恒德天尊大悲忱丹不二天尊大悲綠赤文篆天尊大悲蒼乾古天尊大悲坤蒼老品炁流利天尊大悲魁炁大偉天尊大悲赤道利天尊大悲黃道亨天尊大悲五體一光天尊大悲一光灼灼萬福蓁蓁果盛天尊大悲圓顆明利天尊大悲益下天尊大悲損己利眾天尊大悲志敬天尊大悲開大化天尊大悲宣弘教天尊大悲敷德無窮天尊大悲祐嘏吉善天尊大悲勇聖王天尊大悲甲庚大合天尊大悲星文灼著天尊大悲嶽固南鎭天尊大悲梅馥竹貞天尊大悲喬喬雙碧天尊大悲氷立天尊大悲學力王天尊大悲智沉沉勇順順懷弘負遠天尊大悲道普天尊大悲果應天尊大悲深功徴化天尊大悲分化周理天尊大悲顯祐靈應無方不匝自普普人天尊大悲惠貞天尊大悲龍隱天尊大悲豹灼天尊大悲倚中正天尊大悲淵淵淨淨天尊大悲包理坤乾天人保德康達洪福天尊大悲籙握天尊大悲寳丹籙籍天尊大悲上水天尊大悲晶津大碧天尊大悲琅函妙藴天尊大悲碧羅上耀天尊大悲佑助神教天尊大悲空空洞洞不滓不著無虛不普大訓天尊大悲孔虛溥澤天尊大悲規恢丕度天尊大悲豁光天尊大悲性𧇖通天尊大悲性豁靈天尊大悲性混沌天尊大悲性顓愚天尊大悲視冥冥天尊大悲聞空空天尊大悲月潭天尊大悲月不照性自圓日不光體自宣潔孑天尊大悲大窮不窮本元浩浩天尊大悲淵天天尊大悲能能天尊大悲冥能能天尊大悲拔眾能能天尊大悲度度天尊大悲度無量度天尊大悲諸金神王天尊大悲步諸金神王天尊大悲表表天尊大悲弘碩碩綱恢恢丕著天尊大悲丕密利天尊大悲淸皎天尊大悲淨皎天尊大悲露澍大甘天尊大悲應露澍天尊大悲雲龍雨虎風雷王天尊大悲雪釋氷融不念重愆天尊大悲消人大惡天尊大悲不存惡業天尊大悲永斷罪根天尊大悲續命天尊大悲命正天尊大悲保性正德天尊大悲信聖果天尊大悲敬眞性不怠天尊大悲保眞靈不壞天尊大悲情淨絕物天尊大悲物色全冥天尊大悲顯德致慶福國天尊大悲力助神王天尊大悲仁惠王天尊大悲良聖天尊大悲古有德今有德人天普濟天尊大悲天輝妙慧天尊大悲眞眞葆元天尊大悲俄頃幻化天尊大悲現示大相天尊大悲天勇天尊大悲地固貞天尊大悲鼇截龍戰天尊大悲皇皇大聖天尊大悲著章天尊大悲窺微索淵符詳來合顯道天尊大悲肉體成靈天尊大悲包光永肉天尊大悲山靈降祟天尊大悲力眞强大威王天尊大悲伏萬邪顯光靈祐民福主天尊大悲恩洪開務天尊大悲勝大戰天尊大悲服閱天尊大悲天神閱天尊大悲珠光王天尊大悲𧇖孝通宣天尊此上至聖至靈天尊名號可開人之達聰可悟人之心性可助人之功烈可滌人之愆尤一切福祥由斯而致一切災殃由斯而消志一專誠珍襲以寶偈曰萬化歸原止一靈化生生化豈非神功成果就天書燦大矣乾坤作始根讚曰功高莫比德大難量天丁神士護盈堂鑪鼎噴眞香繚繞無方化始化終藏羣羣悉保處處誰殃梵炁空中有聖王在此好參詳披指弘綱道妙豈微芒諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設