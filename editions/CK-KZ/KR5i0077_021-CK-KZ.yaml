body:
  text: 三寶萬靈法懴下元道士王守上閱三仙誥志心皈命禮派原一脈道重三仙長生衍閬苑之春聖夀赴蟠桃之會羣修統領東華立極於丹門後學宗依老祖收緣於末刧始於口口相傳而不記文字繼以方方顯化而大願圓成至慈至仁至靈至聖瑤池聖母東華大道帝君純陽演正眞人三仙合濟天尊總讚擇其大美取其高賢佈行廣利用資捐受益未虛還天道酬寛個裏定知傳淸淸白白豈屬誣言厚中從薄薄中全各自任良緣隨力何煩重大在肩擔眞身眞脈一體相延皆從口口起初宜各各得宗綿萬古參禪不越此三仙太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴三仙卷十一上第二十一策偈曰說文說法說禪機洩盡天言幾悟時譚至三仙爲妙理無過平等戒條詩慢天三寶第六十一分道言夫戒者有大有細有本有末有統有目有分有屬總之一能戒之則十戒百戒千萬細事莫不能純禁其守大約貴乎純之一字不由初愼非戒也不從學勉非戒也不就理思非戒也不遵天道非戒也天道至純純而不巳乃謂之天人不能純何謂之戒戒徒止其言徒强其文徒敬其初徒習其跡俱不能久居乎理必至於後途更遷自不覺知謂之犯首謂之謗家何以云受戒也人世均謂敬天又謂天不可不敬又謂天不必敬而自敬於天不知天不需敬天無所敬惟借像以立之借像傳天借像達人借像應感以立教之由也是以中道曰鬼神不遺齋明盛服如左如右誠不可掩有如斯夫是決言像之立教鬼神道立而天下服此之謂也鬼神無越三寶之尊三寶者在道曰道經師也在釋曰佛法僧也歸依三寶非誠三聖不過借三聖之靈以自竦其體内之大聖大神托剛以敬木謂身之精氣神以及百骸千絡萬節億毛無不有神焉存之於中所以眞武經曰有三萬六千神炁服衞其身者是也人之敬三寶者自不瀆其身後敬三寶之神而三寶乃應之不能敬其身而徒禮於三寶之神則三寶之神邪目睥音比睨音詣厭棄人之惡德而終吐之雖沉檀降速之紛紛飶味烹馨之列列亦無所享易曰戔戔丘園又曰二簋用享是謂能敬不徒禮矣神至寶尊且不知敬况於他聖外神吾聖内神宗祖考妣以及人倫人道君臣父子之間夫婦邪眤之内兄弟朋友比私立行之際皆不可知矣皆不足問矣是不論存亡現存過去一切等人一切等神一切等鬼諸屬俱宜受言凛凛如法持奉條文無生疑貳存可升登亡堪遷化至信皈依頂瞻訓法大悲西池聖母元君太后天尊大悲東華立極大道統宗天尊大悲老祖純陽演正孚佑眞人妙通天尊大悲公丹一派天尊大悲至公大道丹派天尊大悲至公大派演道授丹天尊大悲丹演仙法天尊大悲丹傳祕訣天尊大悲鼎衍虎龍受祥天尊大悲授傳大道公鼎天尊大悲道衍宗化天尊大悲衍中祖天尊大悲傳後祖天尊大悲傳宗衍祖受祚天尊大悲福丹天尊大悲夀丹天尊大悲全丹葆神天尊大悲葆遵天元一道衍聖天尊大悲保元得丹天尊大悲保神全守天尊大悲保炁一神天尊大悲保炁合氣受祥天尊大悲禪宗阿力王天尊大悲禪宗波羅天尊大悲禪宗那利波羅百祚天尊大悲禪宗利達天尊大悲禪宗大受阿羅福慶天尊大悲禪宗達那天尊大悲禪宗長老羅利天尊大悲長老智靈大禪公天尊大悲長老菩提那利達利天尊大悲長老大公教福天尊大悲長老次輔訓福公靈天尊大悲長老菩薩輔公天尊大悲長老和尙智靈禪治天尊大悲大公天尊大悲五老輔公治聖天尊大悲大聖修戒天尊大悲大聖得戒敬體天尊大悲大聖奉文敬天天尊大悲大聖敬心天尊大悲大聖信果至靈天尊大悲大聖敬寶天尊大悲敬寶得濟天尊大悲濟不從神先敬一天獲羣利祉天尊大悲大神修天尊大悲大國修天尊大悲大聖儒修天尊大悲大居士修天尊大悲大修丹學天尊大悲後修丹法天尊大悲學近理修天尊大悲敬天得果受化天尊大悲祥芝百霛天尊大悲芝生天尊大悲瑞應天尊大悲瑞應果品顯化天尊大悲瑞應蕉枝天尊大悲瑞應霛品天尊大悲瑞應祥物受禧天尊大悲福綿千世後學得宗一敬萬理天尊大悲道宗大授天尊大悲宗門衍聖天尊大悲傳道大福天尊大悲一道天尊大悲理丹天尊大悲丹天尊大悲女丹天尊大悲婦丹天尊大悲諧和成丹天尊大悲諧瑟大化舉敬天儀率道天尊大悲天道天尊大悲人道天尊大悲神道同天天尊大悲人事修天合道天尊大悲大湻成功天尊大悲琴瑟成化天尊大悲内德修化天尊大悲修天化天天倫重化天尊大悲重倫修天天尊大悲敬天天尊大悲重倫修聖天尊大悲敬六道修天理受化天尊大悲天寶天尊大悲地寶天尊大悲人寶納秀天尊大悲三寶修身五成天尊大悲誠身天重天尊大悲三重修身天尊大悲文符天道天尊大悲書文化聖天尊大悲大風湻熙和利天尊大悲和熹化聖天尊大悲湻鼠成神天尊大悲畜類化恬天尊大悲靈禽得證聖文衍古神化天尊大悲伏邪成神天尊大悲邪母歸神正化天尊大悲貌同天德天尊大悲月德輔聖天尊大悲月祥成輔至聖大母天尊大悲慈育多胤愛母成福天尊大悲赤子得愛證元天尊大悲府闕稱正先聖後俗終末滌塵證果㩦孝誠正同福天尊大悲福受孝德天尊大悲孝女成神天尊大悲夀老百齡㩦婦升福天尊大悲孝翁天尊大悲姑翁佐聖天尊大悲成母元君受祚天尊大悲少衍孝門天尊大悲忠傳天敬天尊大悲神靈如天天尊大悲報敬天尊大悲答天成福天尊大悲成聖佐忠天尊大悲貞介天尊大悲介直成忠天尊大悲天敬人道天尊大悲人道合天敬福天尊大悲夀元天尊大悲夀老天尊大悲福夀得合天尊大悲大齡和婦無介成貴天道自立琴音孚合永妙天尊大悲綱通天教天尊大悲天道聖母一合天尊大悲福全宗授天尊大悲