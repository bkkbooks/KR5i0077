body:
  text: 三寶萬靈法懴下元道士王守上閱九宸誥志心皈命禮神霄元始弘淨鬱羅慈仁普降於幽沉智𥈠長臨於品類威神起稿以能生無微不及聖德惠民而自遍何物不周紫㣲宮裏顯神通洞淵境内施法力司三界之科曹九天矜式主老人之星宿南極崇功過在所必察善惡無所容私均漑洪恩無邊利濟大悲大願大聖大慈神霄玉府九宸降惠無量神化天尊開懴總讚霄府神開擁玉陛現靈光九尊顯赫太虛王長生第一當八宸次序列洞淵察福殃丈人採訪至道最輝煌功運無方神化在陰陽太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴九宸卷三上第五策偈曰三寶眞機在此關有無無有自天然纔經作用成筌腐我定身心制化間有無妙化第十二分道言大本由來至虛大化方成妙用有體有用有靜有機夫跡而着跡不能變也靜而獨靜不能化也變化無端往來不覺大道微茫杳冥自兆有無之際大法著昭有中若無非淪於有無中若有非落於無有而爲有非其有也無而爲無非其無也無有兩空何所無有無有悉冺何所有無大哉妙乎誰以宣敷人具五體榮潤百骸似乎重而且濁不識内往外來上接天根下闢坤戸一去一入混然不失赤子𨀉於靈胎聖眞現於頂顖透出光明遙映八遐顯化無方無乎有乎自叩一靜之中自察幾微之際實存主宰仍無所着所云瞻之在前忽焉在後妙理神功聖仙一致自性靈明千端一主有神往來厥神匪他自運自寂渾然太空宣聖談厥鄙夫空空之内竭以兩端微乎湥哉有無無有妙化成機是以理不必拘道不可盡拘成理碍盡爲窮境求理理隔問道道遙道不遠人人卽曰道道與人符非人求道道自歸也人卽是道非道空人人自失也我非自我羣羣之我人非其人我同人羣能參於中自然不置虛實二端卽大道之本原察本尋原斯稱化品化而非虛虛歸空滅我今說法使人了透空宗免墜俗流得超業徑千刧萬生方聞聖理始達禪關何不解脫長處昏迷旣向法壇宜速覺悟如居幽地斯獲高明出谷遷喬禽蟲猶悅人依昧昧奚不若禽有如風烈舟遊北海南溟四邊無岸舟何救傾忽際訓扶斯宜急轉不自求登樂地愈向顚連不及覆溺必不求止何甚愚乎何不痛乎上眞垂以金章示以尊號若猶了輕自取淪墜三囑五叮莫非至惻但見神文或聞聖號慇慇頂禮隆具香花燈菓陳設威儀如來如覩神聖歡欣受福無量志誠運禮人各恭敬大悲玉淸眞王長生永命天尊大悲尋聲赴感太乙救苦天尊大悲九天應元雷聲普化天尊大悲九天雷祖轟天利物天尊大悲紫微碧玉天尊大悲九天伏魔應感天尊大悲九天丈人天尊大悲九天可韓天尊大悲九天採訪妙化天尊大悲除凈魔難天尊大悲永斷孽根天尊大悲修除大災無復流難天尊大悲弘修巨果證超淨域天尊大悲聲威大著天尊大悲金闕上證天尊大悲三境往來天尊大悲玉聖大容天尊大悲正肅嚴明聖躬近輔天尊大悲懷澤利濟天尊大悲太空遊晏天尊大悲空靈不障天尊大悲神功利世天尊大悲威猛四服一切皆利天尊大悲霆烈週達無向不生天尊大悲雄生大類天尊大悲普明大證還歸太虛天尊大悲普教遠方四歸八嚮天尊大悲投傾悅服天尊大悲親悅眾類天尊大悲朝謁聖境天尊大悲姿容不倫光嚴表範天尊大悲高大舉冲天尊大悲靖恬安和天尊大悲奉行元皇大道天尊大悲傳行聖教天尊大悲拔利無窮永貪羣善修已天尊大悲培身養道還元立息大丹濟眾天尊大悲政孚帝道天尊大悲主聖冥伏無靳弘惠天尊大悲道本德原天尊大悲流光發照天尊大悲普聖遠功天尊大悲通無盡慧達無窮理天尊大悲說教通宗天尊大悲易簡可循無異天尊大悲化工渾形天尊大悲天際不涯天尊大悲窮究陰陽混元大會天尊大悲融魂冥聖至大寶元天尊大悲澤推萬物天尊大悲回照大光天尊大悲恩及蟲物不區大細天尊大悲正大度法天尊大悲姿羽卓飛天尊大悲空高無度天尊大悲量一切包懷不露發天尊大悲容貎異形心等平常天尊大悲江河淮海難擬廣懷天尊大悲早登覺域天尊大悲朝言奏濟上升樂方天尊大悲朔方和樂天尊大悲和泰在度天尊大悲難比神化天尊大悲庭寂爲懷宮虛作度至德廣運天尊大悲推行日月天尊大悲四序無踰天尊大悲修煉尋本天尊大悲赤丹大就天尊大悲盈充香味天尊大悲飲飡煙霞備嘗獨樂天尊大悲眾願普就天尊大悲一倫無失風訓萬羣天尊大悲光普大覺天尊大悲成功在聖至大無紀天尊大悲斗在神身不缺天尊大悲光洞聖域天尊大悲隅無限量天尊大悲品峻德遠天尊大悲道體幽默貫妙天尊大悲參宗卽合天尊大悲無往不具隨念隨應天尊大悲大願克濟天尊大悲上鼎早登天尊大悲少齒成功天尊大悲童嬰冲羽天尊大悲至老煉功證無上聖天尊大悲體住無上任虛出入天尊大悲丰懷達遠天尊大悲益利羣生始周大願天尊大悲神都頌績天尊大悲垂名萬異天尊大悲亘古今道天尊大悲長存住京天尊大悲淸都妙寶自資無盡天尊大悲神品難議天尊大悲功著大羅天尊大悲紫霞蔭覆神明來體渾合天尊大悲神帥卽應往來威感天尊大悲震動發育天尊大悲大妙誰測天尊大悲渾成聖體發映萬羣天尊大悲神明呼召天尊大悲召不容息卽往卽來迅發威力天尊大悲龍虛變體天尊大悲升降莫踪出入無際神化天尊大悲難議莫思天尊大悲至廣淵源天尊大悲洪系統達天尊大悲歸晏樂境天尊大悲徵明大化天尊大悲法眼遙通天尊大悲道心萃華天尊大悲方便人力作功修果天尊大悲設法說訓教人無方天尊大悲投傾卽化天尊大悲誠道卽合丹功明心了道天尊大悲安然不動心滿天尊大悲恬蕩風神天尊大悲夷居爲念天尊大悲天道孚敬天尊大悲