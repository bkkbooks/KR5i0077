body:
  text: 三寶萬靈法懴下元道士王守上閱九宸誥志心皈命禮神霄元始弘淨鬱羅慈仁普降於幽沉智𥈠長臨於品類威神起稿以能生無微不及聖德惠民而自遍何物不周紫微宮裡顯神通洞淵境内施法力司三界之科曹九天矜式主老人之星宿南極崇功過在所必察善惡無所容私均漑洪恩無邊利濟大悲大願大聖大慈神霄玉府九宸降惠無量神化天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴九宸卷三下第六策偈曰目前有道道非遥何用多猜自苦勞疑乃丹家招障處光明了了月天高疑惑障道第十六分道言路徑當前分明可見何爲徒自紛紛多生歧別本西達於淨土反更向於旁途欲東步於生門又別覔其死路自悟不覺其非自朽不知所悔誰明道在目前而條條井井何其易也淨土雖西及向西而求之西則遠矣生門雖東及向東而問之東則遥矣嗟哉不知其徑者何皆緣疑根未淨所以性珠不圓以致三牽四惹七沾八連荆茨由此而生途路由此而雜馬鹿易辨而亦昬昬狐兔易别而亦瞶瞶甚則趨於虎徑走於孽藪而不自識其囘頭何爲大迷大謬以致害心害心並害其道害道因害其心不惟害已之心並害其人之心往往相引個個成迷以迷授迷害莫大焉總之疑不斷惑不明爲禍匪輕故玉典云斷障之法第一無起疑惑卽宣聖所重在於辨惑學道者奚不自思而自審之今向道前一一返己内叩心如塵鏡何以得淸性若凝冰何以得化望懇諸天反覆加護啟訓凡愚至心敬運大悲玉淸眞王長生永命天尊大悲尋聲赴感太乙救苦天尊大悲九天應元雷聲普化天尊大悲九天雷祖轟天利物天尊大悲紫微碧玉天尊大悲九天伏魔應感天尊大悲九天丈人天尊大悲九天可韓天尊大悲九天採訪玅化天尊大悲通靈震應天尊大悲庭虛翠明天尊大悲車轉應運天尊大悲神應若虛天尊大悲震啟天尊大悲辰通天尊大悲風辰雨宿應震達明了如谷虛天尊大悲達明正肅天尊大悲陰達陽通天尊大悲時運天尊大悲昌應天尊大悲乘昌天尊大悲緣了達天尊大悲緣淨了天尊大悲根圓天尊大悲行通天尊大悲修明天根天尊大悲靈心種本天尊大悲智珠天尊大悲玉性天尊大悲諸根通淨萬緣淸悉了明無着自無所着空滅行圓天尊大悲太空朗洞天尊大悲空虛自然天尊大悲太素本行天尊大悲素朗天尊大悲素赤朗天尊大悲宗空天尊大悲宗空自在天尊大悲電灼天尊大悲光徹心朗天尊大悲大光電天尊大悲大應光電天尊大悲叩内素皓應外黃宗正一無區並珠合光大道天尊大悲靈皓天尊大悲普皓天尊大悲聲月應天尊大悲觀世菩提心天尊大悲聞世婆蜜心天尊大悲阿陀心天尊大悲阿陀蜜心天尊大悲大羅頂住天尊大悲虛羅光化天尊大悲虛素赤炁天尊大悲白梵纒赤天尊大悲赤炁覆身天尊大悲身住虛天尊大悲身非住虛心如住虛化虛非住天尊大悲錦悟天尊大悲光大定天尊大悲正大定天尊大悲聖定神飛天尊大悲超羅天尊大悲三界高凌天尊大悲八方遥越天尊大悲十景八光天尊大悲三悟天尊大悲五明天尊大悲九融天尊大悲十二光天尊大悲十八朗天尊大悲二十四錦天尊大悲常遊常住天尊大悲自禪一性天尊大悲不識自性天尊大悲通無天尊大悲通密天尊大悲密性天尊大悲通悉不遺天尊大悲視聽通了天尊大悲體定心運天尊大悲心住不居身住太虛内外洞明瑩玉常璞天尊大悲渾樸了明天尊大悲𤀹明通哲天尊大悲智義天尊大悲𥈠仁天尊大悲燦章坎次天尊大悲灼性離明天尊大悲希天體天尊大悲希聖體天尊大悲忘聖天尊大悲渾達天尊大悲任心運體天尊大悲從天動機天尊大悲無所動運天尊大悲次舍依運天尊大悲空覺融天尊大悲寂滅生天尊大悲寂滅不生生生不滅化空空化天尊大悲深入谷明天尊大悲通谷如無天尊大悲登天域天尊大悲步皇闕天尊大悲丹虛天尊大悲凌渾天尊大悲華身天尊大悲瓊氷天尊大悲氷固美玉天尊大悲雪丹天尊大悲雨心天尊大悲采華玅蘂天尊大悲潤華天尊大悲寶蓮雨潤天尊大悲風聲谷運天尊大悲喬朗天尊大悲魯𤀹天尊大悲頌綿天尊大悲氣通天寶天尊大悲津延萬夀天尊大悲長存寶海天尊大悲𥥆冥落華天尊大悲華寶墜瓊天尊大悲守化天尊大悲長健天體天尊大悲至誠無壞天尊大悲徵悠天尊大悲遠眞天尊大悲竹虛松勁天尊大悲波星天尊大悲潭寂天尊大悲坐融天尊大悲持忘天尊大悲長忘無擇住空不滅渾覺天尊大悲身虛心融天尊大悲教虛訓化天尊大悲步空履化天尊大悲泉本常流天尊大悲恩漾浩流天尊大悲德耀天尊大悲嘉容耀庭天尊大悲華姿天尊大悲有相無色天尊大悲輕容玅畫天尊大悲得寶受珠天尊大悲丹鼎來護天尊大悲手持天柱天尊大悲天固天尊大悲天灼天尊大悲正立天尊大悲澹然立化天尊大悲寂若天尊大悲詔錫天尊大悲丹闕來錫天尊大悲圓月天尊大悲圓通淨月天尊大悲性劍常輝天尊大悲丹壺常救天尊大悲普聖丹天尊大悲聖丹大濟天尊大悲丹心大照天尊弟子某等旣己三皈運禮無上天尊名號如今所訓斷滅疑根掃淨惑障有若鏡塵一滌斯得光開冰結見陽自得化釋寶相在匵展之則華耀盈庭大珠在璞琢之則光瑩滿轉依此不淪不墮背之則長没長沉言念及斯汗然愧覺俯叩尊容仰希天德錫我洪恩永斷疑障令我一魔不生諸緣皆息從茲了道頓步天堦偈曰空明一顆玅圓珠無滯無渣豈礙途又似光明眞鏡照掃開塵障萬緣除讚曰疑根大礙宜早除芟休將長大令蔓延不覩淨光天障我心田那得自幽閒一心朗覺有甚相牽悠游自在何淸恬泰定福綿綿知止常安卽得證高仙諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天眞宰度災濟刼萬眞無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利賴之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護已身處處䝉恩人人佩澤大悲大願大聖大慈玉經啟教金闕萬福護身眞人流演萬眞玅寶神功顯號應化天尊偈曰天生人物本同情原自無差至一心大道初來堯蹠共後時善惡各相分無局氣數第十七分道言氣在人而爲質數在人而爲命質有淸濁之分命有通塞之别有淸濁則分智與愚有通塞則辨貴與賤但凡夀之與妖聖之與凡皆有氣數之理總在至人之大渾而不言今訓世人不可不知天能以氣數與人不能使人莫更其氣數是外性而言學是外理而言功有學有功天亦不能自主天且喜得其人所云氣者何若風氣若土氣若俗染氣皆謂之氣我生於斯育於斯壯長於斯不没於風土不限於俗習出類拔萃雖愚必明雖弱必强何大道之不可進也所云數者何或降衷數或夙禀數或造作數均謂之數獨造作數似乎得權信乎有權並降衷夙禀亦無能主何不取人之作用而觀如今人爲工爲作精學則器精粗學則器粗又如妖夀然禀賦若優自殘自毒自桎自傷能無折乎可知天降者有定性無定情人之自全無浮情則有定性性定則情和情和理復理復天見天見性圓有何大道之不能入也今感諸天大聖示以訓方自然歸命頂運若前不啻心目恭敬懴禮至誠仰瞻大悲玉淸眞王長生永命天尊大悲尋聲赴感太乙救苦天尊大悲九天應元雷聲普化天尊大悲九天雷祖轟天利物天尊大悲紫微碧玉天尊大悲九天伏魔應感天尊大悲九天丈人天尊大悲九天可韓天尊大悲九天採訪玅化天尊大悲眞一無礙天尊大悲正眞通明天尊大悲公照無滓天尊大悲廣明正灼天尊大悲普精天尊大悲聖通天尊大悲大耀天尊大悲至光透天尊大悲大廣靈天尊大悲轉轂運心通穴動谷輪天推地普和天尊大悲洞然内燦天尊大悲覺洞内融天尊大悲復𥈠天尊大悲福性至達天尊大悲福根達遠天尊大悲康正天尊大悲大正康德天尊大悲崇康德天尊大悲崇風一天尊大悲一正普綱天尊大悲萬正洪綱天尊大悲眞明景德天尊大悲弘貞大度天尊大悲貞景天尊大悲洪峻天尊大悲深貞弘達天尊大悲高度闊通天尊大悲握丹度遠神引高飄鸞音靜達天尊大悲奏天和舞鳳采飄然塵表通天逸韻天尊大悲遠洞洪錫天尊大悲洞悠綿覺天尊大悲弘平天尊大悲幽洪天尊大悲淸正大俊天尊大悲能推大惠天尊大悲錫壇萬福天尊大悲大訓立範天尊大悲受珍文天尊大悲垂寶範天尊大悲轉化天尊大悲隨化天尊大悲傳度萬法天尊大悲錫法垂度天尊大悲教普示天尊大悲傳大度天尊大悲示津度天尊大悲天德足悅天尊大悲天眞接引天尊大悲雷引迷徑天尊大悲威化慈容天尊大悲威感化天尊大悲慈感化天尊大悲雷行私觀天尊大悲微覺明窺天尊大悲電普天尊大悲光徹三苦天尊大悲濟達冥苦天尊大悲提捉命救窘阨超幽難除惡報高仁廣福天尊大悲長生德量天尊大悲夀命綿齊天尊大悲無崇障天尊大悲無難障天尊大悲無苦障天尊大悲無運障天尊大悲斷除障孽天尊大悲絶滅狐崇天尊大悲朗然咏遊天尊大悲伏大崇斷大惡收大毒攝大疫普恩洪濟天尊大悲遵範弘教天尊大悲文光不没天尊大悲燭達天照天尊大悲繚繞瑞香天尊大悲香果羅珍天尊大悲寶具天尊大悲玉蘂天尊大悲瑶華天尊大悲嚴莊端明天尊大悲智增敏達天尊大悲神遥天尊大悲穆肅天尊大悲供珍品備天尊大悲潔修品敬天尊大悲罪根盡淨天尊大悲福本源源天尊大悲長通夙性天尊大悲宿福天尊大悲多宿福天尊大悲種善因天尊大悲化惡因天尊大悲教世種果天尊大悲教世修因天尊大悲植根不朽天尊大悲弘康福天尊大悲平世險天尊大悲垂道天尊大悲端極天尊大悲表方度天尊大悲正弘容天尊大悲恢恢達度朗朗居心正明高覺遠增福量天尊大悲傳文素燦天尊大悲授指無迷天尊大悲巨訓天尊大悲存鑑住世天尊大悲龜息盈運天尊大悲絡絡天尊大悲淵絡絡天尊大悲龍絡絡天尊大悲飛行如龍天尊大悲飛雲速復天尊大悲林滿雲氣天尊大悲泉雲天尊大悲泉霞天尊大悲炁續天形天尊大悲神滿川達天尊大悲百滙天尊大悲眾川普海一物不滓澄性通天了透天尊大悲懷洞天尊大悲愛隱谷天尊大悲飲長流天尊大悲筏接天尊大悲雲路接天尊大悲幢飄𣺌天尊大悲命導天尊大悲命華道天尊大悲花姿丈人天尊大悲少壯姿澤天尊大悲碩老豐月天尊大悲體自在華天尊大悲心自在華天尊大悲念自在華天尊大悲三華偕萃天尊大悲輝華天尊大悲素煉天尊大悲朱煉素丹天尊大悲玅理弘通天尊大悲道同希夷天尊大悲高風天尊大悲曠度天尊大悲逸風廊度天尊大悲朗玅天尊大悲融玅天尊大悲彌達聖天天尊大悲羅天咸仰天尊大悲仁元亨夀天尊大悲大夀仁天尊大悲大祿仁天尊大悲大恩爵天尊大悲弘祿保年天尊大悲弘夀保體天尊大悲神體天尊大悲淵體天尊大悲浩德無涯天尊大悲夀域無際天尊大悲運弘開天尊大悲星正熙天尊大悲益聖上德天尊大悲葢浮紫雲天尊如此諸天尊號其名易覩其旨難窮若克了明斯登至道止因氣質弗敏難通元性命數不齊致辜緣分惟望天尊開我俗昧掃我浮塵復我本有教我夢淸不使顚倒莫令昏迷除罪蕩愆光明朗見萬種虛花皆成玅寶輙登眞境不墜沉塗偈曰一轍千通更不塵紅開紫落總浮