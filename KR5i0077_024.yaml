body:
  text: 三寶萬靈法懴下元道士王守上閱虛皇道姥誥志心皈命禮道從性理靈透天根胎成九九之丹願度千千之刼至尊三寶誰知始自於虛皇皆重羣神莫察先原於道姥索圖書之奇耦窮河洛之陰陽無量度人萬眞化號大悲大願大聖大慈混元道姥無上虛皇大帝福顯利幽保生治世天尊太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴虛皇巻十二下第二十四策偈曰一心無二是根原畧動猜疑志不堅千門萬戶來相擾我如磐石豈能遷信道不專第七十一分道言道止一念爲根狂風巨浪不能動其萬古磯頭任其濤生涌涌去去來來旋成旋滅而石盤矻矻不易不摇何其靜也太古迄今自皇而帝帝而王王而霸戰相禪相尋敗興非一而大道彰彰爲之筋骨弗能磨没皆貞定一脉凝固一誠及於古今至堅不移雖有因革損益之不同而本來元理大體根由存運於中不可易也此道何物猶有二三之說歟今人奚以不明或覩是道而謂爲𣺌或聞是道而謂爲迂甚至見之以爲誕妄指之以爲浮誣自生疑貳更惑他人謗聖讒賢退人善志遷眾道心何以說也大咎大尤實弗能免卽至人善士嘉語良言善謨懿訓有可益人透及峻骨如雨沁枯澀莫不潤滋如砭刺膏肓莫不凉凊令人活志開人塞心况於上聖高眞憫世愚䝉垂以至典何多紛紛而弗一其志乎特對諸天志誠投悔懴厥愆尤恭敬拜禮無敢瀆輕大悲無上虛皇無極混元天帝普度刼運天尊大悲混茫無爲天尊大悲渾元天尊大悲渾始太初天尊大悲復元天尊大悲復初元運天尊大悲後符先聖天尊大悲今古一道天尊大悲後混元古一德天尊大悲先元渾後一輪天尊大悲皇風天尊大悲貞古天尊大悲貞固前初存開後祚盛文復遯天尊大悲厚基天尊大悲存元天尊大悲葆永升文天尊大悲弘旨大正天尊大悲貞古永正天尊大悲保祚天尊大悲女葆太元天尊大悲貞女保國天尊大悲貞守國運天尊大悲固貞存列天尊大悲貞存天尊大悲永照王土天尊大悲全大祚天尊大悲保大籍天尊大悲全大業天尊大悲正主保志盡節歸貞天尊大悲大存身心天尊大悲全成自主方域本限完節天尊大悲貞一無二弗轉弗圓大盡己身立極太古天尊大悲大孝大本天尊大悲完古天尊大悲完太極天尊大悲全皇極天尊大悲存古皇天尊大悲葆初極天尊大悲復至古天尊大悲完歸天極天尊大悲教中古復太古立軍立民立身始彰復隱全皇極建天紀永世天尊大悲取運正一天尊大悲運元轉固天尊大悲震聲天尊大悲震方保祚天尊大悲震合貞運天尊大悲還古復來一志全始托樹接緣天尊大悲名渾歸元天尊大悲太渾太素天尊大悲無極太樸天尊大悲無爲有元天尊大悲根充本固天尊大悲正一合志天尊大悲正體大文天尊大悲心體天尊大悲廣體天尊大悲神心天尊大悲聖公天尊大悲聖靈朗白天尊大悲光正天尊大悲光淨天尊大悲明淨大體天尊大悲淨虛大公天尊大悲潔心天尊大悲潔正明肅天尊大悲貞明正肅天尊大悲身表正物天尊大悲見心天尊大悲神公太虛天尊大悲至靈太廣天尊大悲明體達用天尊大悲推明元體天尊大悲神明本耀正意天尊大悲易見遡元天尊大悲初體派源天尊大悲洪流達緒眞本天尊大悲母元天尊大悲老母太元天尊大悲坤老素眞一體天尊大悲體坤大合天尊大悲利和天尊大悲大利符生一用天尊大悲六合利用天尊大悲徵表天尊大悲徵顯大義天尊大悲明義天尊大悲洪旨正覺天尊大悲覺心正意一德天尊大悲偕任運均任天同任事協任理合德一道天尊大悲雨羣天尊大悲潤禾葆土天尊大悲葆元蘇苗天尊大悲温田葆鼎天尊大悲全丹完體天尊大悲貞田天尊大悲固田天尊大悲敦元天尊大悲敦金天尊大悲敦國天尊大悲敦永天尊大悲復天天尊大悲復正大克天尊大悲葆天正志天尊大悲完固太一天尊大悲太素眞人天尊大悲素德眞君天尊大悲大眞至妙天尊大悲弘正一德天尊大悲旨奧天尊大悲訣妙難明天尊大悲身中迴顧天尊大悲貞覺大完天尊大悲貞志凝一天尊大悲存念葆田天尊大悲温志淸和天尊大悲永命全祚天尊大悲一道同風上古天尊大悲一俗和民天尊大悲全太和天尊大悲葆元素天尊大悲固皇元天尊大悲復帝太古旋全太一天尊大悲金德受制保道天尊大悲故本合古天尊大悲正心和俗天尊大悲待左天尊大悲輔治古名天尊大悲左右親訓天尊大悲古民大志天尊大悲自畏大服天尊大悲不聞亦懼雷志化丹天尊大悲化聖雷訓天尊大悲雷庭顯著弘化天尊大悲演雷天尊大悲演法正教天尊大悲大演法主天尊古今天聖名號湥淺難明若得推察愈高愈堅不可詳聞如親如炙實太古而近今民是目前而還古處化號化身渾名渾氏奈我弟子某等恍惚弗專敬歸無確道在邇而求遠事本古而誣迂獲咎高天䝉愆在己望聖赦寬容其改悔後升妙境始驗全功偈曰志專意合始成功莫把初心謂有終只恐黃金難淨洗又防白玉欠雕工末路休從人語惑先途何事任吾隆始始終終全一念自然天聖引旁通讚曰天公不爽人事何虧有終有始莫乖違大道自無非月朗星輝普照入幽微纔聞一震大動羣飛獨湥自坐不驚迷惺惺問何爲無惑無疑磐固比巍磯止防叠叠何懼恢恢空中有網設疎稀幾漏可逃棲志莫更移謗訕鎭須嵋諸天寶誥志心皈命禮十方三界無量諸天始盤固於虛皇乃化生於太極大功大行證道果以升騰至聖至神現身名而救度是誠天授亦本靈根設普濟之無邊豈名言之可述大悲大願大聖大慈諸天眞宰度災濟刼萬眞無量福護天尊萬福寶誥志心皈命禮寵叨玉闕慶普塵寰朝儀居次四之班鸞嘉祉遍大千之法界慈度尋聲而救苦益開利頼之心濟生拔朽以施仁更廣悲思之德弘萬福乃弘帝福護羣身如護己身處處䝉恩人人佩澤大悲大願大聖大慈玉經啟教金闕萬福護身眞人流衍萬眞妙寶神功顯號應化天尊偈曰靜中有念最難持莫自紛更立妙基還復太初歸素古自然冥默化無爲心多妄動第七十二分道言千萬之種紛紜之務靜持則歸於無爲動作則起於有象總之一心爲主百念爲用止觀乎正邪兩途世運人情聽其機兆而己始所云者諸天普會無過以天爲柄終則防其妄動不過以心爲樞復還至體以歸於天其間曰性曰命立身保元主事主綱其意可推其奧莫測有幻有眞是生是化有有無無變象非一虛皇作用萬兆千端惟其無心心必成體惟其無動動則至妙非若凡夫妄舉輕行運念非爲一毫千里末事成害妄動於冥冥兆禍於忽忽可不愼歟可不戒歟小人之動動卽於非至人之動動歸於古以古印今今復爲古以今證古古卽爲今今古衍綿道心合一此大傳者傳其心非傳典也授其奧非授文也文以演其奧典以彰其心人全於中天備乎内可以妄動而誣我大道乎人心一舉以天爲期以道爲的三皇實我之祖五帝實我之根上古遠風沕穆混沌斯在吾之意中全匿我之志内無謂一室之際誰其見予一座之閒誰其察予不聞昔人言云大開洞戸人皆見之敢有私曲孰不覺知宜自立大正自固大籬勿俾人之窺我勿令人之瞰我如有人見如有人聞斯可動矣出門見賓使民承祭者何歟易曰慢藏誨盜冶容誨淫戒不正也妄動之條戒之爲要今對高天益增凛凛如噡如仰恭禮運思大悲無上虛皇無極混元天帝普度刼運天尊大悲神靈廣默天尊大悲冥瞻如覩天尊大悲澹遠神容天尊大悲湥默天尊大悲廣照天尊大悲灼古天尊大悲睿聖大覺天尊大悲湥明大照天尊大悲古道天尊大悲太元天尊大悲晃覺天尊大悲八方正智天尊大悲方方應道無爲天尊大悲庇化天尊大悲蔭福天尊大悲弘庇天尊大悲大祚成風天尊大悲古風八俗天尊大悲上俗天尊大悲至上遠俗天尊大悲高上沕俗天尊大悲上遠稱古天尊大悲穆皇天尊大悲至穆遙皇天尊大悲孝芒無爲天尊大悲𣺌化天尊大悲光遠覺先天尊大悲太皇無象天尊大悲太虛天尊大悲太初復無天尊大悲至初胎元無本天尊大悲始初原生天尊大悲天皇渾相天尊大悲天皇傳緒有力天尊大悲天皇一派天尊大悲天皇大廣一志天尊大悲天皇德正天尊大悲天皇衍派天尊大悲天皇正初天尊大悲復皇天尊大悲歸皇衍極天尊大悲振皇天尊大悲提攝天尊大悲提紀天尊大悲提攝皇道天尊大悲地皇正衍天尊大悲地皇扶正天尊大悲地皇德輔天尊大悲地政天尊大悲地政復皇天尊大悲地政歸坤天尊大悲坤德上皇天尊大悲坤道衍皇正緒天尊大悲坤德皇后輔天天尊大悲皇紀天尊大悲皇寶天尊大悲皇輿天尊大悲人皇大道天尊大悲人皇永夀天尊大悲人皇衍寅天尊大悲人皇受丑天尊大悲人皇受子天尊大悲人皇三總正道天尊大悲人皇合世天尊大悲人皇生人得道天尊大悲人皇輔公天尊大悲人皇睿生天尊大悲人皇得食天尊大悲人皇兆字天尊大悲輔德天尊大悲畫文天尊大悲象鳥天尊大悲象雲天尊大悲象星天尊大悲象圖天尊大悲象大形天尊大悲象風土天尊大悲象國勢天尊大悲治大農天尊大悲治普田天尊大悲治大象天尊大悲配陰合陽天尊大悲養道成丹天尊大悲治宗天尊大悲治文祀天尊大悲普倫普教衍化天尊大悲昭治天尊大悲正體天尊大悲正帝體天尊大悲正帝容天尊大悲示大容天尊大悲普威天尊大悲彰正法天尊大悲顯律天尊大悲昭軍道天尊大悲昭祖祭天尊大悲昭軍體天尊大悲顯教天尊大悲顯法教天尊大悲顯大法教天尊大悲顯誅律天尊大悲彰教傳法天尊大悲誅邪袪奸天尊大悲傳醫祖天尊大悲受札祖天尊大悲演國政天尊大悲傳示陰陽天尊大悲觀草察時天尊大悲觀草得奸治法天尊大悲悟正天尊大悲覺曆正緒天尊大悲察天天尊大悲察四隅明五土正道天尊大悲欽倫天尊大悲欽時天尊大悲欽人力治天尊大悲洪荒大治天尊大悲野政天尊大悲野治天尊大悲弘耕大作天尊大悲祛魔正倫天尊大悲遠邪天尊大悲殺邪安物天尊大悲扶日天尊大悲旭陽天尊大悲化體五陰天尊大悲托陰成治天尊大悲大殺四厲成正德天尊大悲輔孝天尊大悲正輔大孝天尊大悲正輔化孝天尊大悲流化天尊大悲治波天尊大悲廣訓風物天尊大悲輔化波害天尊大悲大輔洪災天尊大悲大輔洪災殺禽成美天尊大悲焚禽助道天尊大悲大倫成善天尊大悲治育養物天尊大悲洪化普訓天尊大悲古高天尊大悲顓古天尊大悲上帝傳嚳天尊大悲帝傳文義天尊大悲帝命味旨天尊大悲振風廣化成大善彰至德弘聖天尊大悲功讓天尊大悲普王大化天尊大悲衍古主成武功正道天尊大悲成孺聖廣緒業普幼天尊大悲聖德衍振天尊大悲正興作業匹成帝緒天尊大悲廣興嬰主昭能成治天尊大悲弘能愚聖天尊大悲正身勉羣天尊大悲幽隱復彰彩雲庇體振化興緒天尊大悲神威正大天尊大悲幽機衍業天尊大悲緒憑五輔成帝天尊大悲大武正吳天尊大悲大武鎭蜀天尊大悲振蜀功烈天尊大悲五正天尊大悲雄死不老天尊大悲老烈天尊大悲練五少幼天尊大悲振威少策天尊大悲吳主緒正天尊大悲祛奸天尊大悲祛大邪天尊大悲遠大奸天尊大悲威文天尊大悲振能輔業天尊大悲成志天尊大悲緒成天尊大悲功雅崇文承業作士天尊大悲義明仁正輔治天尊大悲三教大聖輔佐天尊大悲今古大聖列仁天尊大悲普侍羣眞恩班四列天尊如是古號傳聖彰昭下民未諳當因義思或隱躬於太古之時或潛名於上世之際或君或相是孝是忠或耕