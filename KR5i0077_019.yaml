body:
  text: 三寶萬靈法懴下元道士王守上閲三省誥志心皈命禮位都三省威伏羣魔司雷雨之權衡提瘟㾮之部屬九天遊奕即飛駕於龜蛇六合高明初煉神於龍虎統文章而專星曜判貴爵以掌兒嗣大惠大慈大仁大孝天都妙省合濟大運天尊總讚書其隱旨録其原陽本先本後察方方到處可洪彰至哲穹蒼諱過顯慈祥泰山鎮定溟渤波洋好生善喜地天長孝義大文昌治世福强龍虎號真王太上虛皇三寶十方三界萬靈保生治世福顯利幽弭災集慶法懴三省卷十上第十九策偈曰人間百物總關天六者中傳第一端莫作虛空蒼昊色能參真妙體藏仙天以成物第五十五分道言百物皆有天道惟人為物之首得物之元葆物之靈居物之要先成身物後成萬物所以能參能贊化育無竭是天也初得元以生繼以元而生人生物故曰乾乾以配坤産其卦爻大哉乾元至哉坤元皆此二儀成其四象而出六十四卦變成多爻而有三百八十四位先以六子而作基六子即坎離震艮巽兌是也今言天而首及卦象謂易為萬物之至理故聖人韋編三絶信不誣言特表表以出之人能詳閲易書則識人道之大則識物理之弘體非天無以成體中有氣有精有神三者非天無以助天欲全人而人不能自全是負天也天不言存聖人以代言是聖人即天也聖人即天我學聖人我亦天也孰曰天為渺渺人為末末而兩相大暌不成廣覆巨載乎父母血氣在父母為父母血氣後天復生先天在子成身屬子之血氣後天復化先天統出於天故聖人談運敷教獨歸天道則止矣有數至塞而不能通言天則無他求有勢至阻而不能為言天則歸於巳而不他代可不知天道之原而尚有加於天之上者歟人皆謂道之真體出於大本大根不悟及天之為大本大根所以中庸之書始於天終於天至於人身皆天所生所成無不為真理所保人若欺其天則敗棄其天則朽不欺不棄何敗何朽身朽朽其血氣身敗敗其真元真元葆乎靈物血氣不存真元長在故云不朽老子傳五千言惟一真道常道真常得道是為真得大道在人正以存天天無所實以人為實人無所見以天為見我見我天非關色色天雖虛空我以實體天雖空色我以真全靑靑在上白白在心無曰有異恍惚窈冥默默以參我即真人今對高天朗運分明至誠以叩豈敢忽輕大悲至强蕩魔玉虛師相金闕天尊大悲至明降魔六合無窮高明天尊大悲至孝驅魔寶光大道鸞化天尊大悲弘修三輔天尊大悲道深功重天尊大悲威明至赫天尊大悲靈氣四施功業上通天尊大悲服物道大天尊大悲力能負嶽氣可吞溟至弘得體天尊大悲運身保物天尊大悲大業偉功伏邪天尊大悲深造君功保護羣物天尊大悲邪出北方東氣淨除合威助化天尊大悲能輔上闕天尊大悲佐王出治保隆天尊大悲處處顯威寧世天尊大悲安土合爻天尊大悲鎮體化運天尊大悲化世無法隨體顯身畏神自運天尊大悲廣施訓藏天尊大悲準典梵字布功不替天尊大悲準咒九劫終化靈身天尊大悲大梵廣威伏邪護難天尊大悲持準梵代天運兩陽不替天尊大悲日月陰陽全赫大畏天尊大悲阿那伏魔大聖天尊大悲阿陀佶力威猛天尊大悲佛國出威降邪正物天尊大悲利多普陀阿多答那福聖天尊大悲梵王大部修修天尊大悲利多阿羅準母大部修修天尊大悲樂體靜神天尊大悲出入合聖伏邪天尊大悲正真大訓除邪天尊大悲廣慈大惠天尊大悲惠及無涯天尊大悲仁孝輔聖合德桂林天尊大悲伏邪大仁天尊大悲伏邪大孝天尊大悲孝畏羣邪來魔護體天尊大悲迎身魔部天尊大悲普陀修淨孝達天尊大悲貞靈葆氣天尊大悲氣通桂香天尊大悲上達昆秀天尊大悲孝通孫謀天尊大悲多福集世三永天尊大悲永綿嗣夀天尊大悲鳥飛帶香天尊大悲桂林喬秀福枝綴果餐充丹鼎天尊大悲飽丹得永天尊大悲退疫天尊大悲絶疫天尊大悲逐疫天尊大悲大聖部下和瘟利物天尊大悲大聖部下勸解諸㾮退災化厄天尊大悲大聖部下和瘟輔治祛災天尊大悲大聖部下和瘟勸散保人眷屬天尊大悲大聖部下化瘟輔治威力祛災天尊大悲大聖部下化瘟威驅惡曜集福天尊大悲主疫專化天尊大悲主疫化厄天尊大悲主疫行令垂澤天尊大悲瘟㾮化福天尊大悲瘟㾮化善天尊大悲瘟㾮行德化災作福天尊大悲瘟疫春化天尊大悲瘟疫夏解天尊大悲瘟疫秋驅天尊大悲瘟疫冬淨天尊大悲瘟疫四時大化天尊大悲瘟疫化解四時祥兆天尊大悲化散諸疫災天尊大悲化散諸㾮災天尊大悲化散諸疾災天尊大悲化散諸妖災天尊大悲化散諸氛災天尊大悲化散諸孽災天尊大悲化散諸凶曜災天尊大悲化散諸惡煞災天尊大悲化散小兒災天尊大悲化散小兒痲疹災天尊大悲化散小兒諸痘惡災天尊大悲化散小兒大毒惡瘡災天尊大悲化散小兒一切惡毒災天尊大悲錫子孫保後天尊大悲錫子孫繁茂大福天尊大悲錫子孫貴大福天尊大悲錫子孫爵大福天尊大悲保子孫祿大福天尊大悲威降瘟疾天尊大悲威降惡神大煞綿人嗣後天尊大悲白鶴輔治保合元氣天尊大悲白鶴林下修道運嗣天尊大悲白鶴羽下錫嗣保夀天尊大悲功修威部天尊大悲德修大證天尊大悲運威蕩凶全道天尊大悲運福保羣全力天尊大悲大力降妖協治六合天尊大悲大修功力協治北鎮天尊大悲蕩魔助北天尊大悲協水火將出治天尊大悲協龍虎將出治天尊大悲大協獅子虬龍出治天尊大悲降伏惡獸天尊大悲降伏諸惡孽蟲天尊大悲降伏一切諸毒獸和化天尊大悲降伏一切諸水中毒孽天尊大悲降伏一切諸火鳥保福天尊大悲治世退惡運天尊大悲治世大亨貞天尊大悲治世大福祥天尊大悲治世大利果天尊大悲保無妖天尊大悲保絶魔天尊大